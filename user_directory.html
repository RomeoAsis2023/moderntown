<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modern Town | User Directory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f5 100%);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(46, 125, 182, 0.2);
            padding-bottom: 1rem;
        }
        .title h1 {
            font-family: 'Space Grotesk', monospace;
            font-weight: 600;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #0b3954, #087e8b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .title p {
            font-size: 0.85rem;
            color: #3a6b8f;
            margin-top: 0.2rem;
        }
        .status-bar {
            background: white;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .storage-badge {
            background: #d4edda;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #155724;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .form-card {
            flex: 1.2;
            min-width: 320px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .table-card {
            flex: 2.5;
            min-width: 380px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
            padding: 1.5rem;
            overflow-x: auto;
        }
        h2 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f5068;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c6e8f;
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbdbe2;
            border-radius: 20px;
            font-family: 'Inter', monospace;
            font-size: 0.9rem;
            transition: 0.2s;
            background: #fefefe;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2c9cd4;
            box-shadow: 0 0 0 3px rgba(44,156,212,0.2);
        }
        .row-flex {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .row-flex .form-group {
            flex: 1;
        }
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #eef2f7;
            color: #1f3e4b;
        }
        .btn-primary {
            background: #0f6b8c;
            color: white;
            box-shadow: 0 4px 8px rgba(15,107,140,0.2);
        }
        .btn-primary:hover {
            background: #0a526d;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e2e9f0;
        }
        .btn-secondary:hover {
            background: #cbdbe2;
        }
        .btn-danger {
            background: #c44536;
            color: white;
        }
        .btn-danger:hover {
            background: #a33426;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .action-icons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-icons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.1s;
        }
        .edit-btn { color: #2c7da0; }
        .edit-btn:hover { color: #1f5e7a; transform: scale(1.1);}
        .delete-btn { color: #bc6c25; }
        .delete-btn:hover { color: #9e5620; transform: scale(1.1);}
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 14px 8px;
            background: #f0f5f9;
            font-weight: 600;
            color: #1b4e6b;
            border-bottom: 2px solid #cde1ed;
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #e2edf4;
            vertical-align: middle;
        }
        .avatar-preview {
            width: 42px;
            height: 42px;
            border-radius: 100px;
            object-fit: cover;
            background: #eef2fa;
            border: 1px solid #cbdae6;
        }
        .sprite-preview {
            width: 48px;
            height: 48px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            background-color: #f5f7fb;
        }
        .empty-row {
            text-align: center;
            padding: 40px;
            color: #6b8ba3;
        }
        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1f2f38;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        @media (max-width: 780px) {
            body { padding: 1rem; }
            .dashboard { flex-direction: column; }
        }
        .config-panel {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .config-input {
            width: 100%;
            padding: 8px 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-connected {
            background: #28a745;
            box-shadow: 0 0 5px #28a745;
        }
        .status-disconnected {
            background: #dc3545;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <div class="title">
            <h1>Modern Town · User Directory</h1>
            <p>💾 Permanently stored in your GitHub Repository</p>
        </div>
        <div class="status-bar">
            <i class="fab fa-github"></i> 
            <span id="connectionStatus"><span class="status-indicator status-disconnected"></span> Not Configured</span>
            <button id="configBtn" class="btn btn-sm" style="background:#e8f0fe;"><i class="fas fa-cog"></i> Configure Repo</button>
            <button id="exportBtn" class="btn btn-sm btn-success"><i class="fas fa-download"></i> Export JSON</button>
            <button id="refreshDataBtn" class="btn btn-sm btn-secondary"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="form-card">
            <h2><i class="fas fa-user-plus"></i> <span id="formTitle">Add New User</span></h2>
            <form id="userForm">
                <input type="hidden" id="editId" value="">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="name" placeholder="e.g., Taylor Chen" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Modern Email *</label>
                    <input type="email" id="modern_email" placeholder="hello@creativelabs.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-image"></i> Profile Picture URL</label>
                    <input type="url" id="profile_pic" placeholder="https://randomuser.me/api/portraits/women/68.jpg">
                </div>
                <div class="row-flex">
                    <div class="form-group">
                        <label><i class="fas fa-briefcase"></i> Position</label>
                        <input type="text" id="position" placeholder="Senior Designer">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="department" placeholder="Social Media">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-cubes"></i> Sprite Image (URL)</label>
                    <input type="text" id="sprite_image" placeholder="https://cdn-icons-png.flaticon.com/512/1995/1995572.png">
                    <small style="color:#54809b;">48x48 preview in table</small>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 16px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-save"></i> Save User</button>
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem;">
                <h2><i class="fas fa-table-list"></i> Directory <span id="userCount" style="font-size:0.8rem; background:#eef2f7; padding:2px 8px; border-radius:20px;">0 users</span></h2>
            </div>
            <div style="overflow-x: auto;">
                <table id="userTable">
                    <thead>
                        <tr><th>Avatar</th><th>Name</th><th>Email</th><th>Position</th><th>Dept</th><th>Sprite</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="empty-row">Configure GitHub repo to load data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="configModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:20px; max-width:500px; margin:20px;">
        <h3>Configure GitHub Repository</h3>
        <div class="form-group">
            <label>GitHub Username</label>
            <input type="text" id="configUsername" placeholder="your-username" class="config-input">
        </div>
        <div class="form-group">
            <label>Repository Name</label>
            <input type="text" id="configRepo" placeholder="your-repo" class="config-input">
        </div>
        <div class="form-group">
            <label>GitHub Token (with repo scope)</label>
            <input type="password" id="configToken" placeholder="ghp_xxxxxxxx" class="config-input">
        </div>
        <div class="form-group">
            <label>File path (optional, default: users.json)</label>
            <input type="text" id="configFilePath" placeholder="users.json" class="config-input" value="modern_town_users.json">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="saveConfigBtn" class="btn btn-primary">Save & Connect</button>
            <button id="closeConfigBtn" class="btn btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<script>
    // GitHub Repo Storage Configuration
    let repoConfig = {
        username: '',
        repo: '',
        token: '',
        filePath: 'modern_town_users.json'
    };
    
    let currentUsers = [];
    
    // Load config from localStorage
    function loadConfig() {
        const saved = localStorage.getItem('github_repo_config');
        if (saved) {
            try {
                const config = JSON.parse(saved);
                repoConfig = { ...repoConfig, ...config };
                if (repoConfig.username && repoConfig.repo && repoConfig.token) {
                    document.getElementById('connectionStatus').innerHTML = '<span class="status-indicator status-connected"></span> Connected to ' + repoConfig.username + '/' + repoConfig.repo;
                }
            } catch(e) {}
        }
    }
    
    // Save config
    function saveConfig() {
        localStorage.setItem('github_repo_config', JSON.stringify(repoConfig));
        if (repoConfig.username && repoConfig.repo && repoConfig.token) {
            document.getElementById('connectionStatus').innerHTML = '<span class="status-indicator status-connected"></span> Connected to ' + repoConfig.username + '/' + repoConfig.repo;
            showToast('✅ Configuration saved! Loading data...');
            loadUsersFromRepo();
        } else {
            document.getElementById('connectionStatus').innerHTML = '<span class="status-indicator status-disconnected"></span> Not Configured';
        }
    }
    
    // Read file from GitHub repo
    async function loadUsersFromRepo() {
        if (!repoConfig.token || !repoConfig.username || !repoConfig.repo) {
            document.getElementById("tableBody").innerHTML = `<tr><td colspan="7" class="empty-row">⚙️ Click "Configure Repo" to set up GitHub storage</td></tr>`;
            return [];
        }
        
        try {
            const url = `https://api.github.com/repos/${repoConfig.username}/${repoConfig.repo}/contents/${repoConfig.filePath}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${repoConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (response.status === 404) {
                // File doesn't exist yet, create empty data
                const defaultUsers = getSampleUsers();
                await saveUsersToRepo(defaultUsers);
                currentUsers = defaultUsers;
                renderTable(currentUsers);
                showToast('📁 Created new users file in repo');
                return currentUsers;
            }
            
            if (!response.ok) throw new Error('Failed to fetch');
            
            const data = await response.json();
            const content = atob(data.content);
            const users = JSON.parse(content);
            currentUsers = users.users || users;
            renderTable(currentUsers);
            showToast(`✅ Loaded ${currentUsers.length} users from GitHub`);
            return currentUsers;
        } catch(err) {
            console.error('Load error:', err);
            showToast('❌ Failed to load from repo: ' + err.message, true);
            return [];
        }
    }
    
    // Save users to GitHub repo
    async function saveUsersToRepo(users) {
        if (!repoConfig.token || !repoConfig.username || !repoConfig.repo) {
            showToast('⚠️ Please configure GitHub repo first', true);
            return false;
        }
        
        try {
            // First, get current file SHA if exists
            const url = `https://api.github.com/repos/${repoConfig.username}/${repoConfig.repo}/contents/${repoConfig.filePath}`;
            let sha = null;
            
            try {
                const getResponse = await fetch(url, {
                    headers: {
                        'Authorization': `token ${repoConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                }
            } catch(e) {}
            
            const dataToStore = { users: users, lastUpdated: new Date().toISOString() };
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToStore, null, 2))));
            
            const putResponse = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${repoConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: sha ? 'Update users data' : 'Create users data file',
                    content: content,
                    sha: sha
                })
            });
            
            if (!putResponse.ok) throw new Error('Failed to save');
            
            showToast('💾 Data saved to GitHub repo permanently');
            return true;
        } catch(err) {
            console.error('Save error:', err);
            showToast('❌ Failed to save to repo: ' + err.message, true);
            return false;
        }
    }
    
    function getSampleUsers() {
        return [
            {
                id: "1",
                name: "Eleanor Chen",
                modern_email: "eleanor@creativelabs.com",
                profile_pic: "https://randomuser.me/api/portraits/women/68.jpg",
                position: "Creative Director",
                department: "Design",
                sprite_image: "https://cdn-icons-png.flaticon.com/512/1995/1995572.png"
            },
            {
                id: "2",
                name: "Marcus Rodriguez",
                modern_email: "marcus@techwave.io",
                profile_pic: "https://randomuser.me/api/portraits/men/32.jpg",
                position: "Senior Developer",
                department: "Engineering",
                sprite_image: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
            }
        ];
    }
    
    function renderTable(users) {
        const tbody = document.getElementById("tableBody");
        const userCount = document.getElementById("userCount");
        userCount.textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;
        
        if (!users.length) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-row">📭 No users. Add your first user above!</td></tr>`;
            return;
        }
        
        tbody.innerHTML = users.map(user => `
            <tr data-id="${user.id}">
                <td><img class="avatar-preview" src="${escapeHtml(user.profile_pic || 'https://via.placeholder.com/42?text=?' )}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.name||'U')}&background=9aa9bb&color=fff'"></td>
                <td><strong>${escapeHtml(user.name || '—')}</strong></td>
                <td>${escapeHtml(user.modern_email || '')}</td>
                <td>${escapeHtml(user.position || '—')}</td>
                <td>${escapeHtml(user.department || '—')}</td>
                <td><div class="sprite-preview" style="background-image: url('${escapeHtml(user.sprite_image || '')}'); background-size: contain; background-repeat: no-repeat; background-position:center;"></div></td>
                <td class="action-icons">
                    <button class="edit-btn" data-id="${user.id}" title="Edit"><i class="fas fa-pen"></i></button>
                    <button class="delete-btn" data-id="${user.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                </td>
            </tr>
        `).join('');
        
        attachEventHandlers(users);
    }
    
    function attachEventHandlers(users) {
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const user = currentUsers.find(u => u.id === id);
                if (user) populateFormForEdit(user);
            });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (confirm("Delete this user permanently from GitHub repo?")) {
                    currentUsers = currentUsers.filter(u => u.id !== id);
                    await saveUsersToRepo(currentUsers);
                    renderTable(currentUsers);
                    clearForm();
                    showToast("🗑️ User deleted");
                }
            });
        });
    }
    
    function populateFormForEdit(user) {
        document.getElementById("editId").value = user.id;
        document.getElementById("name").value = user.name || "";
        document.getElementById("modern_email").value = user.modern_email || "";
        document.getElementById("profile_pic").value = user.profile_pic || "";
        document.getElementById("position").value = user.position || "";
        document.getElementById("department").value = user.department || "";
        document.getElementById("sprite_image").value = user.sprite_image || "";
        document.getElementById("formTitle").innerHTML = '<i class="fas fa-user-edit"></i> Edit User';
        document.getElementById("submitBtn").innerHTML = '<i class="fas fa-pen"></i> Update User';
    }
    
    function clearForm() {
        document.getElementById("editId").value = "";
        document.getElementById("userForm").reset();
        document.getElementById("formTitle").innerHTML = '<i class="fas fa-user-plus"></i> Add New User';
        document.getElementById("submitBtn").innerHTML = '<i class="fas fa-save"></i> Save User';
    }
    
    async function handleSubmit(e) {
        e.preventDefault();
        const editId = document.getElementById("editId").value;
        const newUser = {
            name: document.getElementById("name").value.trim(),
            modern_email: document.getElementById("modern_email").value.trim(),
            profile_pic: document.getElementById("profile_pic").value.trim(),
            position: document.getElementById("position").value.trim(),
            department: document.getElementById("department").value.trim(),
            sprite_image: document.getElementById("sprite_image").value.trim(),
        };
        
        if (!newUser.name || !newUser.modern_email) {
            showToast("Name and Email are required", true);
            return;
        }
        
        if (editId) {
            const index = currentUsers.findIndex(u => u.id === editId);
            if (index !== -1) {
                currentUsers[index] = { ...currentUsers[index], ...newUser, id: editId };
            }
        } else {
            const newId = crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.random().toString(36);
            currentUsers.push({ ...newUser, id: newId });
        }
        
        await saveUsersToRepo(currentUsers);
        renderTable(currentUsers);
        clearForm();
        showToast(editId ? "✏️ User updated" : "✨ New user added");
    }
    
    function exportToJSON() {
        const dataStr = JSON.stringify(currentUsers, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `users_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("📁 Users exported to JSON");
    }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }
    
    let toastTimeout;
    function showToast(msg, isError = false) {
        const existing = document.querySelector(".toast-msg");
        if(existing) existing.remove();
        const div = document.createElement("div");
        div.className = "toast-msg";
        div.style.background = isError ? "#dc3545" : "#28a745";
        div.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(div);
        if(toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { div.style.opacity = "0"; setTimeout(() => div.remove(), 300); }, 3000);
    }
    
    // Modal handling
    function showConfigModal() {
        document.getElementById("configUsername").value = repoConfig.username;
        document.getElementById("configRepo").value = repoConfig.repo;
        document.getElementById("configToken").value = repoConfig.token;
        document.getElementById("configFilePath").value = repoConfig.filePath;
        document.getElementById("configModal").style.display = "flex";
    }
    
    function hideConfigModal() {
        document.getElementById("configModal").style.display = "none";
    }
    
    function saveConfigModal() {
        repoConfig.username = document.getElementById("configUsername").value.trim();
        repoConfig.repo = document.getElementById("configRepo").value.trim();
        repoConfig.token = document.getElementById("configToken").value.trim();
        repoConfig.filePath = document.getElementById("configFilePath").value.trim() || "modern_town_users.json";
        saveConfig();
        hideConfigModal();
        loadUsersFromRepo();
    }
    
    // Initialize
    window.addEventListener("DOMContentLoaded", () => {
        loadConfig();
        
        document.getElementById("userForm").addEventListener("submit", handleSubmit);
        document.getElementById("cancelEditBtn").addEventListener("click", clearForm);
        document.getElementById("configBtn").addEventListener("click", showConfigModal);
        document.getElementById("saveConfigBtn").addEventListener("click", saveConfigModal);
        document.getElementById("closeConfigBtn").addEventListener("click", hideConfigModal);
        document.getElementById("exportBtn").addEventListener("click", exportToJSON);
        document.getElementById("refreshDataBtn").addEventListener("click", () => loadUsersFromRepo());
        
        if (repoConfig.token && repoConfig.username && repoConfig.repo) {
            loadUsersFromRepo();
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modern Town | User Directory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f5 100%);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(46, 125, 182, 0.2);
            padding-bottom: 1rem;
        }
        .title h1 {
            font-family: 'Space Grotesk', monospace;
            font-weight: 600;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #0b3954, #087e8b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .form-card {
            flex: 1.2;
            min-width: 320px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.8rem;
        }
        .table-card {
            flex: 2.5;
            min-width: 380px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
            padding: 1.5rem;
            overflow-x: auto;
        }
        h2 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f5068;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c6e8f;
            display: block;
            margin-bottom: 5px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbdbe2;
            border-radius: 20px;
            font-family: 'Inter', monospace;
            font-size: 0.9rem;
            transition: 0.2s;
            background: #fefefe;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2c9cd4;
            box-shadow: 0 0 0 3px rgba(44,156,212,0.2);
        }
        .image-upload-area {
            border: 2px dashed #cbdbe2;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
        }
        .image-upload-area:hover {
            border-color: #2c9cd4;
            background: #f0f7fc;
        }
        .image-preview {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .preview-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #e2edf4;
        }
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #eef2f7;
            color: #1f3e4b;
        }
        .btn-primary {
            background: #0f6b8c;
            color: white;
            box-shadow: 0 4px 8px rgba(15,107,140,0.2);
        }
        .btn-primary:hover {
            background: #0a526d;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e2e9f0;
        }
        .btn-secondary:hover {
            background: #cbdbe2;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .action-icons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-icons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.1s;
        }
        .edit-btn { color: #2c7da0; }
        .edit-btn:hover { color: #1f5e7a; transform: scale(1.1);}
        .delete-btn { color: #bc6c25; }
        .delete-btn:hover { color: #9e5620; transform: scale(1.1);}
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 14px 8px;
            background: #f0f5f9;
            font-weight: 600;
            color: #1b4e6b;
            border-bottom: 2px solid #cde1ed;
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #e2edf4;
            vertical-align: middle;
        }
        .avatar-preview {
            width: 42px;
            height: 42px;
            border-radius: 100px;
            object-fit: cover;
            background: #eef2fa;
            border: 1px solid #cbdae6;
        }
        .sprite-preview {
            width: 48px;
            height: 48px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            background-color: #f5f7fb;
        }
        .upload-progress {
            font-size: 0.75rem;
            color: #2c9cd4;
            margin-top: 5px;
        }
        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1f2f38;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }
        @media (max-width: 780px) {
            body { padding: 1rem; }
            .dashboard { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <div class="title">
            <h1><i class="fas fa-cloud-upload-alt"></i> GistDrive Pro · Image Upload CRUD</h1>
            <p>Upload profile pics & sprites to GitHub | Store metadata in Gist</p>
        </div>
        <div class="gist-status">
            <i class="fab fa-github"></i> <span id="gistLabel">Ready</span>
            <button id="resetGistBtn" class="btn btn-sm btn-secondary"><i class="fas fa-sync-alt"></i> reset</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="form-card">
            <h2><i class="fas fa-user-plus"></i> <span id="formTitle">Add New User</span></h2>
            <form id="userForm">
                <input type="hidden" id="editId" value="">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="name" placeholder="e.g., Taylor Chen" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Modern Email *</label>
                    <input type="email" id="modern_email" placeholder="hello@creativelabs.com" required>
                </div>
                
                <!-- Profile Picture Upload -->
                <div class="form-group">
                    <label><i class="fas fa-camera"></i> Profile Picture</label>
                    <div class="image-upload-area" onclick="document.getElementById('profilePicInput').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #2c9cd4;"></i>
                        <p>Click to upload image</p>
                        <small>PNG, JPG, GIF (max 2MB)</small>
                    </div>
                    <input type="file" id="profilePicInput" accept="image/*" style="display:none" onchange="uploadProfileImage(this.files[0])">
                    <div class="image-preview" id="profilePreview"></div>
                    <input type="hidden" id="profile_pic" value="">
                    <div id="profileUploadStatus" class="upload-progress"></div>
                </div>
                
                <div class="row-flex">
                    <div class="form-group">
                        <label><i class="fas fa-briefcase"></i> Position</label>
                        <input type="text" id="position" placeholder="Senior Designer">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="department" placeholder="Engineering / Product">
                    </div>
                </div>
                
                <!-- Sprite Image Upload -->
                <div class="form-group">
                    <label><i class="fas fa-cubes"></i> Sprite Image</label>
                    <div class="image-upload-area" onclick="document.getElementById('spriteImageInput').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #2c9cd4;"></i>
                        <p>Click to upload sprite/icon</p>
                        <small>PNG, JPG, GIF, SVG (max 2MB)</small>
                    </div>
                    <input type="file" id="spriteImageInput" accept="image/*" style="display:none" onchange="uploadSpriteImage(this.files[0])">
                    <div class="image-preview" id="spritePreview"></div>
                    <input type="hidden" id="sprite_image" value="">
                    <div id="spriteUploadStatus" class="upload-progress"></div>
                </div>
                
                <div style="display: flex; gap: 12px; margin-top: 16px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-save"></i> Save User</button>
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem;">
                <h2><i class="fas fa-table-list"></i> Directory</h2>
                <button id="refreshTableBtn" class="btn btn-sm btn-secondary"><i class="fas fa-rotate-right"></i> Refresh</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="userTable">
                    <thead>
                        <tr><th>Avatar</th><th>Name</th><th>Email</th><th>Position</th><th>Dept</th><th>Sprite</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="empty-row">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuration
    let GIST_ID = null;
    let REPO_OWNER = null;
    let REPO_NAME = null;
    const GIST_FILENAME = "modern_user_data.json";
    
    // GitHub configuration for image hosting
    let GITHUB_TOKEN = null;
    let IMAGE_REPO = null; // Will be set by user: username/repo
    
    // Helper: Get/set GitHub token
    function getGitHubToken() {
        let token = localStorage.getItem("github_token");
        if (!token) {
            token = prompt("🔐 GitHub Personal Access Token Required\n\nCreate at: https://github.com/settings/tokens\nRequired scopes: 'gist', 'repo' (for image upload)\n\nEnter token:", "");
            if (token && token.trim()) {
                localStorage.setItem("github_token", token.trim());
                return token.trim();
            }
            return null;
        }
        return token;
    }
    
    // Setup image repository
    async function setupImageRepo() {
        let repoInfo = localStorage.getItem("image_repo");
        if (!repoInfo) {
            const username = prompt("📁 Image Repository Setup\n\nEnter your GitHub username:", "");
            const repo = prompt("Enter repository name for storing images (will be created if doesn't exist):\n(e.g., 'user-images')", "user-directory-images");
            if (username && repo) {
                REPO_OWNER = username;
                REPO_NAME = repo;
                localStorage.setItem("image_repo", JSON.stringify({ owner: username, repo: repo }));
                
                // Try to create repo if it doesn't exist
                try {
                    await githubFetch(`/repos/${username}/${repo}`, { method: 'GET' });
                } catch(e) {
                    if (confirm(`Repository "${repo}" doesn't exist. Create it now?`)) {
                        await githubFetch(`/user/repos`, {
                            method: 'POST',
                            body: JSON.stringify({ name: repo, private: false, auto_init: false })
                        });
                        showToast(`✅ Created repository: ${repo}`);
                    }
                }
                return { owner: username, repo: repo };
            }
        }
        const parsed = JSON.parse(repoInfo);
        REPO_OWNER = parsed.owner;
        REPO_NAME = parsed.repo;
        return { owner: REPO_OWNER, repo: REPO_NAME };
    }
    
    async function githubFetch(endpoint, options = {}) {
        const token = getGitHubToken();
        if (!token) throw new Error("No GitHub token");
        const headers = {
            "Authorization": `token ${token}`,
            "Accept": "application/vnd.github.v3+json",
            "Content-Type": "application/json",
        };
        const response = await fetch(`https://api.github.com${endpoint}`, { ...options, headers });
        if (!response.ok && response.status !== 404) {
            const errText = await response.text();
            throw new Error(`API error ${response.status}: ${errText.substring(0, 150)}`);
        }
        return response.json();
    }
    
    // Upload image to GitHub repository
    async function uploadImageToGitHub(file, path) {
        const reader = new FileReader();
        return new Promise((resolve, reject) => {
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                const commitMessage = `Upload ${path}`;
                
                try {
                    // Check if file exists
                    let sha = null;
                    try {
                        const existing = await githubFetch(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`);
                        if (existing.sha) sha = existing.sha;
                    } catch(e) {}
                    
                    const response = await githubFetch(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
                        method: 'PUT',
                        body: JSON.stringify({
                            message: commitMessage,
                            content: base64Content,
                            sha: sha,
                            branch: 'main'
                        })
                    });
                    
                    const imageUrl = response.content.download_url;
                    resolve(imageUrl);
                } catch(error) {
                    reject(error);
                }
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    
    // Upload handlers
    let currentProfileFile = null;
    let currentSpriteFile = null;
    
    window.uploadProfileImage = async (file) => {
        if (!file) return;
        if (!REPO_OWNER) await setupImageRepo();
        
        const statusDiv = document.getElementById('profileUploadStatus');
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
        
        try {
            const extension = file.name.split('.').pop();
            const filename = `profile_${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${extension}`;
            const path = `profile_pics/${filename}`;
            const imageUrl = await uploadImageToGitHub(file, path);
            
            document.getElementById('profile_pic').value = imageUrl;
            document.getElementById('profilePreview').innerHTML = `<img src="${imageUrl}" class="preview-img" alt="Profile">`;
            statusDiv.innerHTML = '<i class="fas fa-check-circle" style="color:#27ae60;"></i> Uploaded!';
            currentProfileFile = imageUrl;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            showToast('✅ Profile picture uploaded!');
        } catch(error) {
            statusDiv.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#e74c3c;"></i> Upload failed';
            console.error(error);
            showToast('❌ Upload failed: ' + error.message, true);
        }
    };
    
    window.uploadSpriteImage = async (file) => {
        if (!file) return;
        if (!REPO_OWNER) await setupImageRepo();
        
        const statusDiv = document.getElementById('spriteUploadStatus');
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
        
        try {
            const extension = file.name.split('.').pop();
            const filename = `sprite_${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${extension}`;
            const path = `sprites/${filename}`;
            const imageUrl = await uploadImageToGitHub(file, path);
            
            document.getElementById('sprite_image').value = imageUrl;
            document.getElementById('spritePreview').innerHTML = `<img src="${imageUrl}" class="preview-img" alt="Sprite">`;
            statusDiv.innerHTML = '<i class="fas fa-check-circle" style="color:#27ae60;"></i> Uploaded!';
            currentSpriteFile = imageUrl;
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            showToast('✅ Sprite image uploaded!');
        } catch(error) {
            statusDiv.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#e74c3c;"></i> Upload failed';
            console.error(error);
            showToast('❌ Upload failed: ' + error.message, true);
        }
    };
    
    // Gist operations (same as before)
    async function getOrCreateGist() {
        const storedGistId = localStorage.getItem("gist_directory_id");
        if (storedGistId) {
            try {
                const gist = await githubFetch(`/gists/${storedGistId}`);
                if (gist && gist.id) {
                    GIST_ID = storedGistId;
                    return GIST_ID;
                }
            } catch(e) { localStorage.removeItem("gist_directory_id"); }
        }
        
        const emptyStructure = { users: [] };
        const newGist = await githubFetch(`/gists`, {
            method: "POST",
            body: JSON.stringify({
                description: "User Directory with Image URLs",
                public: false,
                files: { [GIST_FILENAME]: { content: JSON.stringify(emptyStructure, null, 2) } }
            })
        });
        GIST_ID = newGist.id;
        localStorage.setItem("gist_directory_id", GIST_ID);
        return GIST_ID;
    }
    
    async function loadUsersFromGist() {
        if (!GIST_ID) await getOrCreateGist();
        const gist = await githubFetch(`/gists/${GIST_ID}`);
        const file = gist.files[GIST_FILENAME];
        if (!file || !file.content) return [];
        const data = JSON.parse(file.content);
        let usersArray = Array.isArray(data) ? data : (data.users || []);
        return usersArray.map(u => ({ ...u, id: u.id || Date.now() + "_" + Math.random() }));
    }
    
    async function saveUsersToGist(usersArray) {
        if (!GIST_ID) await getOrCreateGist();
        const dataToStore = { users: usersArray };
        await githubFetch(`/gists/${GIST_ID}`, {
            method: "PATCH",
            body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(dataToStore, null, 2) } } })
        });
        showToast("✅ Data synced to Gist");
    }
    
    // UI Logic
    let currentUsers = [];
    
    async function refreshTable() {
        try {
            currentUsers = await loadUsersFromGist();
            renderTable(currentUsers);
        } catch(err) {
            document.getElementById("tableBody").innerHTML = `<tr><td colspan="7" class="empty-row">Error: ${err.message}</td></tr>`;
        }
    }
    
    function renderTable(users) {
        const tbody = document.getElementById("tableBody");
        if (!users.length) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-row">No users. Add one!</td></tr>`;
            return;
        }
        tbody.innerHTML = users.map(user => `
            <tr>
                <td><img class="avatar-preview" src="${escapeHtml(user.profile_pic || 'https://via.placeholder.com/42')}" onerror="this.src='https://via.placeholder.com/42'"></td>
                <td><strong>${escapeHtml(user.name)}</strong></td>
                <td>${escapeHtml(user.modern_email)}</td>
                <td>${escapeHtml(user.position || '—')}</td>
                <td>${escapeHtml(user.department || '—')}</td>
                <td><div class="sprite-preview" style="background-image: url('${escapeHtml(user.sprite_image || '')}'); background-size: contain;"></div></td>
                <td class="action-icons">
                    <button class="edit-btn" data-id="${user.id}"><i class="fas fa-pen"></i></button>
                    <button class="delete-btn" data-id="${user.id}"><i class="fas fa-trash-alt"></i></button>
                </td>
            </tr>
        `).join('');
        
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const user = currentUsers.find(u => u.id === btn.dataset.id);
                if (user) populateForm(user);
            });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Delete user?')) {
                    currentUsers = currentUsers.filter(u => u.id !== btn.dataset.id);
                    await saveUsersToGist(currentUsers);
                    await refreshTable();
                    clearForm();
                }
            });
        });
    }
    
    function populateForm(user) {
        document.getElementById('editId').value = user.id;
        document.getElementById('name').value = user.name;
        document.getElementById('modern_email').value = user.modern_email;
        document.getElementById('profile_pic').value = user.profile_pic || '';
        document.getElementById('position').value = user.position || '';
        document.getElementById('department').value = user.department || '';
        document.getElementById('sprite_image').value = user.sprite_image || '';
        if (user.profile_pic) document.getElementById('profilePreview').innerHTML = `<img src="${user.profile_pic}" class="preview-img">`;
        if (user.sprite_image) document.getElementById('spritePreview').innerHTML = `<img src="${user.sprite_image}" class="preview-img">`;
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-edit"></i> Edit User';
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-pen"></i> Update User';
    }
    
    function clearForm() {
        document.getElementById('userForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('profile_pic').value = '';
        document.getElementById('sprite_image').value = '';
        document.getElementById('profilePreview').innerHTML = '';
        document.getElementById('spritePreview').innerHTML = '';
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-plus"></i> Add New User';
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Save User';
    }
    
    async function handleSubmit(e) {
        e.preventDefault();
        const editId = document.getElementById('editId').value;
        const userData = {
            name: document.getElementById('name').value,
            modern_email: document.getElementById('modern_email').value,
            profile_pic: document.getElementById('profile_pic').value,
            position: document.getElementById('position').value,
            department: document.getElementById('department').value,
            sprite_image: document.getElementById('sprite_image').value,
        };
        
        if (!userData.name || !userData.modern_email) {
            showToast('Name and email required', true);
            return;
        }
        
        if (editId) {
            const index = currentUsers.findIndex(u => u.id === editId);
            if (index !== -1) currentUsers[index] = { ...currentUsers[index], ...userData, id: editId };
        } else {
            userData.id = Date.now() + "_" + Math.random().toString(36);
            currentUsers.push(userData);
        }
        
        await saveUsersToGist(currentUsers);
        await refreshTable();
        clearForm();
        showToast(editId ? 'User updated' : 'User added');
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    let toastTimeout;
    function showToast(msg, isError = false) {
        const existing = document.querySelector(".toast-msg");
        if(existing) existing.remove();
        const div = document.createElement("div");
        div.className = "toast-msg";
        div.style.background = isError ? "#bc4742" : "#2a6f8f";
        div.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(div);
        if(toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => div.remove(), 3000);
    }
    
    // Initialize
    window.addEventListener("DOMContentLoaded", async () => {
        GITHUB_TOKEN = getGitHubToken();
        if (!GITHUB_TOKEN) return;
        
        await setupImageRepo();
        await getOrCreateGist();
        await refreshTable();
        
        document.getElementById('userForm').addEventListener('submit', handleSubmit);
        document.getElementById('cancelEditBtn').addEventListener('click', clearForm);
        document.getElementById('refreshTableBtn').addEventListener('click', refreshTable);
        document.getElementById('resetGistBtn').addEventListener('click', async () => {
            if (confirm('Reset to sample data?')) {
                const sampleResponse = await fetch('./modern_user_data.json');
                const sampleData = await sampleResponse.json();
                const sampleUsers = (sampleData.users || []).map(u => ({ ...u, id: Date.now() + "_" + Math.random() }));
                await saveUsersToGist(sampleUsers);
                await refreshTable();
            }
        });
    });
</script>
</body>
</html>

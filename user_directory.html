<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modern Town | User Directory Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f5 100%);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(46, 125, 182, 0.2);
            padding-bottom: 1rem;
        }
        .title h1 {
            font-family: 'Space Grotesk', monospace;
            font-weight: 600;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #0b3954, #087e8b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .title p {
            font-size: 0.85rem;
            color: #3a6b8f;
            margin-top: 0.2rem;
        }
        .gist-status {
            background: white;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .gist-status i {
            font-size: 1rem;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .form-card {
            flex: 1.2;
            min-width: 320px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .table-card {
            flex: 2.5;
            min-width: 380px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
            padding: 1.5rem;
            overflow-x: auto;
        }
        h2 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f5068;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c6e8f;
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbdbe2;
            border-radius: 20px;
            font-family: 'Inter', monospace;
            font-size: 0.9rem;
            transition: 0.2s;
            background: #fefefe;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2c9cd4;
            box-shadow: 0 0 0 3px rgba(44,156,212,0.2);
        }
        .row-flex {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .row-flex .form-group {
            flex: 1;
        }
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #eef2f7;
            color: #1f3e4b;
        }
        .btn-primary {
            background: #0f6b8c;
            color: white;
            box-shadow: 0 4px 8px rgba(15,107,140,0.2);
        }
        .btn-primary:hover {
            background: #0a526d;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e2e9f0;
        }
        .btn-secondary:hover {
            background: #cbdbe2;
        }
        .btn-danger {
            background: #c44536;
            color: white;
        }
        .btn-danger:hover {
            background: #a33426;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .action-icons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-icons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.1s;
        }
        .edit-btn { color: #2c7da0; }
        .edit-btn:hover { color: #1f5e7a; transform: scale(1.1);}
        .delete-btn { color: #bc6c25; }
        .delete-btn:hover { color: #9e5620; transform: scale(1.1);}
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 14px 8px;
            background: #f0f5f9;
            font-weight: 600;
            color: #1b4e6b;
            border-bottom: 2px solid #cde1ed;
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #e2edf4;
            vertical-align: middle;
        }
        .avatar-preview {
            width: 42px;
            height: 42px;
            border-radius: 100px;
            object-fit: cover;
            background: #eef2fa;
            border: 1px solid #cbdae6;
        }
        .sprite-preview {
            width: 48px;
            height: 48px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            background-color: #f5f7fb;
        }
        .empty-row {
            text-align: center;
            padding: 40px;
            color: #6b8ba3;
        }
        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1f2f38;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        @media (max-width: 780px) {
            body { padding: 1rem; }
            .dashboard { flex-direction: column; }
        }
        .btn-reset-gist {
            background: #f0eef2;
            margin-left: 8px;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .gist-link {
            text-decoration: none;
            color: #1a5d7a;
            font-weight: 500;
        }
        .gist-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <div class="title">
            <h1><i class="fas fa-database" style="color:#2c9cd4;"></i> GistDrive · User Directory</h1>
            <p>Full CRUD with GitHub Gists | modern_user_data.json storage</p>
        </div>
        <div class="gist-status">
            <i class="fab fa-github"></i> <span id="gistLabel">⚡ Gist storage</span>
            <button id="resetGistBtn" class="btn btn-sm btn-reset-gist" title="Reset to sample data"><i class="fas fa-sync-alt"></i> reset</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="form-card">
            <h2><i class="fas fa-user-plus"></i> <span id="formTitle">Add New User</span></h2>
            <form id="userForm">
                <input type="hidden" id="editId" value="">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="name" placeholder="e.g., Taylor Chen" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Modern Email *</label>
                    <input type="email" id="modern_email" placeholder="hello@creativelabs.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-image"></i> Profile Picture URL</label>
                    <input type="url" id="profile_pic" placeholder="https://randomuser.me/api/portraits/women/68.jpg">
                </div>
                <div class="row-flex">
                    <div class="form-group">
                        <label><i class="fas fa-briefcase"></i> Position</label>
                        <input type="text" id="position" placeholder="Senior Designer">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="department" placeholder="Engineering / Product">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-cubes"></i> Sprite Image (URL)</label>
                    <input type="text" id="sprite_image" placeholder="https://cdn-icons-png.flaticon.com/512/1995/1995572.png">
                    <small style="color:#54809b;">48x48 preview in table</small>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 16px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-save"></i> Save User</button>
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem;">
                <h2><i class="fas fa-table-list"></i> Directory</h2>
                <button id="refreshTableBtn" class="btn btn-sm btn-secondary"><i class="fas fa-rotate-right"></i> Refresh</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="userTable">
                    <thead>
                        <tr><th>Avatar</th><th>Name</th><th>Email</th><th>Position</th><th>Dept</th><th>Sprite</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="empty-row">Loading data from Gist...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // GIST CONFIGURATION
    let GIST_ID = null;
    const GIST_FILENAME = "modern_user_data.json";
    
    // Helper functions
    function getGitHubToken() {
        let token = localStorage.getItem("github_gist_token");
        if (!token) {
            token = prompt("🔐 GitHub Personal Access Token Required\n\nCreate a token at: https://github.com/settings/tokens\nRequired scope: 'gist'\n\nEnter your token:", "");
            if (token && token.trim()) {
                localStorage.setItem("github_gist_token", token.trim());
                return token.trim();
            } else {
                alert("⚠️ A GitHub token with 'gist' scope is required to use this application.");
                return null;
            }
        }
        return token;
    }

    async function githubFetch(endpoint, options = {}) {
        const token = getGitHubToken();
        if (!token) throw new Error("No GitHub token provided");
        const headers = {
            "Authorization": `token ${token}`,
            "Accept": "application/vnd.github.v3+json",
            "Content-Type": "application/json",
        };
        const response = await fetch(`https://api.github.com${endpoint}`, { ...options, headers });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`GitHub API error ${response.status}: ${errText.substring(0, 150)}`);
        }
        return response.json();
    }

    async function getOrCreateGist() {
        const storedGistId = localStorage.getItem("gist_directory_id");
        if (storedGistId) {
            try {
                const gist = await githubFetch(`/gists/${storedGistId}`);
                if (gist && gist.id && gist.files[GIST_FILENAME]) {
                    GIST_ID = storedGistId;
                    return GIST_ID;
                }
            } catch(e) { 
                console.warn("Stored gist invalid, creating new one", e);
                localStorage.removeItem("gist_directory_id"); 
            }
        }
        
        // Create new gist with minimal structure (no sample data in HTML)
        const emptyStructure = { users: [] };
        const defaultContent = JSON.stringify(emptyStructure, null, 2);
        const files = { [GIST_FILENAME]: { content: defaultContent } };
        const newGist = await githubFetch(`/gists`, { 
            method: "POST", 
            body: JSON.stringify({ 
                description: "User Directory CRUD - modern_user_data.json", 
                public: false, 
                files 
            }) 
        });
        GIST_ID = newGist.id;
        localStorage.setItem("gist_directory_id", GIST_ID);
        return GIST_ID;
    }

    async function loadUsersFromGist() {
        if (!GIST_ID) await getOrCreateGist();
        try {
            const gist = await githubFetch(`/gists/${GIST_ID}`);
            const file = gist.files[GIST_FILENAME];
            if (!file || !file.content) return [];
            const data = JSON.parse(file.content);
            // Support both direct array and {users: []} structure
            let usersArray = Array.isArray(data) ? data : (data.users || []);
            return usersArray.map(u => ({ 
                ...u, 
                id: u.id || crypto.randomUUID?.() || Date.now() + "_" + Math.random().toString(36)
            }));
        } catch(e) {
            console.error("Load failed", e);
            return [];
        }
    }

    async function saveUsersToGist(usersArray) {
        if (!GIST_ID) await getOrCreateGist();
        // Store as object with users property for clarity
        const dataToStore = { users: usersArray };
        const content = JSON.stringify(dataToStore, null, 2);
        const patchData = { files: { [GIST_FILENAME]: { content } } };
        await githubFetch(`/gists/${GIST_ID}`, { method: "PATCH", body: JSON.stringify(patchData) });
        showToast("✅ Data synced to GitHub Gist");
    }

    async function resetToSample() {
        if (!confirm("⚠️ RESET will load sample data from modern_user_data.json file.\nContinue?")) return;
        
        // Fetch the sample JSON file from the same directory
        try {
            const response = await fetch('./modern_user_data.json');
            if (!response.ok) throw new Error('Could not load modern_user_data.json');
            const sampleData = await response.json();
            let sampleUsers = sampleData.users || [];
            
            // Ensure all users have IDs
            sampleUsers = sampleUsers.map(u => ({ 
                ...u, 
                id: u.id || crypto.randomUUID?.() || Date.now() + "_" + Math.random().toString(36)
            }));
            
            await saveUsersToGist(sampleUsers);
            await refreshTable();
            clearForm();
            showToast("🔥 Loaded sample data from modern_user_data.json");
        } catch (err) {
            console.error(err);
            showToast("❌ Could not load modern_user_data.json. Make sure the file exists in the same directory.", true);
        }
    }

    // UI State
    let currentUsers = [];
    
    async function refreshTable() {
        try {
            currentUsers = await loadUsersFromGist();
            renderTable(currentUsers);
            updateGistDisplay();
        } catch(err) {
            console.error(err);
            document.getElementById("tableBody").innerHTML = `<tr><td colspan="7" class="empty-row">⚠️ Error loading: ${err.message}. Check token & network.</td></tr>`;
            showToast("❌ Failed to load gist data", true);
        }
    }

    function updateGistDisplay() {
        const statusDiv = document.querySelector(".gist-status");
        const existingLink = statusDiv.querySelector('.gist-link');
        if (existingLink) existingLink.remove();
        
        if (GIST_ID) {
            const gistLink = document.createElement("a");
            gistLink.href = `https://gist.github.com/${GIST_ID}`;
            gistLink.target = "_blank";
            gistLink.className = "gist-link";
            gistLink.innerHTML = `<i class="fab fa-github"></i> gist/${GIST_ID.substring(0,8)}`;
            statusDiv.appendChild(gistLink);
        }
    }

    function renderTable(users) {
        const tbody = document.getElementById("tableBody");
        if (!users.length) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-row">📭 No users found. Click "Reset" to load sample data or add new users.</td></tr>`;
            return;
        }
        tbody.innerHTML = users.map(user => `
            <tr data-id="${user.id}">
                <td><img class="avatar-preview" src="${escapeHtml(user.profile_pic || 'https://via.placeholder.com/42?text=?' )}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.name||'U')}&background=9aa9bb&color=fff'"></td>
                <td><strong>${escapeHtml(user.name || '—')}</strong></td>
                <td>${escapeHtml(user.modern_email || '')}</td>
                <td>${escapeHtml(user.position || '—')}</td>
                <td>${escapeHtml(user.department || '—')}</td>
                <td><div class="sprite-preview" style="background-image: url('${escapeHtml(user.sprite_image || '')}'); background-size: contain; background-repeat: no-repeat; background-position:center;"></div></td>
                <td class="action-icons">
                    <button class="edit-btn" data-id="${user.id}" title="Edit"><i class="fas fa-pen"></i></button>
                    <button class="delete-btn" data-id="${user.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                </td>
            </tr>
        `).join('');
        
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const user = currentUsers.find(u => u.id === id);
                if (user) populateFormForEdit(user);
            });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                if (confirm("Delete this user permanently?")) {
                    const updated = currentUsers.filter(u => u.id !== id);
                    await saveUsersToGist(updated);
                    await refreshTable();
                    clearForm();
                    showToast("🗑️ User deleted");
                }
            });
        });
    }

    function populateFormForEdit(user) {
        document.getElementById("editId").value = user.id;
        document.getElementById("name").value = user.name || "";
        document.getElementById("modern_email").value = user.modern_email || "";
        document.getElementById("profile_pic").value = user.profile_pic || "";
        document.getElementById("position").value = user.position || "";
        document.getElementById("department").value = user.department || "";
        document.getElementById("sprite_image").value = user.sprite_image || "";
        document.getElementById("formTitle").innerHTML = '<i class="fas fa-user-edit"></i> Edit User';
        document.getElementById("submitBtn").innerHTML = '<i class="fas fa-pen"></i> Update User';
    }

    function clearForm() {
        document.getElementById("editId").value = "";
        document.getElementById("userForm").reset();
        document.getElementById("formTitle").innerHTML = '<i class="fas fa-user-plus"></i> Add New User';
        document.getElementById("submitBtn").innerHTML = '<i class="fas fa-save"></i> Save User';
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const editId = document.getElementById("editId").value;
        const newUser = {
            name: document.getElementById("name").value.trim(),
            modern_email: document.getElementById("modern_email").value.trim(),
            profile_pic: document.getElementById("profile_pic").value.trim(),
            position: document.getElementById("position").value.trim(),
            department: document.getElementById("department").value.trim(),
            sprite_image: document.getElementById("sprite_image").value.trim(),
        };
        
        if (!newUser.name || !newUser.modern_email) {
            showToast("Name and Email are required", true);
            return;
        }
        
        let updatedUsers = [...currentUsers];
        if (editId) {
            const index = updatedUsers.findIndex(u => u.id === editId);
            if (index !== -1) {
                updatedUsers[index] = { ...updatedUsers[index], ...newUser, id: editId };
            }
        } else {
            const newId = crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.random().toString(36);
            updatedUsers.push({ ...newUser, id: newId });
        }
        
        await saveUsersToGist(updatedUsers);
        await refreshTable();
        clearForm();
        showToast(editId ? "✏️ User updated" : "✨ New user added");
    }

    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }

    let toastTimeout;
    function showToast(msg, isError = false) {
        const existing = document.querySelector(".toast-msg");
        if(existing) existing.remove();
        const div = document.createElement("div");
        div.className = "toast-msg";
        div.style.background = isError ? "#bc4742" : "#2a6f8f";
        div.innerHTML = `<i class="fas ${isError ? 'fa-circle-exclamation' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(div);
        if(toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { div.style.opacity = "0"; setTimeout(() => div.remove(), 300); }, 2800);
    }

    // Initialize
    window.addEventListener("DOMContentLoaded", async () => {
        const token = getGitHubToken();
        if (!token) {
            document.getElementById("tableBody").innerHTML = `<tr><td colspan="7" class="empty-row">⚠️ GitHub token required. Refresh page and provide a valid token with 'gist' scope.</td></tr>`;
            return;
        }
        
        try {
            await getOrCreateGist();
            await refreshTable();
        } catch(err) {
            document.getElementById("tableBody").innerHTML = `<tr><td colspan="7" class="empty-row">❗ Gist setup error: ${err.message}. Ensure token has 'gist' scope.</td></tr>`;
            showToast("Gist initialization failed. Check token permissions.", true);
        }
        
        document.getElementById("userForm").addEventListener("submit", handleSubmit);
        document.getElementById("cancelEditBtn").addEventListener("click", clearForm);
        document.getElementById("refreshTableBtn").addEventListener("click", refreshTable);
        document.getElementById("resetGistBtn").addEventListener("click", resetToSample);
    });
</script>
</body>
</html>

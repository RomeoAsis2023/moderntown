<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ModernTown • P2P Virtual Office</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background:#0f172a; font-family:'Inter',sans-serif; overflow:hidden; height:100vh; color:#e2e8f0; }
        .app-container { display:flex; height:100vh; }
        .sidebar { width:85px; background:rgba(15,23,42,0.98); backdrop-filter:blur(12px); display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:24px 0; border-right:1px solid rgba(148,163,184,0.1); }
        .sidebar nav ul { list-style:none; display:flex; flex-direction:column; gap:28px; }
        .sidebar nav ul li a { width:52px; height:52px; background:rgba(255,255,255,0.08); border-radius:18px; display:flex; align-items:center; justify-content:center; transition:0.25s; }
        .sidebar nav ul li a:hover { background:#3b82f6; transform:scale(1.1); }
        .workspace { flex:1; display:flex; flex-direction:column; padding:16px 20px; gap:16px; background:#1e2937; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; background:#334155; padding:10px 28px; border-radius:9999px; }
        .canvas-wrapper { flex:1; background:#1e2937; border-radius:28px; border:4px solid #334155; overflow:hidden; position:relative; }
        canvas { display:block; background:#0f172a; }
        .bottom-panel { background:#334155; border-radius:24px; padding:12px 20px; display:flex; gap:16px; align-items:center; }
        .tab { padding:8px 20px; border-radius:9999px; cursor:pointer; }
        .tab.active { background:#0ea5e9; color:white; }
        .peer-count, .connection-status, .status-log { position:fixed; z-index:100; padding:6px 18px; border-radius:9999px; font-family:monospace; font-size:13px; }
        .peer-count { top:24px; right:280px; background:rgba(16,185,129,0.9); color:white; }
        .connection-status { top:24px; right:24px; background:rgba(15,23,42,0.95); }
        .status-log { bottom:24px; left:120px; background:rgba(15,23,42,0.95); color:#67e8f9; max-width:420px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .media-controls { position:fixed; top:80px; right:24px; background:#1e2937; padding:12px; border-radius:16px; display:flex; flex-direction:column; gap:8px; z-index:110; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div style="margin-bottom:24px;"><img width="52" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fff'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/%3E%3C/svg%3E"></div>
            <nav><ul>
                <li><a href="#"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%23fff' viewBox='0 0 24 24'%3E%3Cpath d='M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'/%3E%3C/svg%3E"></a></li>
            </ul></nav>
            <footer>
                <button id="openMediaBtn">🎤📹</button>
            </footer>
        </aside>

        <div class="workspace">
            <div class="top-bar">
                <div style="display:flex;align-items:center;gap:12px;">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 70'%3E%3Crect width='300' height='70' fill='%233b82f6' rx='12'/%3E%3Ctext x='24' y='48' fill='white' font-size='32' font-weight='700'%3EModernTown%3C/text%3E%3C/svg%3E" style="height:42px;">
                    <span style="background:linear-gradient(90deg,#22c55e,#10b981);padding:4px 16px;border-radius:9999px;font-size:13px;font-weight:600;">🔴 LIVE P2P</span>
                </div>
                <div id="myNameDisplay" style="background:#1e2937;padding:6px 16px;border-radius:9999px;font-weight:600;"></div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="officeCanvas" width="1600" height="950"></canvas>
            </div>

            <div class="bottom-panel">
                <div onclick="switchTab(0)" class="tab active" id="tab0">📦 Objects</div>
                <div onclick="switchTab(1)" class="tab" id="tab1">💬 Chat</div>
                <div id="objectsDock" style="display:flex;gap:12px;overflow-x:auto;flex:1;padding:4px;"></div>
            </div>
        </div>
    </div>

    <!-- Media Controls -->
    <div class="media-controls" id="mediaPanel" style="display:none;">
        <button onclick="toggleMic()" id="micBtn" style="background:#10b981;color:white;padding:12px 24px;border:none;border-radius:9999px;">🎤 Mic ON</button>
        <button onclick="toggleCamera()" id="camBtn" style="background:#10b981;color:white;padding:12px 24px;border:none;border-radius:9999px;">📹 Camera ON</button>
        <div id="localPreview" style="width:180px;height:135px;background:#000;border-radius:12px;overflow:hidden;margin-top:8px;display:none;"></div>
    </div>

    <div class="peer-count" id="peerCount">👥 1 online</div>
    <div class="connection-status" id="connectionStatus">🟢 Connecting...</div>
    <div class="status-log" id="statusLog">Loading...</div>

    <!-- Onboarding -->
    <dialog id="onboardingModal" style="border:none;border-radius:24px;background:#1e2937;color:#e2e8f0;width:480px;">
        <div style="padding:24px 32px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;">
            <h2>Welcome to ModernTown</h2>
            <button onclick="this.closest('dialog').close()" style="background:none;border:none;font-size:28px;color:#64748b;cursor:pointer;">✕</button>
        </div>
        <div style="padding:32px;">
            <input id="profileName" placeholder="Your Name" style="width:100%;padding:14px;margin-bottom:16px;border-radius:12px;background:#334155;border:none;color:white;">
            <button onclick="saveProfileAndStart()" style="width:100%;padding:16px;background:#0ea5e9;color:white;border:none;border-radius:9999px;font-size:17px;font-weight:600;">
                Enter Office
            </button>
        </div>
    </dialog>

    <script type="module">
        import webconnect from 'https://cdn.jsdelivr.net/npm/webconnect/dist/esm/webconnect.js';

        const connect = webconnect();
        let myConnectId = null;
        let connectedPeers = new Set();
        let peerAvatars = new Map();
        let sceneItems = [];
        let selfAvatar = null;
        let profile = null;

        const canvas = document.getElementById('officeCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1600, H = 950;
        canvas.width = W; canvas.height = H;

        let keys = {};
        let lastBroadcast = 0;

        // Sprite settings (4×4)
        let FRAME_COLS = 4, FRAME_ROWS = 4, FRAME_W = 64, FRAME_H = 64;

        let availableObjects = [
            { id: "chair", name: "Chair", spriteUrl: "./objects/sprites/chair_1.png", defaultW: 21, defaultH: 35 },
            { id: "desk", name: "Desk", spriteUrl: "./objects/sprites/desk_1.png", defaultW: 56, defaultH: 55 },
            { id: "workspace", name: "Workspace", spriteUrl: "./objects/sprites/workspace.png", defaultW: 500, defaultH: 300 }
        ];

        let localStream = null;
        let micOn = true, camOn = true;

        // ==================== PROFILE ====================
        function loadProfile() {
            const saved = localStorage.getItem('modernTownProfile');
            if (saved) {
                profile = JSON.parse(saved);
                document.getElementById('myNameDisplay').textContent = profile.name;
                return true;
            }
            return false;
        }

        window.saveProfileAndStart = function() {
            const name = document.getElementById('profileName').value.trim() || "Player" + Math.floor(Math.random()*999);
            profile = { name, spriteUrl: "./objects/sprites/character_sprite.png" };
            localStorage.setItem('modernTownProfile', JSON.stringify(profile));
            document.getElementById('onboardingModal').close();
            document.getElementById('myNameDisplay').textContent = profile.name;
            createSelfAvatar();
            initApp();
        };

        // ==================== AVATAR ====================
        function createSelfAvatar() {
            selfAvatar = {
                id: 'self',
                name: profile.name,
                x: W/2 - 32,
                y: H/2 - 32,
                w: 64, h: 64,
                spriteUrl: profile.spriteUrl,
                spriteImg: null,
                direction: 0,
                frame: 0,
                speed: 5
            };
            const img = new Image();
            img.onload = () => { selfAvatar.spriteImg = img; FRAME_W = img.width/4; FRAME_H = img.height/4; };
            img.src = selfAvatar.spriteUrl;
        }

        function renderAvatar(av) {
            if (!av.spriteImg) {
                ctx.fillStyle = av.id === 'self' ? '#22c55e' : '#3b82f6';
                ctx.fillRect(av.x, av.y, av.w, av.h);
                return;
            }
            const sx = av.frame * FRAME_W;
            const sy = av.direction * FRAME_H;
            ctx.drawImage(av.spriteImg, sx, sy, FRAME_W, FRAME_H, av.x, av.y, av.w, av.h);
        }

        // ==================== MOVEMENT (WASD + Arrows) ====================
        function updateMovement() {
            if (!selfAvatar) return;
            let vx = 0, vy = 0;
            if (keys['w'] || keys['arrowup']) vy -= selfAvatar.speed;
            if (keys['s'] || keys['arrowdown']) vy += selfAvatar.speed;
            if (keys['a'] || keys['arrowleft']) vx -= selfAvatar.speed;
            if (keys['d'] || keys['arrowright']) vx += selfAvatar.speed;

            const moving = vx !== 0 || vy !== 0;
            if (moving) {
                if (vx && vy) { const l = Math.hypot(vx,vy); vx = vx/l * selfAvatar.speed; vy = vy/l * selfAvatar.speed; }
                selfAvatar.x = Math.max(10, Math.min(W-74, selfAvatar.x + vx));
                selfAvatar.y = Math.max(10, Math.min(H-74, selfAvatar.y + vy));

                selfAvatar.direction = Math.abs(vy) > Math.abs(vx) ? (vy > 0 ? 0 : 3) : (vx > 0 ? 2 : 1);
                selfAvatar.frame = (selfAvatar.frame + 1) % 4;
            } else {
                selfAvatar.frame = 0;
            }

            if (moving && Date.now() - lastBroadcast > 60) {
                broadcastAvatar();
                lastBroadcast = Date.now();
            }
        }

        function broadcastAvatar() {
            const data = { type: 'avatar', payload: { id: selfAvatar.id, name: selfAvatar.name, x: selfAvatar.x, y: selfAvatar.y, direction: selfAvatar.direction, frame: selfAvatar.frame } };
            connectedPeers.forEach(p => {
                try { connect.Send(JSON.stringify(data), { connectId: p }); } catch(e){}
            });
        }

        // ==================== RENDER ====================
        function render() {
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0,0,W,H);

            // grid
            ctx.strokeStyle = '#334155';
            for (let i=0; i<W; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
            for (let i=0; i<H; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

            // objects
            sceneItems.forEach(o => {
                ctx.fillStyle = '#64748b';
                ctx.fillRect(o.x||100, o.y||100, o.w||64, o.h||64);
            });

            peerAvatars.forEach(av => renderAvatar(av));
            if (selfAvatar) renderAvatar(selfAvatar);
        }

        function loop() {
            updateMovement();
            render();
            requestAnimationFrame(loop);
        }

        // ==================== MEDIA ====================
        window.toggleMic = async function() {
            micOn = !micOn;
            document.getElementById('micBtn').textContent = micOn ? '🎤 Mic ON' : '🎤 Mic OFF';
            document.getElementById('micBtn').style.background = micOn ? '#10b981' : '#ef4444';
            if (micOn && !localStream) localStream = await navigator.mediaDevices.getUserMedia({audio:true});
        };

        window.toggleCamera = async function() {
            camOn = !camOn;
            document.getElementById('camBtn').textContent = camOn ? '📹 Camera ON' : '📹 Camera OFF';
            document.getElementById('camBtn').style.background = camOn ? '#10b981' : '#ef4444';
            const prev = document.getElementById('localPreview');
            if (camOn) {
                const stream = await navigator.mediaDevices.getUserMedia({video:true});
                const video = document.createElement('video');
                video.autoplay = true; video.muted = true; video.srcObject = stream;
                prev.innerHTML = ''; prev.appendChild(video); prev.style.display = 'block';
            } else {
                prev.style.display = 'none';
            }
        };

        // ==================== P2P ====================
        function handleMessage(data, sender) {
            try {
                const msg = JSON.parse(data);
                if (msg.type === 'avatar') {
                    let p = peerAvatars.get(sender);
                    if (!p) {
                        p = { ...msg.payload, spriteImg: null };
                        peerAvatars.set(sender, p);
                        const img = new Image();
                        img.src = "./objects/sprites/character_sprite.png";
                        img.onload = () => p.spriteImg = img;
                    } else {
                        Object.assign(p, msg.payload);
                    }
                }
            } catch(e) {}
        }

        function initApp() {
            connect.getMyId(a => {
                myConnectId = a.connectId;
                document.getElementById('connectionStatus').innerHTML = '🟢 P2P Connected';
            });

            connect.onConnect(a => {
                connectedPeers.add(a.connectId);
                document.getElementById('peerCount').innerHTML = `👥 ${connectedPeers.size + 1} online`;
                broadcastAvatar();
            });

            connect.onDisconnect(a => {
                connectedPeers.delete(a.connectId);
                peerAvatars.delete(a.connectId);
                document.getElementById('peerCount').innerHTML = `👥 ${connectedPeers.size + 1} online`;
            });

            connect.onReceive((data, attr) => handleMessage(data, attr.connectId));

            // Keyboard
            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

            // Objects panel
            const dock = document.getElementById('objectsDock');
            availableObjects.forEach(obj => {
                const d = document.createElement('div');
                d.style = 'background:#1e2937;border-radius:12px;padding:8px;text-align:center;cursor:grab;min-width:70px;';
                d.innerHTML = `<img src="${obj.spriteUrl}" style="width:48px;height:48px;"><div style="font-size:12px;margin-top:4px;">${obj.name}</div>`;
                d.draggable = true;
                d.ondragstart = ev => ev.dataTransfer.setData('text', JSON.stringify(obj));
                dock.appendChild(d);
            });

            canvas.ondragover = e => e.preventDefault();
            canvas.ondrop = e => {
                e.preventDefault();
                const obj = JSON.parse(e.dataTransfer.getData('text'));
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (W / rect.width) - obj.defaultW/2;
                const y = (e.clientY - rect.top) * (H / rect.height) - obj.defaultH/2;
                sceneItems.push({id: 'obj'+Date.now(), ...obj, x, y});
                render();
            };

            // Media panel
            document.getElementById('openMediaBtn').onclick = () => {
                const p = document.getElementById('mediaPanel');
                p.style.display = p.style.display === 'none' ? 'flex' : 'none';
            };

            loop();
            setInterval(() => broadcastAvatar(), 150);
            document.getElementById('statusLog').innerHTML = '✅ All systems ready — WASD to move';
        }

        window.switchTab = function(n) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
        };

        window.onload = () => {
            if (!loadProfile()) document.getElementById('onboardingModal').showModal();
            else { createSelfAvatar(); initApp(); }
        };
    </script>
</body>
</html>

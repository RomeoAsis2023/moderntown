<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>webConnect.js Video Room</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:#0f172a;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
}

#app{
  width:100%;
  min-height:100vh;
  padding:24px;
}

.header{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}

.header h1{
  font-size:24px;
}

.roomBox{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.roomBox input{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  min-width:220px;
}

.roomBox button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.roomBox button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

#status{
  font-size:14px;
  opacity:.8;
  margin-top:8px;
}

#videos{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:22px;
}

.videoCard{
  position:relative;
  background:#111827;
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 14px 40px rgba(0,0,0,.25);
}

.videoCard video{
  width:100%;
  aspect-ratio:16/10;
  object-fit:cover;
  background:#020617;
  display:block;
}

.videoName{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,.62);
  backdrop-filter:blur(8px);
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
}

.videoControls{
  position:absolute;
  left:50%;
  bottom:12px;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(10px);
  padding:8px;
  border-radius:999px;
}

.iconBtn{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.16);
  color:white;
  cursor:pointer;
  font-size:18px;
}

.iconBtn.off{
  background:#dc2626;
}

.iconBtn.remote{
  cursor:default;
}

.notice{
  margin-top:20px;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  font-size:14px;
  line-height:1.5;
  color:#cbd5e1;
}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div>
      <h1>webConnect.js P2P Video Room</h1>
      <div id="status">Not connected</div>
    </div>

    <div class="roomBox">
      <input id="roomInput" value="demo-room" placeholder="Room name" />
      <button id="joinBtn">Join Room</button>
    </div>
  </div>

  <div id="videos"></div>

  <div class="notice">
    This is a browser-only P2P prototype using webConnect.js ESM. It can work for small rooms, but large Zoom-style conferencing still needs a real SFU/media server for reliability.
  </div>
</div>

<script type="module">
import webconnect from 'https://cdn.jsdelivr.net/npm/webconnect/dist/esm/webconnect.js'

const videos = document.getElementById('videos')
const statusEl = document.getElementById('status')
const joinBtn = document.getElementById('joinBtn')
const roomInput = document.getElementById('roomInput')

let connect = null
let localStream = null
let myConnectId = null
let roomName = null

let localState = {
  video:true,
  mic:true,
  speaker:true
}

const peerStates = {}
const peerCards = {}
const peerConnections = {}

joinBtn.onclick = async () => {
  joinBtn.disabled = true
  roomName = roomInput.value.trim() || 'demo-room'

  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    })
  }catch(error){
    alert('Camera and microphone permission are required.')
    joinBtn.disabled = false
    return
  }

  createVideoCard('local', localStream, 'You', true)

  connect = webconnect({
    room: roomName
  })

  connect.getMyId(attribute => {
    myConnectId = attribute.connectId
    statusEl.textContent = 'Connected as ' + myConnectId + ' · Room: ' + roomName
    broadcastState()
  })

  connect.onConnect(async attribute => {
    const peerId = attribute.connectId
    statusEl.textContent = peerId + ' connected'

    await startCall(peerId, true)
    broadcastState(peerId)
  })

  connect.onDisconnect(attribute => {
    const peerId = attribute.connectId
    removePeer(peerId)
    statusEl.textContent = peerId + ' disconnected'
  })

  connect.onReceive(async (data, attribute) => {
    const peerId = attribute.connectId

    if(!data || !data.type) return

    if(data.type === 'state'){
      peerStates[peerId] = data.state
      updateRemoteControls(peerId)
      return
    }

    if(data.type === 'webrtc-offer'){
      await handleOffer(peerId, data.offer)
      return
    }

    if(data.type === 'webrtc-answer'){
      await handleAnswer(peerId, data.answer)
      return
    }

    if(data.type === 'webrtc-ice'){
      await handleIce(peerId, data.candidate)
      return
    }
  })
}

async function startCall(peerId, polite){
  if(peerConnections[peerId]) return peerConnections[peerId]

  const pc = createPeerConnection(peerId)

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream)
  })

  if(polite){
    const offer = await pc.createOffer()
    await pc.setLocalDescription(offer)

    connect.Send({
      type:'webrtc-offer',
      offer:pc.localDescription
    }, {
      connectId:peerId
    })
  }

  return pc
}

function createPeerConnection(peerId){
  const pc = new RTCPeerConnection({
    iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:global.stun.twilio.com:3478'}
    ]
  })

  peerConnections[peerId] = pc

  pc.onicecandidate = event => {
    if(event.candidate){
      connect.Send({
        type:'webrtc-ice',
        candidate:event.candidate
      }, {
        connectId:peerId
      })
    }
  }

  pc.ontrack = event => {
    const stream = event.streams[0]
    if(stream){
      createVideoCard(peerId, stream, 'Peer ' + peerId, false)
      updateRemoteControls(peerId)
    }
  }

  pc.onconnectionstatechange = () => {
    if(['closed','failed','disconnected'].includes(pc.connectionState)){
      removePeer(peerId)
    }
  }

  return pc
}

async function handleOffer(peerId, offer){
  const pc = await startCall(peerId, false)

  await pc.setRemoteDescription(new RTCSessionDescription(offer))

  const answer = await pc.createAnswer()
  await pc.setLocalDescription(answer)

  connect.Send({
    type:'webrtc-answer',
    answer:pc.localDescription
  }, {
    connectId:peerId
  })
}

async function handleAnswer(peerId, answer){
  const pc = peerConnections[peerId]
  if(!pc) return

  await pc.setRemoteDescription(new RTCSessionDescription(answer))
}

async function handleIce(peerId, candidate){
  const pc = peerConnections[peerId]
  if(!pc || !candidate) return

  try{
    await pc.addIceCandidate(new RTCIceCandidate(candidate))
  }catch(error){
    console.warn('ICE candidate error', error)
  }
}

function createVideoCard(id, stream, name, isLocal){
  if(peerCards[id]){
    const existingVideo = peerCards[id].querySelector('video')
    existingVideo.srcObject = stream
    return
  }

  const card = document.createElement('div')
  card.className = 'videoCard'
  card.id = 'card-' + id

  card.innerHTML = `
    <video autoplay playsinline ${isLocal ? 'muted' : ''}></video>
    <div class="videoName">${escapeHTML(name)}</div>
    <div class="videoControls">
      <button class="iconBtn videoToggle" title="Video">📹</button>
      <button class="iconBtn speakerToggle" title="Speaker">🔊</button>
      <button class="iconBtn micToggle" title="Mic">🎙️</button>
    </div>
  `

  videos.appendChild(card)

  const video = card.querySelector('video')
  video.srcObject = stream

  const videoBtn = card.querySelector('.videoToggle')
  const speakerBtn = card.querySelector('.speakerToggle')
  const micBtn = card.querySelector('.micToggle')

  if(isLocal){
    speakerBtn.style.display = 'none'

    videoBtn.onclick = () => {
      localState.video = !localState.video
      localStream.getVideoTracks().forEach(track => track.enabled = localState.video)
      videoBtn.classList.toggle('off', !localState.video)
      videoBtn.textContent = localState.video ? '📹' : '📷'
      broadcastState()
    }

    micBtn.onclick = () => {
      localState.mic = !localState.mic
      localStream.getAudioTracks().forEach(track => track.enabled = localState.mic)
      micBtn.classList.toggle('off', !localState.mic)
      micBtn.textContent = localState.mic ? '🎙️' : '🔇'
      broadcastState()
    }
  }else{
    videoBtn.classList.add('remote')
    micBtn.classList.add('remote')

    videoBtn.disabled = true
    micBtn.disabled = true

    speakerBtn.onclick = () => {
      const muted = !video.muted
      video.muted = muted
      speakerBtn.classList.toggle('off', muted)
      speakerBtn.textContent = muted ? '🔈' : '🔊'
    }
  }

  peerCards[id] = card
}

function updateRemoteControls(peerId){
  const card = peerCards[peerId]
  const state = peerStates[peerId]
  if(!card || !state) return

  const videoBtn = card.querySelector('.videoToggle')
  const micBtn = card.querySelector('.micToggle')

  videoBtn.classList.toggle('off', !state.video)
  micBtn.classList.toggle('off', !state.mic)

  videoBtn.textContent = state.video ? '📹' : '📷'
  micBtn.textContent = state.mic ? '🎙️' : '🔇'
}

function broadcastState(targetPeerId = null){
  if(!connect) return

  const payload = {
    type:'state',
    state:{...localState}
  }

  if(targetPeerId){
    connect.Send(payload, {connectId:targetPeerId})
  }else{
    connect.Send(payload)
  }
}

function removePeer(peerId){
  if(peerConnections[peerId]){
    peerConnections[peerId].close()
    delete peerConnections[peerId]
  }

  if(peerCards[peerId]){
    peerCards[peerId].remove()
    delete peerCards[peerId]
  }

  delete peerStates[peerId]
}

function escapeHTML(str){
  return String(str).replace(/[&<>'"]/g, char => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#039;',
    '"':'&quot;'
  }[char]))
}
</script>
</body>
</html>

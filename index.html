<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gather Town • Global Room</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; background:#0a0a0a; font-family:'Press Start 2P',system-ui; overflow:hidden; color:#fff; }
        canvas { display:block; image-rendering:pixelated; background:#1a3a1a; }
        
        #joinOverlay {
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:10000;
        }
        .join-card {
            background:#111214; border:4px solid #5865f2; border-radius:16px; padding:40px; text-align:center; width:90%; max-width:420px;
        }
        button {
            background:#5865f2; color:white; border:none; padding:14px 32px; font-size:16px; cursor:pointer; border-radius:8px; margin-top:10px; width:100%;
        }
        button:hover { background:#4752c4; }
        
        #controls {
            position:absolute; top:12px; left:12px; display:flex; gap:6px; z-index:100;
        }
        #selfVideoContainer {
            position:absolute; bottom:100px; left:12px; border:4px solid #0ff; box-shadow:0 0 20px #0ff; background:#000; display:none;
        }
        video { width:180px; display:block; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1024" height="768"></canvas>

    <!-- Join Screen -->
    <div id="joinOverlay">
        <div class="join-card">
            <h1 style="color:#5865f2; margin-bottom:10px;">GATHER TOWN</h1>
            <p style="margin-bottom:20px; color:#aaa;">Global Room • Sprite Edition</p>
            <button onclick="joinRoom()">ENTER GLOBAL ROOM</button>
            <small style="display:block; margin-top:15px; color:#666;">WASD to move • Upload 96×128 sprite</small>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls" style="display:none;">
        <button onclick="uploadSprite()">📤 SPRITE</button>
        <button onclick="toggleCamera()" id="camBtn">📹 ON</button>
        <button onclick="toggleMic()" id="micBtn">🎤 ON</button>
    </div>

    <div id="selfVideoContainer">
        <video id="selfVideo" autoplay playsinline muted></video>
    </div>

    <script>
        let peer, myPeerId, canvas, ctx;
        let myX = 512, myY = 384, myDir = 0, myFrame = 0, animTime = 0;
        let keys = {}, lastSync = 0;
        let spriteSheetImg = null;
        let players = {}, spriteSheets = {};
        let myProfile = {name: "Player"};
        let myStream = null;
        let connections = new Map();

        const ROOM = "gather-global-v18";

        window.onload = () => {
            canvas = document.getElementById("canvas");
            ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
        };

        async function joinRoom() {
            document.getElementById("joinOverlay").style.display = "none";
            document.getElementById("controls").style.display = "flex";

            myPeerId = "p-" + Math.random().toString(36).slice(2, 10);
            myProfile.name = "P" + myPeerId.slice(0,4);

            peer = new Peer(myPeerId);

            peer.on("open", () => {
                console.log("✅ Joined global room as", myPeerId);
            });

            peer.on("connection", conn => {
                connections.set(conn.peer, conn);
                conn.on("open", () => conn.send({type:"profile", name:myProfile.name}));
                conn.on("data", data => handleData(data, conn.peer));
            });

            initMedia();
            setupInput();
            gameLoop();
        }

        function handleData(data, peerId) {
            if (data.type === "position") {
                players[peerId] = data.pos;
                if (data.sprite && !spriteSheets[peerId]) {
                    const img = new Image();
                    img.src = data.sprite;
                    img.onload = () => spriteSheets[peerId] = img;
                }
            }
        }

        function syncPosition() {
            const data = {
                type: "position",
                pos: { x: Math.round(myX), y: Math.round(myY), dir: myDir, frame: Math.floor(myFrame) },
                sprite: myProfile.spriteDataURL
            };
            connections.forEach(conn => {
                if (conn.open) conn.send(data);
            });
        }

        async function initMedia() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { width: 320, height: 240 } });
                document.getElementById("selfVideo").srcObject = myStream;
                document.getElementById("selfVideoContainer").style.display = "block";
            } catch(e) {}
        }

        function uploadSprite() {
            const input = document.createElement("input");
            input.type = "file"; input.accept = "image/png";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        if (img.width !== 96 || img.height !== 128) return alert("Must be 96×128 sprite sheet!");
                        spriteSheetImg = img;
                        myProfile.spriteDataURL = ev.target.result;
                    };
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function toggleCamera() {
            if (!myStream) return;
            const track = myStream.getVideoTracks()[0];
            if (track) track.enabled = !track.enabled;
        }

        function toggleMic() {
            if (!myStream) return;
            const track = myStream.getAudioTracks()[0];
            if (track) track.enabled = !track.enabled;
        }

        function toggleSpeaker() {
            const btn = document.getElementById("speakerBtn");
            const isOn = btn.textContent.includes("ON");
            btn.textContent = isOn ? "🔇 OFF" : "🔊 ON";
        }

        function setupInput() {
            window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
            window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        }

        function drawSprite(img, x, y, dir, frame) {
            if (!img) {
                ctx.fillStyle = "#0ff";
                ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI*2); ctx.fill();
                return;
            }
            ctx.drawImage(img, frame*32, dir*32, 32, 32, x-16, y-16, 32, 32);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, 1024, 768);
            ctx.fillStyle = "#1a3a1a";
            ctx.fillRect(0, 0, 1024, 768);

            // Grid
            ctx.strokeStyle = "#0a2a0a";
            for (let i = 0; i < 1024; i += 32) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,768); ctx.stroke(); }
            for (let i = 0; i < 768; i += 32) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(1024,i); ctx.stroke(); }

            // Other players
            for (let id in players) {
                const p = players[id];
                drawSprite(spriteSheets[id], p.x, p.y, p.dir, p.frame);
                ctx.fillStyle = "#0ff";
                ctx.font = "11px Press Start 2P";
                ctx.textAlign = "center";
                ctx.fillText(p.name || "?", p.x, p.y - 28);
            }

            // Self
            drawSprite(spriteSheetImg, myX, myY, myDir, Math.floor(myFrame));
            ctx.fillStyle = "#0f0";
            ctx.font = "11px Press Start 2P";
            ctx.textAlign = "center";
            ctx.fillText(myProfile.name, myX, myY - 28);

            // Movement
            let moved = false, speed = 4.2;
            if (keys["w"] || keys["arrowup"])    { myY -= speed; myDir = 3; moved = true; }
            if (keys["s"] || keys["arrowdown"])  { myY += speed; myDir = 0; moved = true; }
            if (keys["a"] || keys["arrowleft"])  { myX -= speed; myDir = 1; moved = true; }
            if (keys["d"] || keys["arrowright"]) { myX += speed; myDir = 2; moved = true; }

            if (moved) animTime += 0.22;
            myFrame = moved ? (animTime % 3) : 0;

            myX = Math.max(20, Math.min(1004, myX));
            myY = Math.max(20, Math.min(748, myY));

            if (Date.now() - lastSync > 70) {
                syncPosition();
                lastSync = Date.now();
            }

            requestAnimationFrame(gameLoop);
        }

        function sendChat() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;
            const div = document.getElementById("messages");
            const line = document.createElement("div");
            line.textContent = `${myProfile.name}: ${input.value}`;
            div.appendChild(line);
            div.scrollTop = div.scrollHeight;
            input.value = "";
        }

        window.joinRoom = joinRoom;
        window.uploadSprite = uploadSprite;
        window.toggleCamera = toggleCamera;
        window.toggleMic = toggleMic;
        window.toggleSpeaker = toggleSpeaker;
        window.sendChat = sendChat;
    </script>
</body>
</html>

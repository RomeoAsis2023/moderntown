<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern Town Virtual office</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0f172a;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

#ui{
  position:fixed;
  inset:0;
  z-index:9999;
  width:100%;
  height:100%;
  background:rgba(15,23,42,.96);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:15px;
}

.logoWrap{text-align:center}
.logoWrap img{max-width:220px;height:auto}

#uiInner{
  width:380px;
  max-width:calc(100vw - 30px);
  background:rgba(0,0,0,.72);
  padding:24px;
  border-radius:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

#ui h1{
  font-size:20px;
  margin-bottom:14px;
  text-align:center;
}

#ui input,
#ui button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}

#ui input{
  background:#fff;
  color:#0f172a;
}

#ui button{
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#ui button:disabled{opacity:.55}

#status{
  font-size:13px;
  color:#cbd5e1;
  line-height:1.4;
  text-align:center;
}

.userPreview{
  display:none;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

.userPreview img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
  background:#020617;
}

.userPreview strong{display:block;font-size:14px}
.userPreview span{display:block;font-size:12px;color:#cbd5e1;margin-top:2px}

#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:32px 32px;
}

.player{
  position:absolute;
  width:96px;
  height:96px;
}

.nameTag{
  position:absolute;
  top:-20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.7);
  padding:3px 8px;
  border-radius:999px;
  font-size:12px;
  white-space:nowrap;
}

.busyLabel{
  position:absolute;
  top:-44px;
  left:50%;
  transform:translateX(-50%);
  background:#dc2626;
  color:white;
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
  display:none;
  white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.sprite{
  position:absolute;
  left:32px;
  top:8px;
  width:32px;
  height:32px;
  image-rendering:pixelated;
  background-repeat:no-repeat;
  background-size:96px 128px;
  transform:scale(2);
  transform-origin:top left;
}

.chatBubble{
  position:absolute;
  top:-42px;
  left:50%;
  transform:translateX(-50%);
  width:34px;
  height:34px;
  border-radius:50%;
  border:none;
  background:#2563eb;
  color:white;
  font-size:17px;
  cursor:pointer;
  display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.player.nearby .chatBubble{display:block}

#help{
  position:fixed;
  bottom:12px;
  left:12px;
  z-index:999;
  background:rgba(0,0,0,.72);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:#cbd5e1;
  line-height:1.5;
}

.modal{
  position:fixed;
  inset:0;
  z-index:99999;
  background:rgba(0,0,0,.68);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalBox{
  width:420px;
  max-width:calc(100vw - 24px);
  background:#111827;
  border:1px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.modalBox.wide{
  width:800px;
}

.modalBox h2{
  font-size:19px;
  margin-bottom:8px;
}

.modalBox p{
  font-size:14px;
  color:#cbd5e1;
  line-height:1.5;
  margin-bottom:12px;
}

.profileHeader,
.requestUserCard{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:10px;
}

.profileHeader img,
.requestUserCard img{
  width:48px;
  height:48px;
  border-radius:50%;
  object-fit:cover;
  background:#020617;
  border:2px solid rgba(255,255,255,.14);
}

.profileHeader strong,
.requestUserCard strong{display:block;font-size:14px}
.profileHeader span,
.requestUserCard span{display:block;font-size:12px;color:#cbd5e1;margin-top:2px}

.previewVideo,
.remoteVideo{
  width:100%;
  background:#020617;
  object-fit:cover;
  border-radius:14px;
}

.previewVideo{
  height:210px;
  margin-bottom:12px;
}

.remoteVideo{height:360px}

.callGrid{
  display:grid;
  grid-template-columns:1fr 230px;
  gap:12px;
  margin-bottom:12px;
}

.sidePanel{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.localPreview{
  width:100%;
  height:120px;
  background:#020617;
  object-fit:cover;
  border-radius:12px;
}

.modalControls,
.callControls{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:12px;
}

.iconBtn{
  width:38px;
  height:38px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.iconBtn.off{background:#dc2626}

.modalActions{
  display:flex;
  gap:8px;
}

.modalActions button,
.sendBtn{
  padding:11px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.modalActions button{flex:1}

.acceptBtn,
.callBtn,
.sendBtn{background:#16a34a}

.declineBtn,
.cancelBtn{background:#dc2626}

.chatBox{
  height:185px;
  background:#020617;
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:10px;
  overflow:auto;
  font-size:13px;
  color:#e5e7eb;
}

.chatMsg{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  line-height:1.35;
}

.chatMsg img{
  width:28px;
  height:28px;
  border-radius:50%;
  object-fit:cover;
  background:#1f2937;
  flex:none;
}

.chatMsg .bubble{
  flex:1;
}

.chatMsg b{color:#93c5fd}
.chatMsg.system{display:block;color:#cbd5e1;font-style:italic}

.chatInputRow{
  display:flex;
  gap:8px;
}

.chatInputRow input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

@media(max-width:760px){
  .modalBox.wide{width:calc(100vw - 20px)}
  .callGrid{grid-template-columns:1fr}
  .remoteVideo{height:260px}
}
</style>
</head>

<body>

<audio id="ringtoneAudio" src="https://romeoasis2023.github.io/moderntown/newmessage.mp3" loop preload="auto"></audio>
<audio id="joinBellAudio" src="https://romeoasis2023.github.io/moderntown/bell_ring.mp3" preload="auto"></audio>

<div id="ui">
  <div class="logoWrap">
    <img src="https://romeoasis2023.github.io/moderntown/logomt.png" alt="Modern Town" />
  </div>

  <div id="uiInner">
    <h1>Virtual Office</h1>

    <input id="roomInput" type="hidden" value="demo-room" />

    <input id="emailInput" type="email" placeholder="Enter your Modern email" autocomplete="email" />

    <div id="userPreview" class="userPreview">
      <img id="userPreviewPic" alt="Profile" />
      <div>
        <strong id="userPreviewName"></strong>
        <span id="userPreviewMeta"></span>
      </div>
    </div>

    <button id="joinBtn">Join Room</button>

    <div id="status">Enter your Modern email to continue.</div>
  </div>
</div>

<div id="help">
  Login uses <b>modern_email</b> from JSON<br>
  URL still becomes <b>?name=JSON name</b><br>
  Sprite uses <b>sprite_image</b><br>
  W A S D = Move Sprite<br>
  💬 appears only when near another player (80px)<br>
  1-on-1 call only
</div>

<div id="scene"></div>

<div id="requestModal" class="modal">
  <div class="modalBox">
    <h2 id="requestTitle">Video Call</h2>

    <div class="requestUserCard">
      <img id="requestProfilePic" alt="Caller profile" />
      <div>
        <strong id="requestUserName">Peer</strong>
        <span id="requestUserMeta">Video call request</span>
      </div>
    </div>

    <p id="requestText">Call request</p>

    <video id="requestPreview" class="previewVideo" autoplay playsinline muted></video>

    <div class="modalControls">
      <button id="requestVideoBtn" class="iconBtn">📹</button>
      <button id="requestMicBtn" class="iconBtn">🎙️</button>
    </div>

    <div id="requestActions" class="modalActions"></div>
  </div>
</div>

<div id="callModal" class="modal">
  <div class="modalBox wide">
    <div class="profileHeader">
      <img id="callProfilePic" alt="Peer profile" />
      <div>
        <h2 id="callTitle">Video Chat</h2>
        <span id="callUserMeta"></span>
      </div>
    </div>

    <div class="callGrid">
      <div>
        <video id="remoteVideo" class="remoteVideo" autoplay playsinline></video>
      </div>

      <div class="sidePanel">
        <video id="localPreview" class="localPreview" autoplay playsinline muted></video>

        <div class="callControls">
          <button id="callVideoBtn" class="iconBtn">📹</button>
          <button id="callMicBtn" class="iconBtn">🎙️</button>
          <button id="callSpeakerBtn" class="iconBtn">🔊</button>
          <button id="callEndBtn" class="iconBtn off">❌</button>
        </div>

        <div id="chatBox" class="chatBox"></div>

        <div class="chatInputRow">
          <input id="chatInput" placeholder="Type message..." />
          <button id="sendChatBtn" class="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import webconnect from 'https://cdn.jsdelivr.net/npm/webconnect/dist/esm/webconnect.js'

const USERS_JSON_URL = 'https://gist.githubusercontent.com/RomeoAsis2023/dcb6239ab41d40f39852e97a60ccf504/raw/4ba1fe9fcc6cb8f957e89369e2a1c94eaaf8a551/modern_user_data.json'
const FALLBACK_PROFILE_PIC = 'https://placehold.co/120x120/111827/ffffff?text=User'

const scene = document.getElementById('scene')
const ui = document.getElementById('ui')
const statusEl = document.getElementById('status')
const joinBtn = document.getElementById('joinBtn')
const roomInput = document.getElementById('roomInput')
const emailInput = document.getElementById('emailInput')
const userPreview = document.getElementById('userPreview')
const userPreviewPic = document.getElementById('userPreviewPic')
const userPreviewName = document.getElementById('userPreviewName')
const userPreviewMeta = document.getElementById('userPreviewMeta')
const ringtoneAudio = document.getElementById('ringtoneAudio')
const joinBellAudio = document.getElementById('joinBellAudio')

const requestModal = document.getElementById('requestModal')
const requestTitle = document.getElementById('requestTitle')
const requestText = document.getElementById('requestText')
const requestPreview = document.getElementById('requestPreview')
const requestActions = document.getElementById('requestActions')
const requestVideoBtn = document.getElementById('requestVideoBtn')
const requestMicBtn = document.getElementById('requestMicBtn')
const requestProfilePic = document.getElementById('requestProfilePic')
const requestUserName = document.getElementById('requestUserName')
const requestUserMeta = document.getElementById('requestUserMeta')

const callModal = document.getElementById('callModal')
const callTitle = document.getElementById('callTitle')
const callProfilePic = document.getElementById('callProfilePic')
const callUserMeta = document.getElementById('callUserMeta')
const remoteVideo = document.getElementById('remoteVideo')
const localPreview = document.getElementById('localPreview')
const callVideoBtn = document.getElementById('callVideoBtn')
const callMicBtn = document.getElementById('callMicBtn')
const callSpeakerBtn = document.getElementById('callSpeakerBtn')
const callEndBtn = document.getElementById('callEndBtn')
const chatBox = document.getElementById('chatBox')
const chatInput = document.getElementById('chatInput')
const sendChatBtn = document.getElementById('sendChatBtn')

const urlParams = new URLSearchParams(window.location.search)

const FRAME_W = 32
const FRAME_H = 32
const SHEET_W = 96
const SHEET_H = 128
const COLS = 3
const CHAT_DISTANCE = 80

const DIRECTION_ROW = {
  down:0,
  left:1,
  right:2,
  up:3
}

let connect = null
let localStream = null
let myConnectId = null
let roomName = null
let movementStarted = false

let activeCallPeer = null
let pendingOutgoingCallPeer = null
let pendingIncomingCallPeer = null

let playerName = sanitizeName(urlParams.get('name')) || ''
let localProfilePic = ''
let localPositionTitle = ''
let localDepartment = ''
let localModernEmail = ''
let currentUser = null

const connectedPeers = new Set()
const peerStates = {}
const players = {}
const peerConnections = {}
const pendingIce = {}

let localState = {
  video:true,
  mic:true,
  sprite:createDefaultSprite(),
  profilePic:'',
  position:'',
  department:'',
  modernEmail:'',
  direction:'down',
  frame:1,
  moving:false
}

let myPosition = {
  x:360,
  y:220
}

function isBusy(){
  return !!activeCallPeer || !!pendingOutgoingCallPeer || !!pendingIncomingCallPeer
}

function playRingtone(){
  if(!ringtoneAudio) return
  ringtoneAudio.currentTime = 0
  ringtoneAudio.play().catch(() => {})
}

function stopRingtone(){
  if(!ringtoneAudio) return
  ringtoneAudio.pause()
  ringtoneAudio.currentTime = 0
}

function playJoinBell(){
  if(!joinBellAudio) return
  joinBellAudio.currentTime = 0
  joinBellAudio.play().catch(() => {})
}

async function fetchModernUsers(){
  const response = await fetch(USERS_JSON_URL, {cache:'no-store'})
  if(!response.ok){
    throw new Error('Unable to load Modern user data.')
  }

  const data = await response.json()

  if(Array.isArray(data)) return data
  if(Array.isArray(data.users)) return data.users

  return []
}

async function findUserByEmail(email){
  const users = await fetchModernUsers()
  const normalizedEmail = String(email || '').trim().toLowerCase()

  return users.find(user =>
    String(user.modern_email || '').trim().toLowerCase() === normalizedEmail
  ) || null
}

function getPeerMeta(peerId){
  return peerStates[peerId] || {}
}

function getUserMetaLine(user){
  const parts = []
  if(user?.position) parts.push(user.position)
  if(user?.department) parts.push(user.department)
  return parts.join(' · ')
}

function setPreviewUser(user){
  if(!user){
    userPreview.style.display = 'none'
    return
  }

  userPreviewPic.src = user.profile_pic || FALLBACK_PROFILE_PIC
  userPreviewName.textContent = user.name || 'Modern User'
  userPreviewMeta.textContent = getUserMetaLine(user) || user.modern_email || ''
  userPreview.style.display = 'flex'
}

emailInput.addEventListener('change', async () => {
  const email = emailInput.value.trim()
  if(!email){
    setPreviewUser(null)
    return
  }

  try{
    statusEl.textContent = 'Checking Modern email...'
    const user = await findUserByEmail(email)
    currentUser = user

    if(user){
      setPreviewUser(user)
      statusEl.textContent = 'Found ' + user.name + '. Ready to join.'
    }else{
      setPreviewUser(null)
      statusEl.textContent = 'No Modern user found for that email.'
    }
  }catch(error){
    console.error(error)
    setPreviewUser(null)
    statusEl.textContent = 'Could not load Modern user data.'
  }
})

joinBtn.onclick = async () => {
  const email = emailInput.value.trim()

  if(!email){
    alert('Please enter your Modern email.')
    return
  }

  joinBtn.disabled = true
  statusEl.textContent = 'Loading Modern user data...'

  try{
    currentUser = currentUser || await findUserByEmail(email)
  }catch(error){
    console.error(error)
    alert('Unable to fetch Modern user data. Please try again.')
    joinBtn.disabled = false
    statusEl.textContent = 'Could not load Modern user data.'
    return
  }

  if(!currentUser){
    alert('No user found with that Modern email.')
    joinBtn.disabled = false
    statusEl.textContent = 'No Modern user found for that email.'
    return
  }

  playerName = sanitizeName(currentUser.name) || 'Guest-' + Math.random().toString(36).substring(2,6)
  localProfilePic = currentUser.profile_pic || ''
  localPositionTitle = currentUser.position || ''
  localDepartment = currentUser.department || ''
  localModernEmail = currentUser.modern_email || email

  localState.sprite = currentUser.sprite_image || createDefaultSprite()
  localState.profilePic = localProfilePic
  localState.position = localPositionTitle
  localState.department = localDepartment
  localState.modernEmail = localModernEmail

  const url = new URL(window.location.href)
  url.searchParams.set('name', playerName)
  history.replaceState({}, '', url)

  roomName = roomInput.value.trim() || 'demo-room'

  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    })
  }catch(error){
    alert('Camera and microphone permission are required.')
    joinBtn.disabled = false
    statusEl.textContent = 'Camera and microphone permission are required.'
    return
  }

  requestPreview.srcObject = localStream
  localPreview.srcObject = localStream

  createPlayer('local', playerName, true)

  ui.style.display = 'none'

  connect = webconnect()

  connect.getMyId(attribute => {
    myConnectId = attribute.connectId
    statusEl.textContent = 'Connected as ' + playerName + ' (' + myConnectId + ') · Room: ' + roomName
  })

  connect.onConnect(attribute => {
    sendHello(attribute.connectId)
  })

  connect.onDisconnect(attribute => {
    removePeer(attribute.connectId)
  })

  connect.onReceive(async (data, attribute) => {
    const peerId = attribute.connectId

    if(!data || !data.type) return
    if(data.room && data.room !== roomName) return

    if(data.type === 'room-hello'){
      await acceptPeer(peerId)
      sendHello(peerId)
      broadcastState(peerId)
      return
    }

    if(data.type === 'state'){
      peerStates[peerId] = data.state

      if(!players[peerId]){
        createPlayer(peerId, data.state.name || 'Peer-' + peerId.substring(0,4), false)
      }

      updateRemotePlayer(peerId)
      return
    }

    if(data.type === 'video-call-request'){
      if(isBusy()){
        sendToPeer(peerId,{
          type:'video-call-busy',
          room:roomName,
          fromName:playerName
        })
        return
      }

      pendingIncomingCallPeer = peerId
      broadcastState()

      showIncomingRequest(peerId, data.fromName || 'Someone')
      return
    }

    if(data.type === 'video-call-busy'){
      pendingOutgoingCallPeer = null
      broadcastState()
      closeRequestModal()
      alert((data.fromName || 'Peer') + ' is currently chatting.')
      return
    }

    if(data.type === 'video-call-accept'){
      stopRingtone()
      pendingOutgoingCallPeer = null
      pendingIncomingCallPeer = null
      activeCallPeer = peerId
      broadcastState()

      closeRequestModal()
      openCallModal(peerId)
      await startCall(peerId, shouldInitiate(peerId))
      return
    }

    if(data.type === 'video-call-decline'){
      stopRingtone()
      pendingOutgoingCallPeer = null
      pendingIncomingCallPeer = null
      broadcastState()

      closeRequestModal()
      alert((peerStates[peerId]?.name || 'Peer') + ' declined the video call.')
      return
    }

    if(data.type === 'video-call-end'){
      endCall(peerId, false)
      return
    }

    if(data.type === 'video-chat-message'){
      addChatMessage(data.fromName || 'Peer', data.message || '', false, data.profilePic || getPeerMeta(peerId).profilePic || '')
      return
    }

    if(data.type === 'webrtc-offer'){
      await handleOffer(peerId, data.offer)
      return
    }

    if(data.type === 'webrtc-answer'){
      await handleAnswer(peerId, data.answer)
      return
    }

    if(data.type === 'webrtc-ice'){
      await handleIce(peerId, data.candidate)
      return
    }
  })

  if(!movementStarted){
    movementStarted = true
    movementLoop()
  }
}

function createPlayer(id, name, isLocal){
  if(players[id]) return

  const player = document.createElement('div')
  player.className = 'player'
  player.id = 'player-' + id

  player.innerHTML = `
    <div class="nameTag">${escapeHTML(name)}</div>
    <div class="busyLabel">Currently chatting</div>
    <button class="chatBubble">💬</button>
    <div class="sprite"></div>
  `

  scene.appendChild(player)

  const sprite = player.querySelector('.sprite')
  sprite.style.backgroundImage = `url(${isLocal ? localState.sprite : createDefaultSprite()})`

  const chatBubble = player.querySelector('.chatBubble')

  if(isLocal){
    player.style.left = myPosition.x + 'px'
    player.style.top = myPosition.y + 'px'
    chatBubble.style.display = 'none'
  }else{
    player.style.left = '300px'
    player.style.top = '300px'

    chatBubble.onclick = e => {
      e.stopPropagation()

      if(isBusy()){
        alert('You are currently chatting.')
        return
      }

      if(peerStates[id]?.busy){
        alert((peerStates[id]?.name || 'Peer') + ' is currently chatting.')
        return
      }

      const myPlayer = players.local
      const distance = distanceBetweenPlayers(myPlayer, player)

      if(distance > CHAT_DISTANCE){
        alert('You need to move closer to chat.')
        return
      }

      showOutgoingRequest(id)
    }
  }

  players[id] = player
}

function distanceBetweenPlayers(a, b){
  const ax = parseFloat(a.style.left || 0)
  const ay = parseFloat(a.style.top || 0)
  const bx = parseFloat(b.style.left || 0)
  const by = parseFloat(b.style.top || 0)

  const dx = ax - bx
  const dy = ay - by

  return Math.sqrt(dx * dx + dy * dy)
}

function updateNearbyChatBubbles(){
  const myPlayer = players.local
  if(!myPlayer) return

  const iAmBusy = isBusy()

  Object.keys(players).forEach(peerId => {
    if(peerId === 'local') return

    const peerPlayer = players[peerId]
    if(!peerPlayer) return

    const busyLabel = peerPlayer.querySelector('.busyLabel')
    const peerBusy = peerStates[peerId]?.busy === true

    if(iAmBusy || peerBusy){
      peerPlayer.classList.remove('nearby')

      if(busyLabel){
        busyLabel.style.display = 'block'
      }

      return
    }

    if(busyLabel){
      busyLabel.style.display = 'none'
    }

    const distance = distanceBetweenPlayers(myPlayer, peerPlayer)

    if(distance <= CHAT_DISTANCE){
      peerPlayer.classList.add('nearby')
    }else{
      peerPlayer.classList.remove('nearby')
    }
  })
}

function showOutgoingRequest(peerId){
  if(isBusy()){
    alert('You are currently chatting.')
    return
  }

  if(peerStates[peerId]?.busy){
    alert((peerStates[peerId]?.name || 'Peer') + ' is currently chatting.')
    return
  }

  pendingOutgoingCallPeer = peerId
  broadcastState()

  const peer = getPeerMeta(peerId)
  const name = peer.name || 'Peer'

  requestTitle.textContent = 'Start Video Call'
  requestText.textContent = 'Do you want to video call ' + name + '?'
  requestUserName.textContent = name
  requestUserMeta.textContent = [peer.position, peer.department].filter(Boolean).join(' · ') || 'Video call request'
  requestProfilePic.src = peer.profilePic || FALLBACK_PROFILE_PIC

  requestActions.innerHTML = `
    <button class="callBtn" id="callNowBtn">Call</button>
    <button class="cancelBtn" id="cancelCallBtn">Cancel</button>
  `

  document.getElementById('callNowBtn').onclick = () => {
    sendToPeer(peerId,{
      type:'video-call-request',
      room:roomName,
      fromName:playerName
    })

    requestText.textContent = 'Calling ' + name + '... waiting for answer.'

    requestActions.innerHTML = `
      <button class="cancelBtn" id="cancelCallBtn2">Cancel</button>
    `

    document.getElementById('cancelCallBtn2').onclick = () => {
      pendingOutgoingCallPeer = null
      broadcastState()
      closeRequestModal()
    }
  }

  document.getElementById('cancelCallBtn').onclick = () => {
    pendingOutgoingCallPeer = null
    broadcastState()
    closeRequestModal()
  }

  requestModal.style.display = 'flex'
}

function showIncomingRequest(peerId, fromName){
  playRingtone()

  const peer = getPeerMeta(peerId)
  const displayName = peer.name || fromName || 'Someone'

  requestTitle.textContent = 'Incoming Video Call'
  requestText.textContent = displayName + ' wants to video call you.'
  requestUserName.textContent = displayName
  requestUserMeta.textContent = [peer.position, peer.department].filter(Boolean).join(' · ') || 'Incoming video call'
  requestProfilePic.src = peer.profilePic || FALLBACK_PROFILE_PIC

  requestActions.innerHTML = `
    <button class="acceptBtn" id="acceptCallBtn">Accept</button>
    <button class="declineBtn" id="declineCallBtn">Decline</button>
  `

  document.getElementById('acceptCallBtn').onclick = async () => {
    stopRingtone()

    pendingOutgoingCallPeer = null
    pendingIncomingCallPeer = null
    activeCallPeer = peerId
    broadcastState()

    sendToPeer(peerId,{
      type:'video-call-accept',
      room:roomName
    })

    closeRequestModal()
    openCallModal(peerId)

    await startCall(peerId, shouldInitiate(peerId))
  }

  document.getElementById('declineCallBtn').onclick = () => {
    stopRingtone()

    pendingIncomingCallPeer = null
    pendingOutgoingCallPeer = null
    broadcastState()

    sendToPeer(peerId,{
      type:'video-call-decline',
      room:roomName
    })

    closeRequestModal()
  }

  requestModal.style.display = 'flex'
}

function closeRequestModal(){
  stopRingtone()
  requestModal.style.display = 'none'
}

function openCallModal(peerId){
  const peer = getPeerMeta(peerId)
  const name = peer.name || 'Peer'

  activeCallPeer = peerId
  callTitle.textContent = 'Video Chat with ' + name
  callProfilePic.src = peer.profilePic || FALLBACK_PROFILE_PIC
  callUserMeta.textContent = [peer.position, peer.department].filter(Boolean).join(' · ')
  localPreview.srcObject = localStream
  chatBox.innerHTML = ''

  addChatMessage('System', 'Call connected. You can now chat P2P.', false, '')

  callModal.style.display = 'flex'
}

function closeCallModal(){
  callModal.style.display = 'none'
  remoteVideo.srcObject = null
}

requestVideoBtn.onclick = () => toggleLocalVideo()
requestMicBtn.onclick = () => toggleLocalMic()
callVideoBtn.onclick = () => toggleLocalVideo()
callMicBtn.onclick = () => toggleLocalMic()

callSpeakerBtn.onclick = () => {
  remoteVideo.muted = !remoteVideo.muted
  callSpeakerBtn.classList.toggle('off', remoteVideo.muted)
  callSpeakerBtn.textContent = remoteVideo.muted ? '🔈' : '🔊'
}

callEndBtn.onclick = () => {
  if(activeCallPeer){
    endCall(activeCallPeer, true)
  }
}

sendChatBtn.onclick = sendChatMessage

chatInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    sendChatMessage()
  }
})

function sendChatMessage(){
  const message = chatInput.value.trim()
  if(!message || !activeCallPeer) return

  addChatMessage(playerName, message, true, localProfilePic)

  sendToPeer(activeCallPeer,{
    type:'video-chat-message',
    room:roomName,
    fromName:playerName,
    profilePic:localProfilePic,
    message
  })

  chatInput.value = ''
}

function addChatMessage(name, message, isMe, profilePic){
  const div = document.createElement('div')
  div.className = 'chatMsg'

  if(name === 'System'){
    div.classList.add('system')
    div.textContent = message
    chatBox.appendChild(div)
    chatBox.scrollTop = chatBox.scrollHeight
    return
  }

  const imgSrc = profilePic || FALLBACK_PROFILE_PIC
  div.innerHTML = `
    <img src="${escapeHTML(imgSrc)}" alt="${escapeHTML(name)}" />
    <div class="bubble"><b>${escapeHTML(isMe ? 'You' : name)}:</b> ${escapeHTML(message)}</div>
  `
  chatBox.appendChild(div)
  chatBox.scrollTop = chatBox.scrollHeight
}

function toggleLocalVideo(){
  localState.video = !localState.video

  localStream.getVideoTracks().forEach(track => {
    track.enabled = localState.video
  })

  ;[requestVideoBtn, callVideoBtn].forEach(btn => {
    btn.classList.toggle('off', !localState.video)
    btn.textContent = localState.video ? '📹' : '📷'
  })

  broadcastState()
}

function toggleLocalMic(){
  localState.mic = !localState.mic

  localStream.getAudioTracks().forEach(track => {
    track.enabled = localState.mic
  })

  ;[requestMicBtn, callMicBtn].forEach(btn => {
    btn.classList.toggle('off', !localState.mic)
    btn.textContent = localState.mic ? '🎙️' : '🔇'
  })

  broadcastState()
}

function sendHello(peerId){
  sendToPeer(peerId,{
    type:'room-hello',
    room:roomName,
    name:playerName
  })
}

async function acceptPeer(peerId){
  if(connectedPeers.has(peerId)) return

  connectedPeers.add(peerId)

  playJoinBell()

  statusEl.textContent = peerId + ' joined room'
}

function shouldInitiate(peerId){
  if(!myConnectId) return false
  return String(myConnectId) < String(peerId)
}

async function startCall(peerId, shouldCreateOffer){
  if(peerConnections[peerId]){
    return peerConnections[peerId]
  }

  const pc = createPeerConnection(peerId)

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream)
  })

  if(shouldCreateOffer){
    const offer = await pc.createOffer()
    await pc.setLocalDescription(offer)

    sendToPeer(peerId,{
      type:'webrtc-offer',
      room:roomName,
      offer:pc.localDescription
    })
  }

  return pc
}

function createPeerConnection(peerId){
  const pc = new RTCPeerConnection({
    iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:global.stun.twilio.com:3478'}
    ]
  })

  peerConnections[peerId] = pc
  pendingIce[peerId] = pendingIce[peerId] || []

  pc.onicecandidate = event => {
    if(event.candidate){
      sendToPeer(peerId,{
        type:'webrtc-ice',
        room:roomName,
        candidate:event.candidate
      })
    }
  }

  pc.ontrack = event => {
    const stream = event.streams[0]

    if(stream){
      remoteVideo.srcObject = stream
      remoteVideo.play().catch(() => {})
      callModal.style.display = 'flex'
    }
  }

  pc.onconnectionstatechange = () => {
    if(pc.connectionState === 'connected'){
      statusEl.textContent = 'Video connected with ' + (peerStates[peerId]?.name || peerId)
    }

    if(['closed','failed','disconnected'].includes(pc.connectionState)){
      endCall(peerId, false)
    }
  }

  return pc
}

async function handleOffer(peerId, offer){
  await acceptPeer(peerId)

  pendingOutgoingCallPeer = null
  pendingIncomingCallPeer = null
  activeCallPeer = peerId
  broadcastState()

  openCallModal(peerId)

  const pc = await startCall(peerId, false)

  await pc.setRemoteDescription(new RTCSessionDescription(offer))
  await flushPendingIce(peerId)

  const answer = await pc.createAnswer()
  await pc.setLocalDescription(answer)

  sendToPeer(peerId,{
    type:'webrtc-answer',
    room:roomName,
    answer:pc.localDescription
  })

  broadcastState(peerId)
}

async function handleAnswer(peerId, answer){
  const pc = peerConnections[peerId]
  if(!pc) return

  await pc.setRemoteDescription(new RTCSessionDescription(answer))
  await flushPendingIce(peerId)
}

async function handleIce(peerId, candidate){
  if(!candidate) return

  const pc = peerConnections[peerId]

  if(!pc || !pc.remoteDescription){
    pendingIce[peerId] = pendingIce[peerId] || []
    pendingIce[peerId].push(candidate)
    return
  }

  try{
    await pc.addIceCandidate(new RTCIceCandidate(candidate))
  }catch(error){
    console.warn('ICE error:', error)
  }
}

async function flushPendingIce(peerId){
  const pc = peerConnections[peerId]
  const queue = pendingIce[peerId] || []

  while(queue.length){
    const candidate = queue.shift()

    try{
      await pc.addIceCandidate(new RTCIceCandidate(candidate))
    }catch(error){
      console.warn('Queued ICE error:', error)
    }
  }
}

function endCall(peerId, notify){
  stopRingtone()

  if(notify){
    sendToPeer(peerId,{
      type:'video-call-end',
      room:roomName
    })
  }

  if(peerConnections[peerId]){
    peerConnections[peerId].close()
    delete peerConnections[peerId]
  }

  delete pendingIce[peerId]

  activeCallPeer = null
  pendingOutgoingCallPeer = null
  pendingIncomingCallPeer = null

  broadcastState()
  closeCallModal()

  statusEl.textContent = 'Call ended'
}

function updateRemotePlayer(peerId){
  const player = players[peerId]
  const state = peerStates[peerId]

  if(!player || !state) return

  if(state.name){
    player.querySelector('.nameTag').textContent = state.name
  }

  if(state.sprite){
    player.querySelector('.sprite').style.backgroundImage = `url(${state.sprite})`
  }

  if(typeof state.x === 'number'){
    player.style.left = state.x + 'px'
  }

  if(typeof state.y === 'number'){
    player.style.top = state.y + 'px'
  }

  updateSpriteFrame(player, state.direction, state.frame)
}

function updateSpriteFrame(player, direction, frame){
  const sprite = player.querySelector('.sprite')
  const row = DIRECTION_ROW[direction] ?? 0
  const col = Math.floor(frame) % COLS

  sprite.style.backgroundPosition = `-${col * FRAME_W}px -${row * FRAME_H}px`
}

const keys = {}

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase()

  if(['w','a','s','d'].includes(key)){
    e.preventDefault()
  }

  keys[key] = true
})

window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false
})

let lastMoveSend = 0

function movementLoop(timestamp = 0){
  const speed = 3
  let moved = false

  if(keys.w){
    myPosition.y -= speed
    localState.direction = 'up'
    moved = true
  }

  if(keys.s){
    myPosition.y += speed
    localState.direction = 'down'
    moved = true
  }

  if(keys.a){
    myPosition.x -= speed
    localState.direction = 'left'
    moved = true
  }

  if(keys.d){
    myPosition.x += speed
    localState.direction = 'right'
    moved = true
  }

  myPosition.x = Math.max(0, Math.min(window.innerWidth - 180, myPosition.x))
  myPosition.y = Math.max(40, Math.min(window.innerHeight - 190, myPosition.y))

  localState.moving = moved
  localState.frame = moved ? localState.frame + 0.16 : 1

  const myPlayer = players.local

  if(myPlayer){
    myPlayer.style.left = myPosition.x + 'px'
    myPlayer.style.top = myPosition.y + 'px'

    updateSpriteFrame(myPlayer, localState.direction, localState.frame)
  }

  updateNearbyChatBubbles()

  if(moved && timestamp - lastMoveSend > 60){
    broadcastState()
    lastMoveSend = timestamp
  }

  requestAnimationFrame(movementLoop)
}

function broadcastState(targetPeerId = null){
  if(!connect) return

  const payload = {
    type:'state',
    room:roomName,
    state:{
      ...localState,
      x:myPosition.x,
      y:myPosition.y,
      name:playerName,
      profilePic:localProfilePic,
      position:localPositionTitle,
      department:localDepartment,
      modernEmail:localModernEmail,
      busy:isBusy()
    }
  }

  if(targetPeerId){
    sendToPeer(targetPeerId, payload)
    return
  }

  connectedPeers.forEach(peerId => {
    sendToPeer(peerId, payload)
  })
}

function sendToPeer(peerId, payload){
  if(!connect || !peerId) return

  try{
    connect.Send(payload,{
      connectId:peerId
    })
  }catch(error){
    console.warn('Send failed:', peerId, error)
  }
}

function removePeer(peerId){
  connectedPeers.delete(peerId)

  if(peerConnections[peerId]){
    peerConnections[peerId].close()
    delete peerConnections[peerId]
  }

  if(players[peerId]){
    players[peerId].remove()
    delete players[peerId]
  }

  delete peerStates[peerId]
  delete pendingIce[peerId]

  if(activeCallPeer === peerId){
    activeCallPeer = null
    pendingOutgoingCallPeer = null
    pendingIncomingCallPeer = null
    broadcastState()
    closeCallModal()
  }
}

function sanitizeName(name){
  if(!name) return ''

  return String(name)
    .trim()
    .slice(0,40)
    .replace(/[<>]/g,'')
}

function escapeHTML(str){
  return String(str || '').replace(/[&<>'"]/g, char => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#039;',
    '"':'&quot;'
  }[char]))
}

function createDefaultSprite(){
  const canvas = document.createElement('canvas')
  canvas.width = SHEET_W
  canvas.height = SHEET_H

  const ctx = canvas.getContext('2d')
  ctx.imageSmoothingEnabled = false

  const shirt = ['#60a5fa','#22c55e','#f97316','#a855f7']

  for(let row = 0; row < 4; row++){
    for(let col = 0; col < 3; col++){
      const x = col * FRAME_W
      const y = row * FRAME_H
      const step = col === 1 ? 0 : 1

      ctx.clearRect(x,y,FRAME_W,FRAME_H)

      ctx.fillStyle = '#facc15'
      ctx.fillRect(x+11,y+3+step,10,10)

      ctx.fillStyle = shirt[row]
      ctx.fillRect(x+9,y+14+step,14,11)

      ctx.fillStyle = '#111827'
      ctx.fillRect(x+10,y+25,4,5)
      ctx.fillRect(x+18,y+25,4,5)

      if(row === 0){
        ctx.fillStyle = '#fff'
        ctx.fillRect(x+13,y+7+step,2,2)
        ctx.fillRect(x+18,y+7+step,2,2)
      }
    }
  }

  return canvas.toDataURL('image/png')
}

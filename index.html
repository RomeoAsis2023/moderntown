<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gather Town • Global Multiplayer • WebConnect + GenosDB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            background: #0a0f0a;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            color: #ccffcc;
        }
        
        canvas {
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            background: #1e3a1e;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .glass-panel {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            border: 3px solid #2ecc2e;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
            font-size: 12px;
            padding: 12px;
            pointer-events: auto;
        }
        
        #auth {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 480px;
            text-align: center;
            background: rgba(10, 20, 10, 0.95);
            border: 4px solid #0f0;
            border-radius: 24px;
            padding: 28px;
            z-index: 100;
        }
        
        #auth h1 {
            text-shadow: 0 0 8px #0f0;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        
        #joinBtn {
            background: #0f0;
            color: #000;
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            padding: 16px;
            width: 100%;
            border: none;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        
        #joinBtn:hover {
            background: #0ff;
            box-shadow: 0 0 20px cyan;
            transform: scale(0.98);
        }
        
        .controls-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 20;
        }
        
        .action-btn {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 0 #0a0;
        }
        
        .action-btn:hover {
            background: #0f0;
            color: black;
            transform: translateY(-2px);
        }
        
        .video-box {
            position: absolute;
            bottom: 100px;
            left: 16px;
            border: 3px solid #0ff;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
            pointer-events: auto;
            transition: 0.2s;
        }
        
        video {
            width: 180px;
            border-radius: 8px;
            display: block;
            background: #1a1a2e;
        }
        
        .chat-window {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 380px;
            height: 300px;
            background: rgba(0,0,0,0.88);
            border-radius: 16px;
            border: 2px solid #2ecc2e;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        
        .chat-header {
            padding: 8px 12px;
            background: #0f2a0f;
            border-bottom: 1px solid #0f0;
            font-size: 10px;
            border-radius: 13px 13px 0 0;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 10px;
            line-height: 1.6;
            color: #cfc;
        }
        
        #messages div {
            margin-bottom: 6px;
            word-break: break-word;
            border-left: 3px solid #0f0;
            padding-left: 8px;
        }
        
        #chatInput {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px;
            outline: none;
            border-radius: 0 0 14px 14px;
        }
        
        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #0f0;
            box-shadow: 0 0 6px #0f0;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 4px;
        }
        
        .player-count {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 10px;
            pointer-events: auto;
        }
        
        .connection-status {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 8px;
            pointer-events: auto;
        }
        
        @media (max-width: 700px) {
            .chat-window { width: 280px; height: 240px; }
            video { width: 130px; }
            .action-btn { font-size: 9px; padding: 6px 10px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    
    <div id="ui">
        <div id="auth" class="glass-panel">
            <div style="font-size: 32px; margin-bottom: 8px;">🌍</div>
            <h1 style="color:#0f0;">✦ GATHER TOWN ✦</h1>
            <p style="font-size: 11px; color:#0fa;">Global Multiplayer · WebConnect + GenosDB</p>
            <input type="text" id="playerName" placeholder="Enter your name" maxlength="16" 
                   style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 2px solid #0f0; color: #0f0; font-family: monospace; text-align: center;">
            <input type="text" id="roomName" placeholder="Room name (default: gather-world)" maxlength="30" 
                   style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 2px solid #0f0; color: #0f0; font-family: monospace; text-align: center;" value="gather-world">
            <button id="joinBtn">⚡ JOIN WORLD ⚡</button>
            <div style="margin-top: 18px; font-size: 9px; color:#7f7;">WASD / arrows to move · Upload custom 96x128 sprite</div>
        </div>

        <div class="controls-bar" id="controlsBar" style="display: none;">
            <button class="action-btn" id="spriteBtn">🎨 UPLOAD SPRITE</button>
            <button class="action-btn" id="camToggleBtn">📹 CAM ON</button>
            <button class="action-btn" id="micToggleBtn">🎤 MIC ON</button>
            <button class="action-btn" id="resetPosBtn">🔄 RESET POS</button>
        </div>
        
        <div class="player-count" id="playerCount" style="display: none;">
            👥 <span id="onlineCount">1</span> online
        </div>
        
        <div class="connection-status" id="connStatus">
            🔌 Connecting...
        </div>

        <div id="selfVideoBox" class="video-box" style="display: none;">
            <video id="selfVideo" autoplay playsinline muted></video>
        </div>

        <div id="chatPanel" class="chat-window" style="display: none;">
            <div class="chat-header">
                <span class="status-led"></span> GLOBAL CHAT
            </div>
            <div id="messages"></div>
            <input type="text" id="chatInput" placeholder="✏️ message + ENTER" maxlength="80">
        </div>
    </div>

    <script type="module">
        // Import the libraries from correct CDNs
        import webconnect from 'https://cdn.skypack.dev/webconnect';
        import { gdb } from 'https://cdn.skypack.dev/genosdb';
        
        // ---------------- GLOBALS ----------------
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;
        
        let wc = null;
        let db = null;
        let myId = null;
        let myUsername = "";
        let roomName = "";
        
        let myX = canvas.width / 2;
        let myY = canvas.height / 2;
        let myDirection = 2;
        let myAnimationFrame = 0;
        let animTimer = 0;
        let movementKeys = {};
        
        let remotePlayers = new Map();
        let localSpriteImg = null;
        let localSpriteDataURL = null;
        let mediaStream = null;
        let isCameraEnabled = true;
        let isMicEnabled = true;
        let lastSyncTime = 0;
        
        // UI Elements
        const authDiv = document.getElementById("auth");
        const controlsBar = document.getElementById("controlsBar");
        const selfVideoBox = document.getElementById("selfVideoBox");
        const chatPanel = document.getElementById("chatPanel");
        const selfVideo = document.getElementById("selfVideo");
        const camBtn = document.getElementById("camToggleBtn");
        const micBtn = document.getElementById("micToggleBtn");
        const playerCountSpan = document.getElementById("onlineCount");
        const playerCountDiv = document.getElementById("playerCount");
        const connStatusDiv = document.getElementById("connStatus");
        
        function generateId() {
            return 'player_' + Math.random().toString(36).substr(2, 9);
        }
        
        function addChatMessage(sender, msg, isSystem = false) {
            const messagesDiv = document.getElementById("messages");
            const div = document.createElement("div");
            if (isSystem) {
                div.innerHTML = `<span style="color:#88ff88;">🔔 ${msg}</span>`;
            } else {
                div.innerHTML = `<span style="color:#0ff;">${escapeHtml(sender)}:</span> <span style="color:#ddd;">${escapeHtml(msg)}</span>`;
            }
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: "smooth", block: "nearest" });
            if (messagesDiv.children.length > 50) messagesDiv.removeChild(messagesDiv.children[0]);
        }
        
        function escapeHtml(str) { 
            return str.replace(/[&<>]/g, function(m){
                if(m==='&') return '&amp;';
                if(m==='<') return '&lt;';
                if(m==='>') return '&gt;';
                return m;
            });
        }
        
        // Update connection status
        function updateStatus(message, isError = false) {
            connStatusDiv.innerHTML = isError ? `⚠️ ${message}` : `🔗 ${message}`;
            connStatusDiv.style.borderColor = isError ? "#f00" : "#0f0";
            setTimeout(() => {
                if (!isError) {
                    connStatusDiv.innerHTML = `✅ Connected to ${roomName}`;
                }
            }, 3000);
        }
        
        // Custom sprite upload
        function uploadCustomSprite() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/png, image/jpeg";
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        if (img.width !== 96 || img.height !== 128) {
                            alert("⚠️ Sprite must be exactly 96x128 pixels!");
                            return;
                        }
                        localSpriteImg = img;
                        localSpriteDataURL = ev.target.result;
                        addChatMessage("System", "✨ Custom sprite equipped!", true);
                        syncFullState();
                        
                        // Save to GenosDB
                        if (db && myId) {
                            db.put(`room.${roomName}.players.${myId}.sprite`, localSpriteDataURL);
                        }
                    };
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        // Media devices
        async function initMediaDevices() {
            try {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240 },
                    audio: true 
                });
                mediaStream = stream;
                selfVideo.srcObject = stream;
                selfVideoBox.style.display = "block";
                isCameraEnabled = true;
                isMicEnabled = true;
                camBtn.textContent = "📹 CAM ON";
                micBtn.textContent = "🎤 MIC ON";
                camBtn.style.background = "#0a0";
                micBtn.style.background = "#0a0";
            } catch (err) {
                console.warn("Media error:", err);
                addChatMessage("System", "⚠️ Camera/Mic access denied", true);
                selfVideoBox.style.display = "none";
            }
        }
        
        function toggleCamera() {
            if (!mediaStream) return;
            const videoTrack = mediaStream.getVideoTracks()[0];
            if (videoTrack) {
                isCameraEnabled = !isCameraEnabled;
                videoTrack.enabled = isCameraEnabled;
                camBtn.textContent = isCameraEnabled ? "📹 CAM ON" : "📹 CAM OFF";
                camBtn.style.background = isCameraEnabled ? "#0a0" : "#a33";
            }
        }
        
        function toggleMic() {
            if (!mediaStream) return;
            const audioTrack = mediaStream.getAudioTracks()[0];
            if (audioTrack) {
                isMicEnabled = !isMicEnabled;
                audioTrack.enabled = isMicEnabled;
                micBtn.textContent = isMicEnabled ? "🎤 MIC ON" : "🎤 MIC OFF";
                micBtn.style.background = isMicEnabled ? "#0a0" : "#a33";
            }
        }
        
        // Draw character
        function drawCharacter(img, x, y, direction, frame, nameTag, isLocal = false) {
            if (img && img.complete && img.naturalWidth === 96) {
                const sx = frame * 32;
                const sy = direction * 32;
                ctx.drawImage(img, sx, sy, 32, 32, x - 16, y - 16, 32, 32);
            } else {
                // Fallback
                ctx.fillStyle = isLocal ? "#44ff44" : "#44dd44";
                ctx.beginPath();
                ctx.arc(x, y, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#000";
                ctx.fillRect(x-4, y-4, 3, 3);
                ctx.fillRect(x+2, y-4, 3, 3);
                if (isLocal) {
                    ctx.strokeStyle = "#ffff00";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y, 16, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            if (nameTag) {
                ctx.font = "9px 'Press Start 2P'";
                ctx.fillStyle = isLocal ? "#ffff88" : "#e0ffc0";
                ctx.textAlign = "center";
                ctx.fillText(nameTag.slice(0, 14), x, y - 22);
            }
        }
        
        // Sync state via WebConnect and GenosDB
        function syncFullState() {
            const state = {
                x: myX,
                y: myY,
                dir: myDirection,
                frame: myAnimationFrame,
                name: myUsername,
                spriteURL: localSpriteDataURL
            };
            
            // Send via WebConnect for real-time
            if (wc && wc.Send) {
                wc.Send({
                    type: 'player_update',
                    ...state
                });
            }
            
            // Save to GenosDB for persistence
            if (db && myId) {
                db.put(`room.${roomName}.players.${myId}`, {
                    ...state,
                    lastSeen: Date.now()
                }).catch(e => console.warn("DB save error:", e));
            }
        }
        
        function broadcastChat(message) {
            const chatData = {
                type: 'chat',
                sender: myUsername,
                text: message,
                timestamp: Date.now()
            };
            
            if (wc && wc.Send) {
                wc.Send(chatData);
            }
            addChatMessage(myUsername, message);
        }
        
        // Handle movement
        function handleMovement() {
            let moved = false;
            let speed = 4.2;
            let newX = myX, newY = myY;
            
            if (movementKeys["w"] || movementKeys["ArrowUp"]) { newY -= speed; myDirection = 3; moved = true; }
            if (movementKeys["s"] || movementKeys["ArrowDown"]) { newY += speed; myDirection = 0; moved = true; }
            if (movementKeys["a"] || movementKeys["ArrowLeft"]) { newX -= speed; myDirection = 1; moved = true; }
            if (movementKeys["d"] || movementKeys["ArrowRight"]) { newX += speed; myDirection = 2; moved = true; }
            
            if (moved) {
                newX = Math.min(canvas.width - 24, Math.max(24, newX));
                newY = Math.min(canvas.height - 32, Math.max(24, newY));
                myX = newX;
                myY = newY;
                animTimer += 0.25;
                myAnimationFrame = (Math.floor(animTimer) % 3);
            } else {
                myAnimationFrame = 0;
                animTimer = 0;
            }
            
            if (moved && Date.now() - lastSyncTime > 50) {
                syncFullState();
                lastSyncTime = Date.now();
            }
        }
        
        // Drawing
        function drawWorld() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grid pattern
            for (let i = 0; i < canvas.width; i += 40) {
                for (let j = 0; j < canvas.height; j += 40) {
                    ctx.fillStyle = ((i/40 + j/40) % 2 === 0) ? "#2d6a2d" : "#3e8e3e";
                    ctx.fillRect(i, j, 40, 40);
                }
            }
            
            // Decorative pixels
            ctx.fillStyle = "#ffd966";
            for (let i = 0; i < 40; i++) {
                ctx.fillRect((i * 173) % canvas.width, (i * 89) % canvas.height, 3, 3);
            }
            
            // Draw remote players
            for (let [id, player] of remotePlayers.entries()) {
                if (player.x && player.y) {
                    let img = null;
                    if (player.spriteURL && !player.img) {
                        player.img = new Image();
                        player.img.src = player.spriteURL;
                        img = player.img;
                    } else {
                        img = player.img;
                    }
                    drawCharacter(img, player.x, player.y, player.dir || 2, player.frame || 0, player.name, false);
                }
            }
            
            // Draw local player
            drawCharacter(localSpriteImg, myX, myY, myDirection, myAnimationFrame, myUsername + " (you)", true);
            
            // UI hints
            ctx.font = "8px 'Press Start 2P'";
            ctx.fillStyle = "#b3ffb3";
            ctx.fillText("⚡ WASD / ARROWS", canvas.width-170, 30);
            ctx.fillText("💬 Enter to chat", canvas.width-170, 50);
            ctx.fillText("🎨 Upload sprite", canvas.width-170, 70);
        }
        
        function gameLoop() {
            handleMovement();
            drawWorld();
            requestAnimationFrame(gameLoop);
        }
        
        // Create default sprite
        function createDefaultSprite() {
            const offCanvas = document.createElement("canvas");
            offCanvas.width = 96;
            offCanvas.height = 128;
            const dctx = offCanvas.getContext("2d");
            dctx.fillStyle = "#44c844";
            dctx.fillRect(0, 0, 96, 128);
            dctx.fillStyle = "#2a6b2a";
            dctx.fillRect(32, 64, 32, 48);
            dctx.fillStyle = "#f5d742";
            dctx.fillRect(40, 48, 16, 16);
            dctx.fillStyle = "#000";
            dctx.fillRect(36, 38, 6, 6);
            dctx.fillRect(54, 38, 6, 6);
            const dataURL = offCanvas.toDataURL();
            const img = new Image();
            img.src = dataURL;
            localSpriteImg = img;
            localSpriteDataURL = dataURL;
        }
        
        // Initialize WebConnect
        async function initWebConnect() {
            return new Promise((resolve, reject) => {
                try {
                    wc = webconnect({
                        appName: "gather-town-global",
                        channelName: roomName,
                        rtc: true,
                        autoConnect: true,
                        debug: false
                    });
                    
                    wc.onConnect((attr) => {
                        console.log("WebConnect connected:", attr);
                        updateStatus(`Connected to ${roomName}`);
                        addChatMessage("System", `🌐 Connected to global room: ${roomName}`, true);
                        syncFullState();
                        resolve();
                    });
                    
                    wc.onReceive((data, attr) => {
                        if (data.type === 'player_update') {
                            if (!remotePlayers.has(attr.connectId)) {
                                remotePlayers.set(attr.connectId, {});
                                updatePlayerCount();
                            }
                            const player = remotePlayers.get(attr.connectId);
                            player.x = data.x;
                            player.y = data.y;
                            player.dir = data.dir;
                            player.frame = data.frame;
                            player.name = data.name;
                            if (data.spriteURL && (!player.spriteURL || player.spriteURL !== data.spriteURL)) {
                                player.spriteURL = data.spriteURL;
                                player.img = new Image();
                                player.img.src = data.spriteURL;
                            }
                            remotePlayers.set(attr.connectId, player);
                        } else if (data.type === 'chat') {
                            addChatMessage(data.sender, data.text);
                        }
                    });
                    
                    wc.onDisconnect((attr) => {
                        remotePlayers.delete(attr.connectId);
                        updatePlayerCount();
                        addChatMessage("System", `A player left the world`, true);
                    });
                    
                    setTimeout(() => {
                        if (!wc.connected) {
                            reject(new Error("WebConnect timeout"));
                        }
                    }, 5000);
                } catch (e) {
                    reject(e);
                }
            });
        }
        
        // Initialize GenosDB
        async function initGenosDB() {
            try {
                db = await gdb(roomName, { 
                    rtc: true, 
                    autoConnect: true, 
                    persist: true 
                });
                console.log("GenosDB ready");
                updateStatus("Database connected");
                
                // Load existing players
                const playersData = await db.get(`room.${roomName}.players`);
                if (playersData) {
                    Object.keys(playersData).forEach(playerId => {
                        if (playerId !== myId && playersData[playerId]) {
                            const data = playersData[playerId];
                            remotePlayers.set(playerId, {
                                x: data.x,
                                y: data.y,
                                dir: data.dir,
                                frame: data.frame,
                                name: data.name,
                                spriteURL: data.spriteURL
                            });
                            if (data.spriteURL) {
                                const img = new Image();
                                img.src = data.spriteURL;
                                remotePlayers.get(playerId).img = img;
                            }
                        }
                    });
                    updatePlayerCount();
                }
                
                // Subscribe to changes
                db.subscribe(`room.${roomName}.players`, (data, key) => {
                    if (key.includes(myId)) return;
                    const playerId = key.split('.').pop();
                    if (data && typeof data === 'object') {
                        if (!remotePlayers.has(playerId)) {
                            remotePlayers.set(playerId, {});
                        }
                        const player = remotePlayers.get(playerId);
                        player.x = data.x;
                        player.y = data.y;
                        player.dir = data.dir;
                        player.frame = data.frame;
                        player.name = data.name;
                        if (data.spriteURL && (!player.spriteURL || player.spriteURL !== data.spriteURL)) {
                            player.spriteURL = data.spriteURL;
                            player.img = new Image();
                            player.img.src = data.spriteURL;
                        }
                        remotePlayers.set(playerId, player);
                        updatePlayerCount();
                    } else if (data === null) {
                        remotePlayers.delete(playerId);
                        updatePlayerCount();
                    }
                });
                
            } catch (e) {
                console.warn("GenosDB error:", e);
                updateStatus("Database offline - P2P only", true);
            }
        }
        
        function updatePlayerCount() {
            const count = remotePlayers.size + 1;
            playerCountSpan.textContent = count;
        }
        
        // Initialize everything
        async function initializeApp() {
            myUsername = document.getElementById("playerName").value.trim() || "Adventurer";
            roomName = document.getElementById("roomName").value.trim() || "gather-world";
            myId = generateId();
            
            authDiv.style.display = "none";
            controlsBar.style.display = "flex";
            chatPanel.style.display = "flex";
            playerCountDiv.style.display = "block";
            
            createDefaultSprite();
            await initMediaDevices();
            
            // Initialize both services
            try {
                await initWebConnect();
            } catch (e) {
                console.error("WebConnect failed:", e);
                updateStatus("WebConnect failed - offline mode", true);
            }
            
            await initGenosDB();
            
            // Setup event listeners
            document.getElementById("spriteBtn").onclick = uploadCustomSprite;
            camBtn.onclick = toggleCamera;
            micBtn.onclick = toggleMic;
            document.getElementById("resetPosBtn").onclick = () => {
                myX = canvas.width/2;
                myY = canvas.height/2;
                syncFullState();
            };
            
            // Keyboard input
            window.addEventListener("keydown", (e) => {
                const key = e.key;
                if (key === "w" || key === "W" || key === "ArrowUp") movementKeys["ArrowUp"] = true;
                if (key === "s" || key === "S" || key === "ArrowDown") movementKeys["ArrowDown"] = true;
                if (key === "a" || key === "A" || key === "ArrowLeft") movementKeys["ArrowLeft"] = true;
                if (key === "d" || key === "D" || key === "ArrowRight") movementKeys["ArrowRight"] = true;
                if (key === "Enter" && document.activeElement !== chatInput) {
                    chatInput.focus();
                }
            });
            
            window.addEventListener("keyup", (e) => {
                const key = e.key;
                if (key === "w" || key === "W" || key === "ArrowUp") movementKeys["ArrowUp"] = false;
                if (key === "s" || key === "S" || key === "ArrowDown") movementKeys["ArrowDown"] = false;
                if (key === "a" || key === "A" || key === "ArrowLeft") movementKeys["ArrowLeft"] = false;
                if (key === "d" || key === "D" || key === "ArrowRight") movementKeys["ArrowRight"] = false;
            });
            
            const chatInput = document.getElementById("chatInput");
            chatInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    const msg = chatInput.value.trim();
                    if (msg) {
                        broadcastChat(msg);
                        chatInput.value = "";
                    }
                }
            });
            
            // Resize canvas
            function resizeCanvas() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = Math.min(1280, w - 20);
                canvas.height = Math.min(720, h - 20);
                canvas.style.width = `${canvas.width}px`;
                canvas.style.height = `${canvas.height}px`;
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();
            
            gameLoop();
            addChatMessage("System", "✨ Welcome to Gather Town! WASD to move, upload custom sprites, and chat with players worldwide!", true);
            
            // Periodic sync
            setInterval(() => {
                syncFullState();
            }, 2000);
        }
        
        // Start the app
        document.getElementById("joinBtn").onclick = initializeApp;
        
        // Initial canvas size
        canvas.width = 1280;
        canvas.height = 720;
    </script>
</body>
</html>

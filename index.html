<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gather Town • Pixel World • WebRTC + GenosDB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            background: #0a0f0a;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            color: #ccffcc;
        }
        
        canvas {
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
            background: #1e3a1e;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .glass-panel {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            border: 3px solid #2ecc2e;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
            font-size: 12px;
            padding: 12px;
            pointer-events: auto;
        }
        
        #auth {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 460px;
            text-align: center;
            background: rgba(10, 20, 10, 0.95);
            border: 4px solid #0f0;
            border-radius: 24px;
            padding: 28px;
        }
        
        #auth h1 {
            text-shadow: 0 0 8px #0f0;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        
        #joinBtn {
            background: #0f0;
            color: #000;
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            padding: 16px;
            width: 100%;
            border: none;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        
        #joinBtn:hover {
            background: #0ff;
            box-shadow: 0 0 20px cyan;
            transform: scale(0.98);
        }
        
        .controls-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 20;
        }
        
        .action-btn {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 0 #0a0;
        }
        
        .action-btn:hover {
            background: #0f0;
            color: black;
            transform: translateY(-2px);
        }
        
        .video-box {
            position: absolute;
            bottom: 100px;
            left: 16px;
            border: 3px solid #0ff;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
            pointer-events: auto;
            transition: 0.2s;
        }
        
        video {
            width: 180px;
            border-radius: 8px;
            display: block;
            background: #1a1a2e;
        }
        
        .chat-window {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 380px;
            height: 300px;
            background: rgba(0,0,0,0.88);
            border-radius: 16px;
            border: 2px solid #2ecc2e;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        
        .chat-header {
            padding: 8px 12px;
            background: #0f2a0f;
            border-bottom: 1px solid #0f0;
            font-size: 10px;
            border-radius: 13px 13px 0 0;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 10px;
            line-height: 1.6;
            color: #cfc;
        }
        
        #messages div {
            margin-bottom: 6px;
            word-break: break-word;
            border-left: 3px solid #0f0;
            padding-left: 8px;
        }
        
        #chatInput {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px;
            outline: none;
            border-radius: 0 0 14px 14px;
        }
        
        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #0f0;
            box-shadow: 0 0 6px #0f0;
            margin-right: 6px;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 4px;
        }
        
        @media (max-width: 700px) {
            .chat-window { width: 280px; height: 240px; }
            video { width: 130px; }
            .action-btn { font-size: 9px; padding: 6px 10px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    
    <div id="ui">
        <div id="auth" class="glass-panel">
            <div style="font-size: 32px; margin-bottom: 8px;">🏰</div>
            <h1 style="color:#0f0;">✦ GATHER TOWN ✦</h1>
            <p style="font-size: 11px; color:#0fa;">webconnect + GenosDB · peer mesh</p>
            <p style="margin: 16px 0 8px; font-size: 10px;">⬆️⬇️⬅️➡️ or WASD move</p>
            <button id="joinBtn">⚡ ENTER THE LOBBY ⚡</button>
            <div style="margin-top: 18px; font-size: 9px; color:#7f7;">custom sprite 96x128 · proximity vibe</div>
        </div>

        <div class="controls-bar" id="controlsBar" style="display: none;">
            <button class="action-btn" id="spriteBtn">🎨 SPRITE</button>
            <button class="action-btn" id="camToggleBtn">📹 CAM ON</button>
            <button class="action-btn" id="micToggleBtn">🎤 MIC ON</button>
            <button class="action-btn" id="resetCamBtn">🔄 RESET</button>
        </div>

        <div id="selfVideoBox" class="video-box" style="display: none;">
            <video id="selfVideo" autoplay playsinline muted></video>
        </div>

        <div id="chatPanel" class="chat-window" style="display: none;">
            <div class="chat-header">
                <span class="status-led"></span> GLOBAL CHAT • <span id="roomIdDisplay">gather-hybrid</span>
            </div>
            <div id="messages"></div>
            <input type="text" id="chatInput" placeholder="✏️ message + ENTER" maxlength="80">
        </div>
    </div>

    <script type="module">
        import webconnect from "https://cdn.jsdelivr.net/npm/webconnect/dist/esm/webconnect.js";
        import { gdb } from "https://cdn.jsdelivr.net/npm/genosdb@latest/dist/index.min.js";
        
        // ---------------- GLOBALS ----------------
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;
        
        let wcInstance = null;
        let dbInstance = null;
        let myPeerId = "";
        let myUsername = "";
        
        // player positioning
        let myX = canvas.width / 2;
        let myY = canvas.height / 2;
        let myDirection = 2;     // 0-down,1-left,2-right,3-up
        let myAnimationFrame = 0;
        let animTimer = 0;
        let movementKeys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        
        let remotePlayers = new Map();   // id -> { x, y, dir, frame, name, spriteURL, imgElement }
        let localSpriteImg = null;
        let localSpriteDataURL = null;
        
        let mediaStream = null;
        let isCameraEnabled = true;
        let isMicEnabled = true;
        
        let syncInterval = null;
        let lastSyncFrame = 0;
        const SYNC_RATE_MS = 68;
        
        // chat
        const messagesDiv = document.getElementById("messages");
        const chatInput = document.getElementById("chatInput");
        
        const ROOM_NAME = "gather-town-genos-v2";
        
        // helper: UI elements
        const authDiv = document.getElementById("auth");
        const controlsBar = document.getElementById("controlsBar");
        const selfVideoBox = document.getElementById("selfVideoBox");
        const chatPanel = document.getElementById("chatPanel");
        const selfVideo = document.getElementById("selfVideo");
        const camBtn = document.getElementById("camToggleBtn");
        const micBtn = document.getElementById("micToggleBtn");
        
        // ---------------- UTILITIES ----------------
        function addChatMessage(sender, msg, isSystem = false) {
            const div = document.createElement("div");
            if (isSystem) {
                div.innerHTML = `<span style="color:#88ff88;">🔔 ${msg}</span>`;
            } else {
                div.innerHTML = `<span style="color:#0ff;">${escapeHtml(sender)}:</span> <span style="color:#ddd;">${escapeHtml(msg)}</span>`;
            }
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: "smooth", block: "nearest" });
            if (messagesDiv.children.length > 50) messagesDiv.removeChild(messagesDiv.children[0]);
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        function generateId() { return "player_" + Math.random().toString(36).substring(2, 10) + Date.now().toString(36); }
        
        // ---------------- SPRITE UPLOAD ----------------
        function uploadCustomSprite() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/png, image/jpeg";
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        if (img.width !== 96 || img.height !== 128) {
                            alert("⚠️ Sprite must be exactly 96x128 pixels! (for perfect pixel art)");
                            return;
                        }
                        localSpriteImg = img;
                        localSpriteDataURL = ev.target.result;
                        addChatMessage("System", "✨ Your custom sprite is equipped!", true);
                        // broadcast sprite update to GenosDB
                        if (dbInstance && myPeerId) {
                            dbInstance.put(`room.${ROOM_NAME}.players.${myPeerId}.sprite`, localSpriteDataURL);
                            dbInstance.put(`room.${ROOM_NAME}.players.${myPeerId}.name`, myUsername);
                        }
                    };
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        // ---------------- MEDIA (CAM + MIC) ----------------
        async function initMediaDevices() {
            try {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                mediaStream = stream;
                selfVideo.srcObject = stream;
                selfVideoBox.style.display = "block";
                isCameraEnabled = true;
                isMicEnabled = true;
                camBtn.textContent = "📹 CAM ON";
                micBtn.textContent = "🎤 MIC ON";
                camBtn.style.background = "#0a0";
                micBtn.style.background = "#0a0";
                
                // track toggles
                const videoTrack = stream.getVideoTracks()[0];
                const audioTrack = stream.getAudioTracks()[0];
                if (videoTrack) videoTrack.enabled = true;
                if (audioTrack) audioTrack.enabled = true;
            } catch (err) {
                console.warn("Media error:", err);
                addChatMessage("System", "⚠️ Camera/Mic access denied — chat & movement only", true);
                selfVideoBox.style.display = "none";
            }
        }
        
        function toggleCamera() {
            if (!mediaStream) return;
            const videoTrack = mediaStream.getVideoTracks()[0];
            if (videoTrack) {
                isCameraEnabled = !isCameraEnabled;
                videoTrack.enabled = isCameraEnabled;
                camBtn.textContent = isCameraEnabled ? "📹 CAM ON" : "📹 CAM OFF";
                camBtn.style.background = isCameraEnabled ? "#0a0" : "#a33";
            }
        }
        
        function toggleMic() {
            if (!mediaStream) return;
            const audioTrack = mediaStream.getAudioTracks()[0];
            if (audioTrack) {
                isMicEnabled = !isMicEnabled;
                audioTrack.enabled = isMicEnabled;
                micBtn.textContent = isMicEnabled ? "🎤 MIC ON" : "🎤 MIC OFF";
                micBtn.style.background = isMicEnabled ? "#0a0" : "#a33";
            }
        }
        
        // ---------------- RENDER PIXEL SPRITE ----------------
        function drawCharacter(img, x, y, direction, frameIndex, nameTag) {
            if (img && img.complete && img.naturalWidth === 96) {
                const sx = frameIndex * 32;
                const sy = direction * 32;
                ctx.drawImage(img, sx, sy, 32, 32, x - 16, y - 16, 32, 32);
            } else {
                // fallback pixel avatar
                ctx.fillStyle = "#44dd44";
                ctx.beginPath();
                ctx.arc(x, y, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#000";
                ctx.fillRect(x-4, y-4, 3, 3);
                ctx.fillRect(x+2, y-4, 3, 3);
                ctx.fillStyle = "#442200";
                ctx.fillRect(x-5, y+4, 10, 4);
            }
            if (nameTag) {
                ctx.font = "10px 'Press Start 2P'";
                ctx.fillStyle = "#e0ffc0";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText(nameTag.slice(0, 14), x, y - 22);
            }
        }
        
        // ---------------- SYNC POSITION TO DB + WebRTC ----------------
        function sendFullState() {
            if (!dbInstance || !myPeerId) return;
            dbInstance.put(`room.${ROOM_NAME}.players.${myPeerId}`, {
                x: Math.floor(myX),
                y: Math.floor(myY),
                dir: myDirection,
                frame: Math.floor(myAnimationFrame),
                name: myUsername,
                spriteURL: localSpriteDataURL || null,
                updatedAt: Date.now()
            }).catch(e => console.warn);
            
            // also send via WebRTC direct for lower latency
            if (wcInstance) {
                wcInstance.Send({
                    type: "move",
                    x: myX,
                    y: myY,
                    dir: myDirection,
                    frame: myAnimationFrame
                });
            }
        }
        
        // ---------------- HANDLE REMOTE PLAYER UPDATES ----------------
        async function loadSpriteForPlayer(playerId, spriteDataURL) {
            if (!spriteDataURL) return;
            const existing = remotePlayers.get(playerId);
            if (existing && existing.imgElement && existing.imgElement.src === spriteDataURL) return;
            const img = new Image();
            img.src = spriteDataURL;
            img.onload = () => {
                const player = remotePlayers.get(playerId);
                if (player) {
                    player.imgElement = img;
                    remotePlayers.set(playerId, player);
                }
            };
        }
        
        function subscribeToDBChanges() {
            // listen for all player updates
            dbInstance.get(`room.${ROOM_NAME}.players`, (data, key) => {
                if (!data || key === myPeerId) return;
                const parts = key.split('.');
                const playerId = parts[parts.length-1];
                if (playerId === myPeerId) return;
                
                let posData = data;
                if (typeof data === 'object') {
                    let x = Number(data.x) || 400;
                    let y = Number(data.y) || 300;
                    let dir = Number(data.dir) || 2;
                    let frame = Number(data.frame) || 0;
                    let name = data.name || "wanderer";
                    let spriteURL = data.spriteURL || null;
                    
                    const existing = remotePlayers.get(playerId) || {};
                    existing.x = x;
                    existing.y = y;
                    existing.dir = dir;
                    existing.frame = frame;
                    existing.name = name;
                    if (spriteURL && (!existing.imgElement || existing.imgElement.src !== spriteURL)) {
                        loadSpriteForPlayer(playerId, spriteURL);
                    }
                    remotePlayers.set(playerId, existing);
                }
            }, true);
            
            // sub for sprite updates separately
            dbInstance.get(`room.${ROOM_NAME}.players`, (data, key) => {
                if (data && key.includes('.sprite') && !key.includes(myPeerId)) {
                    const playerId = key.split('.')[3];
                    if (playerId && data) {
                        loadSpriteForPlayer(playerId, data);
                    }
                }
            });
        }
        
        // ---------------- CHAT BROADCAST ----------------
        function broadcastChatMessage(message) {
            if (!wcInstance) return;
            wcInstance.Send({ type: "chat", text: message, sender: myUsername, timestamp: Date.now() });
            addChatMessage(myUsername, message);
        }
        
        // ---------------- INPUT HANDLING ----------------
        function handleMovement() {
            let moved = false;
            let speed = 4.2;
            let newX = myX, newY = myY;
            let dirChanged = false;
            if (movementKeys["w"] || movementKeys["ArrowUp"]) { newY -= speed; myDirection = 3; moved = true; dirChanged=true; }
            if (movementKeys["s"] || movementKeys["ArrowDown"]) { newY += speed; myDirection = 0; moved = true; dirChanged=true; }
            if (movementKeys["a"] || movementKeys["ArrowLeft"]) { newX -= speed; myDirection = 1; moved = true; dirChanged=true; }
            if (movementKeys["d"] || movementKeys["ArrowRight"]) { newX += speed; myDirection = 2; moved = true; dirChanged=true; }
            
            if (moved) {
                newX = Math.min(canvas.width - 24, Math.max(24, newX));
                newY = Math.min(canvas.height - 32, Math.max(24, newY));
                myX = newX;
                myY = newY;
                animTimer += 0.25;
                myAnimationFrame = (Math.floor(animTimer) % 3);
            } else {
                myAnimationFrame = 0;
                animTimer = 0;
            }
        }
        
        // ---------------- GAME LOOP DRAW ----------------
        function drawWorld() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // checkerboard grass pattern
            for (let i = 0; i < canvas.width; i += 40) {
                for (let j = 0; j < canvas.height; j += 40) {
                    ctx.fillStyle = ((i/40 + j/40) % 2 === 0) ? "#296229" : "#3c8c3c";
                    ctx.fillRect(i, j, 40, 40);
                }
            }
            // draw decorative flowers / pixel tiles
            ctx.fillStyle = "#c9e265";
            for (let i=0;i<80;i++) {
                ctx.fillRect((i*131)%canvas.width, (i*57)%canvas.height, 3, 3);
            }
            
            // draw remote players
            for (let [id, p] of remotePlayers.entries()) {
                if (p.x && p.y) {
                    const spriteImg = p.imgElement && p.imgElement.complete ? p.imgElement : null;
                    drawCharacter(spriteImg, p.x, p.y, p.dir, p.frame, p.name);
                }
            }
            // draw local player
            drawCharacter(localSpriteImg, myX, myY, myDirection, myAnimationFrame, myUsername + " (you)");
            
            // interaction hint
            ctx.font = "8px 'Press Start 2P'";
            ctx.fillStyle = "#b3ffb3";
            ctx.shadowBlur = 0;
            ctx.fillText("⚡ WASD / ARROWS", canvas.width-160, 30);
        }
        
        function gameLoop() {
            handleMovement();
            drawWorld();
            if (Date.now() - lastSyncFrame > SYNC_RATE_MS) {
                sendFullState();
                lastSyncFrame = Date.now();
            }
            requestAnimationFrame(gameLoop);
        }
        
        // ---------------- INITIALIZE ALL SYSTEMS ----------------
        async function initializeApp() {
            myPeerId = generateId();
            myUsername = "Agent_" + myPeerId.slice(-5);
            authDiv.style.display = "none";
            controlsBar.style.display = "flex";
            chatPanel.style.display = "flex";
            selfVideoBox.style.display = "block";
            
            // init webconnect
            wcInstance = webconnect({
                appName: "gather-town-mesh",
                channelName: ROOM_NAME,
                rtc: true,
                autoConnect: true,
                debug: false
            });
            
            wcInstance.onConnect((attr) => {
                addChatMessage("System", `⚡ Peer connected: ${attr.connectId.slice(0,8)}`, true);
            });
            
            wcInstance.onReceive((data, attr) => {
                if (data.type === "chat") {
                    addChatMessage(data.sender || "Guest", data.text);
                } else if (data.type === "move") {
                    if (remotePlayers.has(attr.connectId)) {
                        let p = remotePlayers.get(attr.connectId);
                        p.x = data.x; p.y = data.y; p.dir = data.dir; p.frame = data.frame;
                        remotePlayers.set(attr.connectId, p);
                    }
                }
            });
            
            // GenosDB
            try {
                dbInstance = await gdb(ROOM_NAME, { rtc: true, autoConnect: true, persist: false });
                console.log("GenosDB ready");
                // initial presence
                await dbInstance.put(`room.${ROOM_NAME}.players.${myPeerId}`, {
                    x: canvas.width/2, y: canvas.height/2, dir: 2, frame: 0,
                    name: myUsername, spriteURL: null, active: true
                });
                subscribeToDBChanges();
                
                // cleanup on page unload
                window.addEventListener("beforeunload", () => {
                    if (dbInstance) dbInstance.put(`room.${ROOM_NAME}.players.${myPeerId}`, null);
                });
            } catch(e) { console.error("DB init error", e); addChatMessage("System", "⚠️ GenosDB limited, p2p still works", true); }
            
            // init camera
            await initMediaDevices();
            
            // set event handlers
            document.getElementById("spriteBtn").onclick = uploadCustomSprite;
            camBtn.onclick = toggleCamera;
            micBtn.onclick = toggleMic;
            document.getElementById("resetCamBtn").onclick = () => { myX = canvas.width/2; myY = canvas.height/2; };
            
            // keyboard listeners
            window.addEventListener("keydown", (e) => {
                const key = e.key;
                if (movementKeys.hasOwnProperty(key)) movementKeys[key] = true;
                if (key === "Enter" && document.activeElement !== chatInput) {
                    chatInput.focus();
                }
            });
            window.addEventListener("keyup", (e) => { if (movementKeys.hasOwnProperty(e.key)) movementKeys[e.key] = false; });
            
            chatInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    const msg = chatInput.value.trim();
                    if (msg) {
                        broadcastChatMessage(msg);
                        chatInput.value = "";
                    }
                }
            });
            
            // set fallback default sprite (builtin pixel art if user doesn't upload)
            const defaultSpriteCanvas = document.createElement("canvas");
            defaultSpriteCanvas.width = 96;
            defaultSpriteCanvas.height = 128;
            const dctx = defaultSpriteCanvas.getContext("2d");
            dctx.fillStyle = "#44c844";
            dctx.fillRect(0,0,96,128);
            dctx.fillStyle = "#2a6b2a";
            dctx.fillRect(32,64,32,48);
            dctx.fillStyle = "#f5d742";
            dctx.fillRect(40,48,16,16);
            defaultSpriteCanvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.src = url;
                img.onload = () => { localSpriteImg = img; };
            });
            
            startGameLoop();
        }
        
        function startGameLoop() {
            gameLoop();
            setInterval(() => {
                // periodic cleanup of stale remote players (optional)
                if (dbInstance) sendFullState();
            }, 3000);
        }
        
        // expose globally for startup button
        window.joinGather = () => initializeApp();
        document.getElementById("joinBtn").onclick = () => initializeApp();
        
        // resize canvas to fit window
        function resizeCanvas() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            canvas.width = Math.min(1280, w - 20);
            canvas.height = Math.min(720, h - 20);
            canvas.style.width = `${canvas.width}px`;
            canvas.style.height = `${canvas.height}px`;
            if (!myX) { myX = canvas.width/2; myY = canvas.height/2; }
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
        
        console.log("✨ Gather Town clone ready — hybrid realtime mesh");
    </script>
</body>
</html>

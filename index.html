<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trystero Sprite Video World</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111827;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  background:rgba(0,0,0,0.72);
  padding:12px;
  border-radius:12px;
  width:330px;
}

#ui h2{
  font-size:18px;
  margin-bottom:10px;
}

#ui input,
#ui button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

#ui button{
  cursor:pointer;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

#ui small{
  display:block;
  opacity:.8;
  line-height:1.4;
  margin-top:-4px;
  margin-bottom:10px;
}

#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:32px 32px;
}

.player{
  position:absolute;
  width:32px;
  height:32px;
  user-select:none;
  transform:scale(2);
  transform-origin:top left;
}

.sprite{
  width:32px;
  height:32px;
  image-rendering:pixelated;
  background-repeat:no-repeat;
  background-size:96px 128px;
}

.nameTag{
  position:absolute;
  top:-16px;
  left:50%;
  transform:translateX(-50%) scale(.5);
  transform-origin:center;
  background:rgba(0,0,0,0.75);
  padding:2px 7px;
  border-radius:6px;
  font-size:12px;
  white-space:nowrap;
}

.videoWrap{
  position:absolute;
  top:-68px;
  left:-16px;
  width:64px;
  text-align:center;
  transform:scale(.5);
  transform-origin:center bottom;
}

video{
  width:128px;
  height:96px;
  object-fit:cover;
  border-radius:10px;
  border:2px solid white;
  background:black;
}

.status{
  font-size:11px;
  margin-top:4px;
}

#help{
  position:fixed;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,0.72);
  padding:10px;
  border-radius:10px;
  z-index:9999;
  font-size:13px;
  line-height:1.5;
}
</style>
</head>
<body>

<div id="ui">
  <h2>Trystero Sprite Video World</h2>

  <input type="text" id="roomInput" placeholder="Room Name" value="demo-room" />

  <input type="file" id="spriteUpload" accept="image/png,image/webp,image/jpeg" />
  <small>Upload a 96x128 sprite sheet. Frame size must be 32x32. Layout: 3 columns × 4 rows.</small>

  <button id="joinBtn">Join Room</button>
  <button id="camBtn">Toggle Camera</button>
  <button id="micBtn">Toggle Mic</button>
</div>

<div id="help">
  W A S D = Move<br>
  Sprite format: 96x128px<br>
  Each frame: 32x32px<br>
  Rows: Down, Left, Right, Up
</div>

<div id="scene"></div>

<script type="module">
import {joinRoom} from 'https://cdn.jsdelivr.net/npm/trystero@0.20.1/+esm'

const config = {
  appId: 'sprite-video-world'
}

const scene = document.getElementById('scene')
const joinBtn = document.getElementById('joinBtn')
const camBtn = document.getElementById('camBtn')
const micBtn = document.getElementById('micBtn')
const spriteUpload = document.getElementById('spriteUpload')
const roomInput = document.getElementById('roomInput')

let room
let localStream
let cameraEnabled = true
let micEnabled = true
let sendStateAction = null
let sendSpriteAction = null

const FRAME_W = 32
const FRAME_H = 32
const SHEET_W = 96
const SHEET_H = 128
const COLS = 3

const DIRECTION_ROW = {
  down: 0,
  left: 1,
  right: 2,
  up: 3
}

const myId = Math.random().toString(36).substring(2, 8)
const defaultSprite = createDefaultSprite()

const myPlayer = {
  id: myId,
  x: 220,
  y: 220,
  direction: 'down',
  frame: 1,
  moving: false,
  sprite: defaultSprite,
  name: 'Player-' + myId,
  cam: true,
  mic: true
}

const players = {}

spriteUpload.addEventListener('change', e => {
  const file = e.target.files[0]
  if(!file) return

  const img = new Image()
  const objectURL = URL.createObjectURL(file)

  img.onload = () => {
    if(img.width !== SHEET_W || img.height !== SHEET_H){
      alert('Please upload an exact 96x128px sprite sheet. Your file is ' + img.width + 'x' + img.height + 'px.')
      URL.revokeObjectURL(objectURL)
      spriteUpload.value = ''
      return
    }

    const reader = new FileReader()

    reader.onload = ev => {
      myPlayer.sprite = ev.target.result

      if(players[myId]){
        players[myId].querySelector('.sprite').style.backgroundImage = `url(${myPlayer.sprite})`
      }

      sendState()
      sendSprite()
      URL.revokeObjectURL(objectURL)
    }

    reader.readAsDataURL(file)
  }

  img.onerror = () => {
    alert('Invalid image file.')
    URL.revokeObjectURL(objectURL)
    spriteUpload.value = ''
  }

  img.src = objectURL
})

joinBtn.onclick = async () => {
  joinBtn.disabled = true

  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    })
  }catch(err){
    alert('Camera/microphone permission is required for video chat.')
    joinBtn.disabled = false
    return
  }

  room = joinRoom(config, roomInput.value.trim() || 'demo-room')

  createPlayer(myPlayer, true)

  ;[sendStateAction] = room.makeAction('state')
  const [, getStateAction] = room.makeAction('state')

  ;[sendSpriteAction] = room.makeAction('sprite')
  const [, getSpriteAction] = room.makeAction('sprite')

  room.onPeerJoin(peerId => {
    sendState()
    sendSprite()
  })

  room.onPeerLeave(peerId => {
    if(players[peerId]){
      players[peerId].remove()
      delete players[peerId]
    }
  })

  room.addStream(localStream)

  room.onPeerStream((stream, peerId) => {
    if(!players[peerId]){
      createPlayer({
        id: peerId,
        x: 300,
        y: 300,
        direction: 'down',
        frame: 1,
        sprite: defaultSprite,
        name: 'Peer-' + peerId,
        cam: true,
        mic: true
      }, false)
    }

    const video = players[peerId].querySelector('video')
    video.srcObject = stream
  })

  getStateAction((data, peerId) => {
    data.id = peerId

    if(!players[peerId]){
      createPlayer(data, false)
    }

    updatePlayer(peerId, data)
  })

  getSpriteAction((data, peerId) => {
    if(players[peerId] && data.sprite){
      players[peerId].querySelector('.sprite').style.backgroundImage = `url(${data.sprite})`
    }
  })

  setupControls()

  setInterval(() => {
    sendState()
  }, 100)
}

function createPlayer(data, isSelf){
  const div = document.createElement('div')
  div.className = 'player'
  div.id = 'player-' + data.id

  div.innerHTML = `
    <div class="nameTag">${escapeHTML(data.name || data.id)}</div>
    <div class="videoWrap">
      <video autoplay playsinline ${isSelf ? 'muted' : ''}></video>
      <div class="status">🎥 ${data.cam ? 'on' : 'off'} · 🎙️ ${data.mic ? 'on' : 'off'}</div>
    </div>
    <div class="sprite"></div>
  `

  scene.appendChild(div)

  const sprite = div.querySelector('.sprite')
  sprite.style.backgroundImage = `url(${data.sprite || defaultSprite})`

  if(isSelf && localStream){
    div.querySelector('video').srcObject = localStream
  }

  players[data.id] = div
  updatePlayer(data.id, data)
}

function updatePlayer(id, data){
  const player = players[id]
  if(!player) return

  player.style.left = data.x + 'px'
  player.style.top = data.y + 'px'

  if(data.sprite){
    player.querySelector('.sprite').style.backgroundImage = `url(${data.sprite})`
  }

  const sprite = player.querySelector('.sprite')
  const row = DIRECTION_ROW[data.direction] ?? 0
  const frame = Math.floor(data.frame) % COLS

  sprite.style.backgroundPosition = `-${frame * FRAME_W}px -${row * FRAME_H}px`

  const status = player.querySelector('.status')
  if(status){
    status.textContent = `🎥 ${data.cam ? 'on' : 'off'} · 🎙️ ${data.mic ? 'on' : 'off'}`
  }
}

function setupControls(){
  const speed = 2
  const keys = {}
  let lastSent = 0

  window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase()
    if(['w','a','s','d'].includes(key)) e.preventDefault()
    keys[key] = true
  })

  window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false
  })

  function gameLoop(timestamp){
    let moving = false

    if(keys.w){
      myPlayer.y -= speed
      myPlayer.direction = 'up'
      moving = true
    }

    if(keys.s){
      myPlayer.y += speed
      myPlayer.direction = 'down'
      moving = true
    }

    if(keys.a){
      myPlayer.x -= speed
      myPlayer.direction = 'left'
      moving = true
    }

    if(keys.d){
      myPlayer.x += speed
      myPlayer.direction = 'right'
      moving = true
    }

    myPlayer.x = Math.max(0, Math.min(window.innerWidth - 64, myPlayer.x))
    myPlayer.y = Math.max(120, Math.min(window.innerHeight - 64, myPlayer.y))

    if(moving){
      myPlayer.frame += 0.18
    }else{
      myPlayer.frame = 1
    }

    myPlayer.moving = moving
    updatePlayer(myId, myPlayer)

    if(timestamp - lastSent > 80){
      sendState()
      lastSent = timestamp
    }

    requestAnimationFrame(gameLoop)
  }

  requestAnimationFrame(gameLoop)
}

camBtn.onclick = () => {
  if(!localStream) return

  cameraEnabled = !cameraEnabled
  myPlayer.cam = cameraEnabled

  localStream.getVideoTracks().forEach(track => {
    track.enabled = cameraEnabled
  })

  sendState()
}

micBtn.onclick = () => {
  if(!localStream) return

  micEnabled = !micEnabled
  myPlayer.mic = micEnabled

  localStream.getAudioTracks().forEach(track => {
    track.enabled = micEnabled
  })

  sendState()
}

function sendState(){
  if(sendStateAction){
    sendStateAction({
      x: myPlayer.x,
      y: myPlayer.y,
      direction: myPlayer.direction,
      frame: myPlayer.frame,
      moving: myPlayer.moving,
      sprite: myPlayer.sprite,
      name: myPlayer.name,
      cam: myPlayer.cam,
      mic: myPlayer.mic
    })
  }
}

function sendSprite(){
  if(sendSpriteAction){
    sendSpriteAction({
      sprite: myPlayer.sprite
    })
  }
}

function escapeHTML(str){
  return String(str).replace(/[&<>'"]/g, char => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#039;',
    '"':'&quot;'
  }[char]))
}

function createDefaultSprite(){
  const canvas = document.createElement('canvas')
  canvas.width = SHEET_W
  canvas.height = SHEET_H
  const ctx = canvas.getContext('2d')
  ctx.imageSmoothingEnabled = false

  const colors = ['#60a5fa', '#34d399', '#f59e0b', '#f472b6']

  for(let row = 0; row < 4; row++){
    for(let col = 0; col < 3; col++){
      const x = col * FRAME_W
      const y = row * FRAME_H
      const bob = col === 1 ? 0 : 1

      ctx.fillStyle = 'transparent'
      ctx.clearRect(x, y, FRAME_W, FRAME_H)

      ctx.fillStyle = '#facc15'
      ctx.fillRect(x + 11, y + 3 + bob, 10, 10)

      ctx.fillStyle = colors[row]
      ctx.fillRect(x + 9, y + 14 + bob, 14, 11)

      ctx.fillStyle = '#111827'
      ctx.fillRect(x + 10, y + 25, 4, 5)
      ctx.fillRect(x + 18, y + 25, 4, 5)

      ctx.fillStyle = '#ffffff'
      if(row === 0){
        ctx.fillRect(x + 13, y + 7 + bob, 2, 2)
        ctx.fillRect(x + 18, y + 7 + bob, 2, 2)
      }
    }
  }

  return canvas.toDataURL('image/png')
}
</script>
</body>
</html>

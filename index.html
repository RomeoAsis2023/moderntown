<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprite P2P Video Chat World</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0f172a;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

#ui{
  position:fixed;
  top:12px;
  left:12px;
  z-index:9999;
  width:350px;
  background:rgba(0,0,0,.72);
  padding:14px;
  border-radius:14px;
}

#ui h1{
  font-size:18px;
  margin-bottom:10px;
}

#ui input,
#ui button{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:9px;
}

#ui button{
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#ui button:disabled{
  opacity:.55;
}

#status{
  font-size:13px;
  color:#cbd5e1;
  line-height:1.4;
}

#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);

  background-size:32px 32px;
}

.player{
  position:absolute;
  width:96px;
  height:96px;
}

.nameTag{
  position:absolute;
  top:-20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.7);
  padding:3px 8px;
  border-radius:999px;
  font-size:12px;
  white-space:nowrap;
}

.sprite{
  position:absolute;
  left:32px;
  top:8px;
  width:32px;
  height:32px;
  image-rendering:pixelated;
  background-repeat:no-repeat;
  background-size:96px 128px;
  transform:scale(2);
  transform-origin:top left;
}

.chatBubble{
  position:absolute;
  top:-42px;
  left:50%;
  transform:translateX(-50%);
  width:34px;
  height:34px;
  border-radius:50%;
  border:none;
  background:#2563eb;
  color:white;
  font-size:17px;
  cursor:pointer;
  display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.player.nearby .chatBubble{
  display:block;
}

#help{
  position:fixed;
  bottom:12px;
  left:12px;
  z-index:9999;
  background:rgba(0,0,0,.72);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:#cbd5e1;
  line-height:1.5;
}

.modal{
  position:fixed;
  inset:0;
  z-index:99999;
  background:rgba(0,0,0,.68);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalBox{
  width:420px;
  background:#111827;
  border:1px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.modalBox.wide{
  width:760px;
}

.modalBox h2{
  font-size:19px;
  margin-bottom:8px;
}

.modalBox p{
  font-size:14px;
  color:#cbd5e1;
  line-height:1.5;
  margin-bottom:12px;
}

.previewVideo,
.remoteVideo{
  width:100%;
  background:#020617;
  object-fit:cover;
  border-radius:14px;
}

.previewVideo{
  height:210px;
  margin-bottom:12px;
}

.remoteVideo{
  height:360px;
}

.callGrid{
  display:grid;
  grid-template-columns:1fr 210px;
  gap:12px;
  margin-bottom:12px;
}

.sidePanel{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.localPreview{
  width:100%;
  height:120px;
  background:#020617;
  object-fit:cover;
  border-radius:12px;
}

.modalControls,
.callControls{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:12px;
}

.iconBtn{
  width:38px;
  height:38px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.iconBtn.off{
  background:#dc2626;
}

.modalActions{
  display:flex;
  gap:8px;
}

.modalActions button,
.sendBtn{
  padding:11px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.modalActions button{
  flex:1;
}

.acceptBtn,
.callBtn,
.sendBtn{
  background:#16a34a;
}

.declineBtn,
.cancelBtn{
  background:#dc2626;
}

.chatBox{
  height:185px;
  background:#020617;
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:10px;
  overflow:auto;
  font-size:13px;
  color:#e5e7eb;
}

.chatMsg{
  margin-bottom:8px;
  line-height:1.35;
}

.chatMsg b{
  color:#93c5fd;
}

.chatInputRow{
  display:flex;
  gap:8px;
}

.chatInputRow input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}
</style>
</head>

<body>

<div id="ui">
  <h1>Sprite P2P Video Chat World</h1>

  <input id="roomInput" value="demo-room" placeholder="Room name" />

  <input id="spriteUpload" type="file" accept="image/png,image/webp,image/jpeg" />

  <button id="joinBtn">Join Room</button>

  <div id="status">Not connected</div>
</div>

<div id="help">
  URL name: <b>?name=romeo</b><br>
  Upload sprite: <b>96x128px</b><br>
  W A S D = Move Sprite<br>
  💬 appears only when near another player (80px)
</div>

<div id="scene"></div>

<div id="requestModal" class="modal">
  <div class="modalBox">

    <h2 id="requestTitle">Video Call</h2>

    <p id="requestText">Call request</p>

    <video id="requestPreview"
           class="previewVideo"
           autoplay
           playsinline
           muted></video>

    <div class="modalControls">
      <button id="requestVideoBtn" class="iconBtn">📹</button>
      <button id="requestMicBtn" class="iconBtn">🎙️</button>
    </div>

    <div id="requestActions" class="modalActions"></div>

  </div>
</div>

<div id="callModal" class="modal">
  <div class="modalBox wide">

    <h2 id="callTitle">Video Chat</h2>

    <div class="callGrid">

      <div>
        <video id="remoteVideo"
               class="remoteVideo"
               autoplay
               playsinline></video>
      </div>

      <div class="sidePanel">

        <video id="localPreview"
               class="localPreview"
               autoplay
               playsinline
               muted></video>

        <div class="callControls">
          <button id="callVideoBtn" class="iconBtn">📹</button>
          <button id="callMicBtn" class="iconBtn">🎙️</button>
          <button id="callSpeakerBtn" class="iconBtn">🔊</button>
          <button id="callEndBtn" class="iconBtn off">❌</button>
        </div>

        <div id="chatBox" class="chatBox"></div>

        <div class="chatInputRow">
          <input id="chatInput" placeholder="Type message..." />
          <button id="sendChatBtn" class="sendBtn">Send</button>
        </div>

      </div>

    </div>

  </div>
</div>

<script type="module">
import webconnect from 'https://cdn.jsdelivr.net/npm/webconnect/dist/esm/webconnect.js'

const scene = document.getElementById('scene')
const statusEl = document.getElementById('status')
const joinBtn = document.getElementById('joinBtn')
const roomInput = document.getElementById('roomInput')
const spriteUpload = document.getElementById('spriteUpload')

const requestModal = document.getElementById('requestModal')
const requestTitle = document.getElementById('requestTitle')
const requestText = document.getElementById('requestText')
const requestPreview = document.getElementById('requestPreview')
const requestActions = document.getElementById('requestActions')

const requestVideoBtn = document.getElementById('requestVideoBtn')
const requestMicBtn = document.getElementById('requestMicBtn')

const callModal = document.getElementById('callModal')
const callTitle = document.getElementById('callTitle')

const remoteVideo = document.getElementById('remoteVideo')
const localPreview = document.getElementById('localPreview')

const callVideoBtn = document.getElementById('callVideoBtn')
const callMicBtn = document.getElementById('callMicBtn')
const callSpeakerBtn = document.getElementById('callSpeakerBtn')
const callEndBtn = document.getElementById('callEndBtn')

const chatBox = document.getElementById('chatBox')
const chatInput = document.getElementById('chatInput')
const sendChatBtn = document.getElementById('sendChatBtn')

const urlParams = new URLSearchParams(window.location.search)

const playerName =
  sanitizeName(urlParams.get('name')) ||
  'Guest-' + Math.random().toString(36).substring(2,6)

const FRAME_W = 32
const FRAME_H = 32
const SHEET_W = 96
const SHEET_H = 128
const COLS = 3

const CHAT_DISTANCE = 80

const DIRECTION_ROW = {
  down:0,
  left:1,
  right:2,
  up:3
}

let connect = null
let localStream = null
let myConnectId = null
let roomName = null
let movementStarted = false
let activeCallPeer = null

const connectedPeers = new Set()
const peerStates = {}
const players = {}
const peerConnections = {}
const pendingIce = {}

let localState = {
  video:true,
  mic:true,
  sprite:createDefaultSprite(),
  direction:'down',
  frame:1,
  moving:false
}

let myPosition = {
  x:360,
  y:220
}

spriteUpload.addEventListener('change', e => {
  const file = e.target.files[0]
  if(!file) return

  const img = new Image()
  const url = URL.createObjectURL(file)

  img.onload = () => {

    if(img.width !== SHEET_W || img.height !== SHEET_H){
      alert('Please upload exact 96x128px sprite sheet.')
      spriteUpload.value = ''
      URL.revokeObjectURL(url)
      return
    }

    const reader = new FileReader()

    reader.onload = ev => {

      localState.sprite = ev.target.result

      if(players.local){
        players.local.querySelector('.sprite').style.backgroundImage =
          `url(${localState.sprite})`
      }

      broadcastState()
    }

    reader.readAsDataURL(file)
    URL.revokeObjectURL(url)
  }

  img.src = url
})

joinBtn.onclick = async () => {

  joinBtn.disabled = true

  roomName = roomInput.value.trim() || 'demo-room'

  try{

    localStream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    })

  }catch(error){

    alert('Camera and microphone permission are required.')
    joinBtn.disabled = false
    return
  }

  requestPreview.srcObject = localStream
  localPreview.srcObject = localStream

  createPlayer('local', playerName, true)

  connect = webconnect()

  connect.getMyId(attribute => {

    myConnectId = attribute.connectId

    statusEl.textContent =
      'Connected as ' +
      playerName +
      ' (' +
      myConnectId +
      ') · Room: ' +
      roomName
  })

  connect.onConnect(attribute => {
    sendHello(attribute.connectId)
  })

  connect.onDisconnect(attribute => {
    removePeer(attribute.connectId)
  })

  connect.onReceive(async (data, attribute) => {

    const peerId = attribute.connectId

    if(!data || !data.type) return
    if(data.room && data.room !== roomName) return

    if(data.type === 'room-hello'){

      await acceptPeer(peerId)

      sendHello(peerId)

      broadcastState(peerId)

      return
    }

    if(data.type === 'state'){

      peerStates[peerId] = data.state

      if(!players[peerId]){
        createPlayer(
          peerId,
          data.state.name || 'Peer-' + peerId.substring(0,4),
          false
        )
      }

      updateRemotePlayer(peerId)

      return
    }

    if(data.type === 'video-call-request'){
      showIncomingRequest(peerId, data.fromName || 'Someone')
      return
    }

    if(data.type === 'video-call-accept'){

      activeCallPeer = peerId

      closeRequestModal()

      openCallModal(peerId)

      await startCall(peerId, shouldInitiate(peerId))

      return
    }

    if(data.type === 'video-call-decline'){

      closeRequestModal()

      alert((peerStates[peerId]?.name || 'Peer') + ' declined the video call.')

      return
    }

    if(data.type === 'video-call-end'){
      endCall(peerId, false)
      return
    }

    if(data.type === 'video-chat-message'){
      addChatMessage(data.fromName || 'Peer', data.message || '', false)
      return
    }

    if(data.type === 'webrtc-offer'){
      await handleOffer(peerId, data.offer)
      return
    }

    if(data.type === 'webrtc-answer'){
      await handleAnswer(peerId, data.answer)
      return
    }

    if(data.type === 'webrtc-ice'){
      await handleIce(peerId, data.candidate)
      return
    }
  })

  if(!movementStarted){
    movementStarted = true
    movementLoop()
  }
}

function createPlayer(id, name, isLocal){

  if(players[id]) return

  const player = document.createElement('div')

  player.className = 'player'
  player.id = 'player-' + id

  player.innerHTML = `
    <div class="nameTag">${escapeHTML(name)}</div>
    <button class="chatBubble">💬</button>
    <div class="sprite"></div>
  `

  scene.appendChild(player)

  const sprite = player.querySelector('.sprite')

  sprite.style.backgroundImage =
    `url(${isLocal ? localState.sprite : createDefaultSprite()})`

  const chatBubble = player.querySelector('.chatBubble')

  if(isLocal){

    player.style.left = myPosition.x + 'px'
    player.style.top = myPosition.y + 'px'

    chatBubble.style.display = 'none'

  }else{

    player.style.left = '300px'
    player.style.top = '300px'

    chatBubble.onclick = e => {

      e.stopPropagation()

      const myPlayer = players.local

      const distance = distanceBetweenPlayers(myPlayer, player)

      if(distance > CHAT_DISTANCE){
        alert('You need to move closer to chat.')
        return
      }

      showOutgoingRequest(id)
    }
  }

  players[id] = player
}

function distanceBetweenPlayers(a, b){

  const ax = parseFloat(a.style.left || 0)
  const ay = parseFloat(a.style.top || 0)

  const bx = parseFloat(b.style.left || 0)
  const by = parseFloat(b.style.top || 0)

  const dx = ax - bx
  const dy = ay - by

  return Math.sqrt(dx * dx + dy * dy)
}

function updateNearbyChatBubbles(){

  const myPlayer = players.local

  if(!myPlayer) return

  Object.keys(players).forEach(peerId => {

    if(peerId === 'local') return

    const peerPlayer = players[peerId]

    if(!peerPlayer) return

    const distance =
      distanceBetweenPlayers(myPlayer, peerPlayer)

    if(distance <= CHAT_DISTANCE){

      peerPlayer.classList.add('nearby')

    }else{

      peerPlayer.classList.remove('nearby')
    }
  })
}

function showOutgoingRequest(peerId){

  const name = peerStates[peerId]?.name || 'Peer'

  requestTitle.textContent = 'Start Video Call'

  requestText.textContent =
    'Do you want to video call ' + name + '?'

  requestActions.innerHTML = `
    <button class="callBtn" id="callNowBtn">Call</button>
    <button class="cancelBtn" id="cancelCallBtn">Cancel</button>
  `

  document.getElementById('callNowBtn').onclick = () => {

    sendToPeer(peerId,{
      type:'video-call-request',
      room:roomName,
      fromName:playerName
    })

    requestText.textContent =
      'Calling ' + name + '... waiting for answer.'

    requestActions.innerHTML = `
      <button class="cancelBtn" id="cancelCallBtn2">Cancel</button>
    `

    document.getElementById('cancelCallBtn2').onclick =
      closeRequestModal
  }

  document.getElementById('cancelCallBtn').onclick =
    closeRequestModal

  requestModal.style.display = 'flex'
}

function showIncomingRequest(peerId, fromName){

  requestTitle.textContent = 'Incoming Video Call'

  requestText.textContent =
    fromName + ' wants to video call you.'

  requestActions.innerHTML = `
    <button class="acceptBtn" id="acceptCallBtn">Accept</button>
    <button class="declineBtn" id="declineCallBtn">Decline</button>
  `

  document.getElementById('acceptCallBtn').onclick =
    async () => {

      activeCallPeer = peerId

      sendToPeer(peerId,{
        type:'video-call-accept',
        room:roomName
      })

      closeRequestModal()

      openCallModal(peerId)

      await startCall(peerId, shouldInitiate(peerId))
    }

  document.getElementById('declineCallBtn').onclick = () => {

    sendToPeer(peerId,{
      type:'video-call-decline',
      room:roomName
    })

    closeRequestModal()
  }

  requestModal.style.display = 'flex'
}

function closeRequestModal(){
  requestModal.style.display = 'none'
}

function openCallModal(peerId){

  const name = peerStates[peerId]?.name || 'Peer'

  activeCallPeer = peerId

  callTitle.textContent =
    'Video Chat with ' + name

  localPreview.srcObject = localStream

  chatBox.innerHTML = ''

  addChatMessage(
    'System',
    'Call connected. You can now chat P2P.',
    false
  )

  callModal.style.display = 'flex'
}

function closeCallModal(){
  callModal.style.display = 'none'
  remoteVideo.srcObject = null
}

requestVideoBtn.onclick = () => toggleLocalVideo()
requestMicBtn.onclick = () => toggleLocalMic()

callVideoBtn.onclick = () => toggleLocalVideo()
callMicBtn.onclick = () => toggleLocalMic()

callSpeakerBtn.onclick = () => {

  remoteVideo.muted = !remoteVideo.muted

  callSpeakerBtn.classList.toggle(
    'off',
    remoteVideo.muted
  )

  callSpeakerBtn.textContent =
    remoteVideo.muted ? '🔈' : '🔊'
}

callEndBtn.onclick = () => {

  if(activeCallPeer){
    endCall(activeCallPeer, true)
  }
}

sendChatBtn.onclick = sendChatMessage

chatInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    sendChatMessage()
  }
})

function sendChatMessage(){

  const message = chatInput.value.trim()

  if(!message || !activeCallPeer) return

  addChatMessage(playerName, message, true)

  sendToPeer(activeCallPeer,{
    type:'video-chat-message',
    room:roomName,
    fromName:playerName,
    message
  })

  chatInput.value = ''
}

function addChatMessage(name, message, isMe){

  const div = document.createElement('div')

  div.className = 'chatMsg'

  div.innerHTML =
    `<b>${escapeHTML(isMe ? 'You' : name)}:</b> ${escapeHTML(message)}`

  chatBox.appendChild(div)

  chatBox.scrollTop = chatBox.scrollHeight
}

function toggleLocalVideo(){

  localState.video = !localState.video

  localStream.getVideoTracks().forEach(track => {
    track.enabled = localState.video
  })

  ;[
    requestVideoBtn,
    callVideoBtn
  ].forEach(btn => {

    btn.classList.toggle('off', !localState.video)

    btn.textContent =
      localState.video ? '📹' : '📷'
  })

  broadcastState()
}

function toggleLocalMic(){

  localState.mic = !localState.mic

  localStream.getAudioTracks().forEach(track => {
    track.enabled = localState.mic
  })

  ;[
    requestMicBtn,
    callMicBtn
  ].forEach(btn => {

    btn.classList.toggle('off', !localState.mic)

    btn.textContent =
      localState.mic ? '🎙️' : '🔇'
  })

  broadcastState()
}

function sendHello(peerId){

  sendToPeer(peerId,{
    type:'room-hello',
    room:roomName,
    name:playerName
  })
}

async function acceptPeer(peerId){

  if(connectedPeers.has(peerId)) return

  connectedPeers.add(peerId)

  statusEl.textContent =
    peerId + ' joined room'
}

function shouldInitiate(peerId){

  if(!myConnectId) return false

  return String(myConnectId) < String(peerId)
}

async function startCall(peerId, shouldCreateOffer){

  if(peerConnections[peerId]){
    return peerConnections[peerId]
  }

  const pc = createPeerConnection(peerId)

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream)
  })

  if(shouldCreateOffer){

    const offer = await pc.createOffer()

    await pc.setLocalDescription(offer)

    sendToPeer(peerId,{
      type:'webrtc-offer',
      room:roomName,
      offer:pc.localDescription
    })
  }

  return pc
}

function createPeerConnection(peerId){

  const pc = new RTCPeerConnection({
    iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:global.stun.twilio.com:3478'}
    ]
  })

  peerConnections[peerId] = pc

  pendingIce[peerId] =
    pendingIce[peerId] || []

  pc.onicecandidate = event => {

    if(event.candidate){

      sendToPeer(peerId,{
        type:'webrtc-ice',
        room:roomName,
        candidate:event.candidate
      })
    }
  }

  pc.ontrack = event => {

    const stream = event.streams[0]

    if(stream){

      remoteVideo.srcObject = stream

      remoteVideo.play().catch(() => {})

      callModal.style.display = 'flex'
    }
  }

  pc.onconnectionstatechange = () => {

    if(pc.connectionState === 'connected'){

      statusEl.textContent =
        'Video connected with ' +
        (peerStates[peerId]?.name || peerId)
    }

    if(
      ['closed','failed','disconnected']
      .includes(pc.connectionState)
    ){
      endCall(peerId, false)
    }
  }

  return pc
}

async function handleOffer(peerId, offer){

  await acceptPeer(peerId)

  activeCallPeer = peerId

  openCallModal(peerId)

  const pc = await startCall(peerId, false)

  await pc.setRemoteDescription(
    new RTCSessionDescription(offer)
  )

  await flushPendingIce(peerId)

  const answer = await pc.createAnswer()

  await pc.setLocalDescription(answer)

  sendToPeer(peerId,{
    type:'webrtc-answer',
    room:roomName,
    answer:pc.localDescription
  })

  broadcastState(peerId)
}

async function handleAnswer(peerId, answer){

  const pc = peerConnections[peerId]

  if(!pc) return

  await pc.setRemoteDescription(
    new RTCSessionDescription(answer)
  )

  await flushPendingIce(peerId)
}

async function handleIce(peerId, candidate){

  if(!candidate) return

  const pc = peerConnections[peerId]

  if(!pc || !pc.remoteDescription){

    pendingIce[peerId] =
      pendingIce[peerId] || []

    pendingIce[peerId].push(candidate)

    return
  }

  try{

    await pc.addIceCandidate(
      new RTCIceCandidate(candidate)
    )

  }catch(error){

    console.warn('ICE error:', error)
  }
}

async function flushPendingIce(peerId){

  const pc = peerConnections[peerId]

  const queue =
    pendingIce[peerId] || []

  while(queue.length){

    const candidate = queue.shift()

    try{

      await pc.addIceCandidate(
        new RTCIceCandidate(candidate)
      )

    }catch(error){

      console.warn('Queued ICE error:', error)
    }
  }
}

function endCall(peerId, notify){

  if(notify){

    sendToPeer(peerId,{
      type:'video-call-end',
      room:roomName
    })
  }

  if(peerConnections[peerId]){

    peerConnections[peerId].close()

    delete peerConnections[peerId]
  }

  delete pendingIce[peerId]

  activeCallPeer = null

  closeCallModal()

  statusEl.textContent = 'Call ended'
}

function updateRemotePlayer(peerId){

  const player = players[peerId]

  const state = peerStates[peerId]

  if(!player || !state) return

  if(state.name){
    player.querySelector('.nameTag').textContent =
      state.name
  }

  if(state.sprite){
    player.querySelector('.sprite').style.backgroundImage =
      `url(${state.sprite})`
  }

  if(typeof state.x === 'number'){
    player.style.left = state.x + 'px'
  }

  if(typeof state.y === 'number'){
    player.style.top = state.y + 'px'
  }

  updateSpriteFrame(
    player,
    state.direction,
    state.frame
  )
}

function updateSpriteFrame(player, direction, frame){

  const sprite =
    player.querySelector('.sprite')

  const row =
    DIRECTION_ROW[direction] ?? 0

  const col =
    Math.floor(frame) % COLS

  sprite.style.backgroundPosition =
    `-${col * FRAME_W}px -${row * FRAME_H}px`
}

const keys = {}

window.addEventListener('keydown', e => {

  const key = e.key.toLowerCase()

  if(['w','a','s','d'].includes(key)){
    e.preventDefault()
  }

  keys[key] = true
})

window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false
})

let lastMoveSend = 0

function movementLoop(timestamp = 0){

  const speed = 3

  let moved = false

  if(keys.w){
    myPosition.y -= speed
    localState.direction = 'up'
    moved = true
  }

  if(keys.s){
    myPosition.y += speed
    localState.direction = 'down'
    moved = true
  }

  if(keys.a){
    myPosition.x -= speed
    localState.direction = 'left'
    moved = true
  }

  if(keys.d){
    myPosition.x += speed
    localState.direction = 'right'
    moved = true
  }

  myPosition.x =
    Math.max(
      0,
      Math.min(window.innerWidth - 180, myPosition.x)
    )

  myPosition.y =
    Math.max(
      40,
      Math.min(window.innerHeight - 190, myPosition.y)
    )

  localState.moving = moved

  localState.frame =
    moved ? localState.frame + 0.16 : 1

  const myPlayer = players.local

  if(myPlayer){

    myPlayer.style.left =
      myPosition.x + 'px'

    myPlayer.style.top =
      myPosition.y + 'px'

    updateSpriteFrame(
      myPlayer,
      localState.direction,
      localState.frame
    )
  }

  updateNearbyChatBubbles()

  if(moved && timestamp - lastMoveSend > 60){

    broadcastState()

    lastMoveSend = timestamp
  }

  requestAnimationFrame(movementLoop)
}

function broadcastState(targetPeerId = null){

  if(!connect) return

  const payload = {
    type:'state',
    room:roomName,
    state:{
      ...localState,
      x:myPosition.x,
      y:myPosition.y,
      name:playerName
    }
  }

  if(targetPeerId){

    sendToPeer(targetPeerId, payload)

    return
  }

  connectedPeers.forEach(peerId => {
    sendToPeer(peerId, payload)
  })
}

function sendToPeer(peerId, payload){

  if(!connect || !peerId) return

  try{

    connect.Send(payload,{
      connectId:peerId
    })

  }catch(error){

    console.warn('Send failed:', peerId, error)
  }
}

function removePeer(peerId){

  connectedPeers.delete(peerId)

  if(peerConnections[peerId]){

    peerConnections[peerId].close()

    delete peerConnections[peerId]
  }

  if(players[peerId]){

    players[peerId].remove()

    delete players[peerId]
  }

  delete peerStates[peerId]
  delete pendingIce[peerId]

  if(activeCallPeer === peerId){

    activeCallPeer = null

    closeCallModal()
  }
}

function sanitizeName(name){

  if(!name) return ''

  return String(name)
    .trim()
    .slice(0,24)
    .replace(/[<>]/g,'')
}

function escapeHTML(str){

  return String(str).replace(/[&<>'"]/g, char => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#039;',
    '"':'&quot;'
  }[char]))
}

function createDefaultSprite(){

  const canvas = document.createElement('canvas')

  canvas.width = SHEET_W
  canvas.height = SHEET_H

  const ctx = canvas.getContext('2d')

  ctx.imageSmoothingEnabled = false

  const shirt = [
    '#60a5fa',
    '#22c55e',
    '#f97316',
    '#a855f7'
  ]

  for(let row = 0; row < 4; row++){

    for(let col = 0; col < 3; col++){

      const x = col * FRAME_W
      const y = row * FRAME_H
      const step = col === 1 ? 0 : 1

      ctx.clearRect(x,y,FRAME_W,FRAME_H)

      ctx.fillStyle = '#facc15'
      ctx.fillRect(x+11,y+3+step,10,10)

      ctx.fillStyle = shirt[row]
      ctx.fillRect(x+9,y+14+step,14,11)

      ctx.fillStyle = '#111827'
      ctx.fillRect(x+10,y+25,4,5)
      ctx.fillRect(x+18,y+25,4,5)

      if(row === 0){
        ctx.fillStyle = '#fff'
        ctx.fillRect(x+13,y+7+step,2,2)
        ctx.fillRect(x+18,y+7+step,2,2)
      }
    }
  }

  return canvas.toDataURL('image/png')
}
</script>

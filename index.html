<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trystero Sprite Video World</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111827;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  background:rgba(0,0,0,0.7);
  padding:12px;
  border-radius:12px;
  width:320px;
}

#ui h2{
  font-size:18px;
  margin-bottom:10px;
}

#ui input,
#ui button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

#ui button{
  cursor:pointer;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:32px 32px;
}

.player{
  position:absolute;
  width:64px;
  height:96px;
  user-select:none;
}

.sprite{
  width:64px;
  height:96px;
  image-rendering:pixelated;
  background-size:256px 128px;
  background-repeat:no-repeat;
  position:absolute;
  left:0;
  top:0;
}

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ModernTown • P2P Virtual Office</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background:#0f172a; font-family:'Inter',sans-serif; overflow:hidden; height:100vh; color:#e2e8f0; }
        .app-container { display:flex; height:100vh; }
        .sidebar { width:85px; background:rgba(15,23,42,0.98); backdrop-filter:blur(12px); display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:24px 0; border-right:1px solid rgba(148,163,184,0.1); }
        .sidebar nav ul { list-style:none; display:flex; flex-direction:column; gap:28px; }
        .sidebar nav ul li a { width:52px; height:52px; background:rgba(255,255,255,0.08); border-radius:18px; display:flex; align-items:center; justify-content:center; transition:0.25s; }
        .sidebar nav ul li a:hover { background:#3b82f6; transform:scale(1.1); }
        .workspace { flex:1; display:flex; flex-direction:column; padding:16px 20px; gap:16px; background:#1e2937; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; background:#334155; padding:10px 28px; border-radius:9999px; }
        .canvas-wrapper { flex:1; background:#1e2937; border-radius:28px; border:4px solid #334155; overflow:hidden; position:relative; }
        canvas { display:block; background:#0f172a; cursor:grab; }
        .bottom-panel { background:#334155; border-radius:24px; padding:12px 20px; display:flex; gap:16px; align-items:center; }
        .tab { padding:8px 20px; border-radius:9999px; cursor:pointer; font-weight:500; }
        .tab.active { background:#0ea5e9; color:white; }
        .peer-count, .connection-status, .status-log { position:fixed; z-index:100; padding:6px 18px; border-radius:9999px; font-family:monospace; font-size:13px; }
        .peer-count { top:24px; right:280px; background:rgba(16,185,129,0.9); color:white; }
        .connection-status { top:24px; right:24px; background:rgba(15,23,42,0.95); color:#67e8f9; }
        .status-log { bottom:24px; left:120px; background:rgba(15,23,42,0.95); color:#67e8f9; max-width:420px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .media-controls { position:fixed; top:80px; right:24px; background:#1e2937; padding:12px; border-radius:16px; display:flex; flex-direction:column; gap:8px; z-index:110; box-shadow:0 10px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div style="margin-bottom:24px;"><img width="52" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fff'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/%3E%3C/svg%3E"></div>
            <nav><ul>
                <li><a href="#"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%23fff' viewBox='0 0 24 24'%3E%3Cpath d='M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'/%3E%3C/svg%3E"></a></li>
            </ul></nav>
            <footer>
                <button onclick="toggleMediaPanel()" style="background:rgba(255,255,255,0.08);width:52px;height:52px;border-radius:18px;border:none;color:white;font-size:24px;">🎤</button>
            </footer>
        </aside>

        <div class="workspace">
            <div class="top-bar">
                <div style="display:flex;align-items:center;gap:12px;">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 70'%3E%3Crect width='300' height='70' fill='%233b82f6' rx='12'/%3E%3Ctext x='24' y='48' fill='white' font-size='32' font-weight='700'%3EModernTown%3C/text%3E%3C/svg%3E" style="height:42px;">
                    <span id="syncBadge" style="background:linear-gradient(90deg,#22c55e,#10b981);color:white;padding:4px 16px;border-radius:9999px;font-size:13px;font-weight:600;">🔴 LIVE GENOSDB</span>
                </div>
                <div id="myNameDisplay" style="background:#1e2937;padding:6px 18px;border-radius:9999px;font-weight:600;"></div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="officeCanvas" width="1600" height="950"></canvas>
            </div>

            <div class="bottom-panel">
                <div onclick="switchTab(0)" id="tab0" class="tab active">📦 Objects</div>
                <div onclick="switchTab(1)" id="tab1" class="tab">💬 Chat</div>
                <div id="objectsDock" style="flex:1;display:flex;gap:12px;overflow-x:auto;padding:4px;"></div>
            </div>
        </div>
    </div>

    <!-- Media Panel -->
    <div id="mediaPanel" class="media-controls" style="display:none;">
        <button onclick="toggleMic()" id="micBtn" style="background:#10b981;color:white;padding:12px 24px;border:none;border-radius:9999px;width:100%;">🎤 Mic ON</button>
        <button onclick="toggleCamera()" id="camBtn" style="background:#10b981;color:white;padding:12px 24px;border:none;border-radius:9999px;width:100%;">📹 Camera ON</button>
        <div id="localPreview" style="width:180px;height:135px;background:#000;border-radius:12px;overflow:hidden;margin-top:8px;display:none;"></div>
    </div>

    <div class="peer-count" id="peerCount">👥 1 online</div>
    <div class="connection-status" id="connectionStatus">🟢 GenoSDB P2P</div>
    <div class="status-log" id="statusLog">Initializing...</div>

    <!-- Onboarding -->
    <dialog id="onboardingModal" style="border:none;border-radius:24px;background:#1e2937;color:#e2e8f0;width:480px;padding:0;">
        <div style="padding:24px 32px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;">
            <h2>Welcome to ModernTown 👋</h2>
            <button onclick="this.closest('dialog').close()" style="background:none;border:none;font-size:28px;color:#64748b;cursor:pointer;">✕</button>
        </div>
        <div style="padding:32px;">
            <input id="profileName" placeholder="Your Name" style="width:100%;padding:14px;margin-bottom:16px;border-radius:12px;background:#334155;border:none;color:white;font-size:16px;">
            <button onclick="saveProfileAndStart()" style="width:100%;padding:16px;background:#0ea5e9;color:white;border:none;border-radius:9999px;font-size:17px;font-weight:600;">Enter the Office</button>
        </div>
    </dialog>

    <script type="module">
        // ==================== GENOSDB + GenosRTC (WebRTC P2P) ====================
        import { gdb } from "https://cdn.jsdelivr.net/npm/genosdb@latest/dist/index.min.js";

        let db, objectsColl, avatarsColl, chatColl;
        let myConnectId = null;
        let connectedPeers = new Set();
        let peerAvatars = new Map();
        let sceneItems = [];
        let selfAvatar = null;
        let profile = null;

        const canvas = document.getElementById('officeCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1600, H = 950;
        canvas.width = W; canvas.height = H;

        let keys = {};
        let lastBroadcast = 0;

        // Sprite settings (perfect for your 4×4 character_sprite.png)
        let FRAME_COLS = 4, FRAME_ROWS = 4, FRAME_W = 64, FRAME_H = 64;

        let availableObjects = [
            { id: "chair", name: "Chair", spriteUrl: "./objects/sprites/chair_1.png", defaultW: 21, defaultH: 35 },
            { id: "desk", name: "Desk", spriteUrl: "./objects/sprites/desk_1.png", defaultW: 56, defaultH: 55 },
            { id: "workspace", name: "Workspace", spriteUrl: "./objects/sprites/workspace.png", defaultW: 500, defaultH: 300 }
        ];

        let localStream = null;
        let micOn = true, camOn = true;

        // ==================== PROFILE ====================
        function loadProfile() {
            const saved = localStorage.getItem('modernTownProfile');
            if (saved) {
                profile = JSON.parse(saved);
                document.getElementById('myNameDisplay').textContent = profile.name;
                return true;
            }
            return false;
        }

        window.saveProfileAndStart = function() {
            const name = (document.getElementById('profileName').value || "Player").trim();
            profile = { name, spriteUrl: "./objects/sprites/character_sprite.png" };
            localStorage.setItem('modernTownProfile', JSON.stringify(profile));
            document.getElementById('onboardingModal').close();
            document.getElementById('myNameDisplay').textContent = profile.name;
            createSelfAvatar();
            initGenoDB();
        };

        // ==================== AVATAR (4×4 sprite animation) ====================
        function createSelfAvatar() {
            selfAvatar = {
                id: 'self',
                name: profile.name,
                x: W/2 - 32,
                y: H/2 - 32,
                w: 64, h: 64,
                spriteUrl: profile.spriteUrl,
                spriteImg: null,
                direction: 0, // 0=down, 1=left, 2=right, 3=up
                frame: 0,
                speed: 5.2
            };
            const img = new Image();
            img.onload = () => {
                selfAvatar.spriteImg = img;
                FRAME_W = img.width / FRAME_COLS;
                FRAME_H = img.height / FRAME_ROWS;
            };
            img.src = selfAvatar.spriteUrl;
        }

        function renderAvatar(av) {
            if (!av.spriteImg) {
                ctx.fillStyle = av.id === 'self' ? '#22c55e' : '#3b82f6';
                ctx.fillRect(av.x, av.y, av.w, av.h);
                return;
            }
            const sx = av.frame * FRAME_W;
            const sy = av.direction * FRAME_H;
            ctx.drawImage(av.spriteImg, sx, sy, FRAME_W, FRAME_H, av.x, av.y, av.w, av.h);
        }

        // ==================== MOVEMENT ====================
        function updateMovement() {
            if (!selfAvatar) return;
            let vx = 0, vy = 0;
            if (keys['w'] || keys['arrowup']) vy -= selfAvatar.speed;
            if (keys['s'] || keys['arrowdown']) vy += selfAvatar.speed;
            if (keys['a'] || keys['arrowleft']) vx -= selfAvatar.speed;
            if (keys['d'] || keys['arrowright']) vx += selfAvatar.speed;

            const moving = vx !== 0 || vy !== 0;
            if (moving) {
                if (vx && vy) {
                    const len = Math.hypot(vx, vy);
                    vx /= len; vy /= len;
                    vx *= selfAvatar.speed; vy *= selfAvatar.speed;
                }
                selfAvatar.x = Math.max(10, Math.min(W - 74, selfAvatar.x + vx));
                selfAvatar.y = Math.max(10, Math.min(H - 74, selfAvatar.y + vy));

                if (Math.abs(vy) > Math.abs(vx)) {
                    selfAvatar.direction = vy > 0 ? 0 : 3;
                } else {
                    selfAvatar.direction = vx > 0 ? 2 : 1;
                }
                selfAvatar.frame = (selfAvatar.frame + 1) % 4;
            } else {
                selfAvatar.frame = 0;
            }

            if (moving && Date.now() - lastBroadcast > 50) {
                avatarsColl.set(selfAvatar.id, { ...selfAvatar, timestamp: Date.now() });
                lastBroadcast = Date.now();
            }
        }

        // ==================== RENDER ====================
        function render() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, W, H);

            // Grid
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
            for (let i = 0; i < H; i += 50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }

            // Objects
            sceneItems.forEach(item => {
                ctx.fillStyle = '#64748b';
                ctx.fillRect(item.x, item.y, item.defaultW || 64, item.defaultH || 64);
            });

            // Peer avatars
            peerAvatars.forEach(av => renderAvatar(av));
            if (selfAvatar) renderAvatar(selfAvatar);
        }

        function gameLoop() {
            updateMovement();
            render();
            requestAnimationFrame(gameLoop);
        }

        // ==================== GENOSDB REALTIME P2P ====================
        async function initGenoDB() {
            try {
                db = await gdb('moderntown-p2p', { rtc: true });
                console.log('✅ GenoSDB initialized with GenosRTC (WebRTC P2P)');

                objectsColl = db.collection('office_objects');
                avatarsColl = db.collection('office_avatars');
                chatColl = db.collection('office_chat');

                // Objects realtime
                objectsColl.on('change', (change) => {
                    if (change.type === 'added' || change.type === 'modified') {
                        const idx = sceneItems.findIndex(i => i.id === change.doc.id);
                        if (idx >= 0) sceneItems[idx] = change.doc;
                        else sceneItems.push(change.doc);
                    } else if (change.type === 'removed') {
                        sceneItems = sceneItems.filter(i => i.id !== change.doc.id);
                    }
                    render();
                });

                // Avatars realtime
                avatarsColl.on('change', (change) => {
                    if (change.doc.id === 'self') return;
                    let peer = peerAvatars.get(change.doc.id);
                    if (!peer) {
                        peer = { ...change.doc };
                        peerAvatars.set(change.doc.id, peer);
                        const img = new Image();
                        img.src = "./objects/sprites/character_sprite.png";
                        img.onload = () => { peer.spriteImg = img; };
                    } else {
                        Object.assign(peer, change.doc);
                    }
                    render();
                });

                // Load initial data
                const objs = await objectsColl.getAll();
                sceneItems = objs || [];
                const avs = await avatarsColl.getAll();
                avs.forEach(a => { if (a.id !== 'self') peerAvatars.set(a.id, a); });

                document.getElementById('connectionStatus').innerHTML = '🟢 GenoSDB P2P LIVE';
                document.getElementById('statusLog').innerHTML = '✅ Realtime sync ready – drag objects, WASD move avatar';

                // Keyboard
                window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

                // Objects dock
                const dock = document.getElementById('objectsDock');
                availableObjects.forEach(obj => {
                    const div = document.createElement('div');
                    div.style.cssText = 'background:#1e2937;border-radius:12px;padding:8px;text-align:center;cursor:grab;min-width:80px;';
                    div.innerHTML = `<img src="${obj.spriteUrl}" style="width:48px;height:48px;"><div style="font-size:12px;margin-top:4px;">${obj.name}</div>`;
                    div.draggable = true;
                    div.ondragstart = ev => ev.dataTransfer.setData('application/json', JSON.stringify(obj));
                    dock.appendChild(div);
                });

                canvas.ondragover = e => e.preventDefault();
                canvas.ondrop = async (e) => {
                    e.preventDefault();
                    const config = JSON.parse(e.dataTransfer.getData('application/json'));
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) * (W / rect.width) - (config.defaultW || 32);
                    const y = (e.clientY - rect.top) * (H / rect.height) - (config.defaultH || 32);
                    const newObj = { id: 'obj_' + Date.now(), ...config, x, y, locked: false };
                    await objectsColl.add(newObj);
                };

                gameLoop();
                setInterval(() => { document.getElementById('peerCount').innerHTML = `👥 ${connectedPeers.size + 1} online`; }, 2000);

            } catch (err) {
                console.error(err);
                document.getElementById('statusLog').innerHTML = '❌ GenoSDB failed – check console';
            }
        }

        // ==================== MEDIA (WebRTC) ====================
        window.toggleMic = async function() {
            micOn = !micOn;
            const btn = document.getElementById('micBtn');
            btn.textContent = micOn ? '🎤 Mic ON' : '🎤 Mic OFF';
            btn.style.background = micOn ? '#10b981' : '#ef4444';
            if (micOn && !localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            }
        };

        window.toggleCamera = async function() {
            camOn = !camOn;
            const btn = document.getElementById('camBtn');
            btn.textContent = camOn ? '📹 Camera ON' : '📹 Camera OFF';
            btn.style.background = camOn ? '#10b981' : '#ef4444';
            const prev = document.getElementById('localPreview');
            if (camOn) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.autoplay = true; video.muted = true; video.srcObject = stream;
                prev.innerHTML = ''; prev.appendChild(video); prev.style.display = 'block';
            } else {
                prev.style.display = 'none';
            }
        };

        window.toggleMediaPanel = function() {
            const p = document.getElementById('mediaPanel');
            p.style.display = p.style.display === 'none' ? 'flex' : 'none';
        };

        // Chat (simple local for now – can be extended with chatColl)
        window.sendChatMessage = function() { /* placeholder */ };

        window.switchTab = function(n) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
        };

        // ==================== START ====================
        window.onload = () => {
            if (!loadProfile()) {
                document.getElementById('onboardingModal').showModal();
            } else {
                createSelfAvatar();
                initGenoDB();
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gather Town • Pixel World • Local Multiplayer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            background: #0a0f0a;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            color: #ccffcc;
        }
        
        canvas {
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            background: #1e3a1e;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .glass-panel {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            border: 3px solid #2ecc2e;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
            font-size: 12px;
            padding: 12px;
            pointer-events: auto;
        }
        
        #auth {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 460px;
            text-align: center;
            background: rgba(10, 20, 10, 0.95);
            border: 4px solid #0f0;
            border-radius: 24px;
            padding: 28px;
        }
        
        #auth h1 {
            text-shadow: 0 0 8px #0f0;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        
        #joinBtn {
            background: #0f0;
            color: #000;
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            padding: 16px;
            width: 100%;
            border: none;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        
        #joinBtn:hover {
            background: #0ff;
            box-shadow: 0 0 20px cyan;
            transform: scale(0.98);
        }
        
        .controls-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 20;
        }
        
        .action-btn {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 0 #0a0;
        }
        
        .action-btn:hover {
            background: #0f0;
            color: black;
            transform: translateY(-2px);
        }
        
        .video-box {
            position: absolute;
            bottom: 100px;
            left: 16px;
            border: 3px solid #0ff;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
            pointer-events: auto;
            transition: 0.2s;
        }
        
        video {
            width: 180px;
            border-radius: 8px;
            display: block;
            background: #1a1a2e;
        }
        
        .chat-window {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 380px;
            height: 300px;
            background: rgba(0,0,0,0.88);
            border-radius: 16px;
            border: 2px solid #2ecc2e;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        
        .chat-header {
            padding: 8px 12px;
            background: #0f2a0f;
            border-bottom: 1px solid #0f0;
            font-size: 10px;
            border-radius: 13px 13px 0 0;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 10px;
            line-height: 1.6;
            color: #cfc;
        }
        
        #messages div {
            margin-bottom: 6px;
            word-break: break-word;
            border-left: 3px solid #0f0;
            padding-left: 8px;
        }
        
        #chatInput {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px;
            outline: none;
            border-radius: 0 0 14px 14px;
        }
        
        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #0f0;
            box-shadow: 0 0 6px #0f0;
            margin-right: 6px;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 4px;
        }
        
        @media (max-width: 700px) {
            .chat-window { width: 280px; height: 240px; }
            video { width: 130px; }
            .action-btn { font-size: 9px; padding: 6px 10px; }
        }
        
        .player-count {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 10px;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    
    <div id="ui">
        <div id="auth" class="glass-panel">
            <div style="font-size: 32px; margin-bottom: 8px;">🏰</div>
            <h1 style="color:#0f0;">✦ GATHER TOWN ✦</h1>
            <p style="font-size: 11px; color:#0fa;">Local Multiplayer + WebRTC</p>
            <p style="margin: 16px 0 8px; font-size: 10px;">⬆️⬇️⬅️➡️ or WASD move</p>
            <input type="text" id="playerName" placeholder="Enter your name" maxlength="16" style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 2px solid #0f0; color: #0f0; font-family: monospace; text-align: center;">
            <button id="joinBtn">⚡ ENTER THE LOBBY ⚡</button>
            <div style="margin-top: 18px; font-size: 9px; color:#7f7;">custom sprite 96x128 · proximity chat</div>
        </div>

        <div class="controls-bar" id="controlsBar" style="display: none;">
            <button class="action-btn" id="spriteBtn">🎨 SPRITE</button>
            <button class="action-btn" id="camToggleBtn">📹 CAM ON</button>
            <button class="action-btn" id="micToggleBtn">🎤 MIC ON</button>
            <button class="action-btn" id="resetCamBtn">🔄 RESET POS</button>
        </div>
        
        <div class="player-count" id="playerCount" style="display: none;">
            👥 <span id="onlineCount">1</span> online
        </div>

        <div id="selfVideoBox" class="video-box" style="display: none;">
            <video id="selfVideo" autoplay playsinline muted></video>
        </div>

        <div id="chatPanel" class="chat-window" style="display: none;">
            <div class="chat-header">
                <span class="status-led"></span> GLOBAL CHAT • <span id="roomIdDisplay">gather-local</span>
            </div>
            <div id="messages"></div>
            <input type="text" id="chatInput" placeholder="✏️ message + ENTER" maxlength="80">
        </div>
    </div>

    <script>
        // ---------------- GLOBALS ----------------
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;
        
        let myPeerConnection = null;
        let dataChannel = null;
        let remotePlayers = new Map();
        let myId = "";
        let myUsername = "";
        let myX = canvas.width / 2;
        let myY = canvas.height / 2;
        let myDirection = 2;
        let myAnimationFrame = 0;
        let animTimer = 0;
        let movementKeys = {};
        let localSpriteImg = null;
        let localSpriteDataURL = null;
        let mediaStream = null;
        let isCameraEnabled = true;
        let isMicEnabled = true;
        let lastSyncTime = 0;
        let peerConnections = new Map(); // track all peer connections
        
        // UI Elements
        const authDiv = document.getElementById("auth");
        const controlsBar = document.getElementById("controlsBar");
        const selfVideoBox = document.getElementById("selfVideoBox");
        const chatPanel = document.getElementById("chatPanel");
        const selfVideo = document.getElementById("selfVideo");
        const camBtn = document.getElementById("camToggleBtn");
        const micBtn = document.getElementById("micToggleBtn");
        const playerCountSpan = document.getElementById("onlineCount");
        const playerCountDiv = document.getElementById("playerCount");
        
        // Signaling server - using public STUN server only (no TURN needed for local/LAN)
        const configuration = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ]
        };
        
        // Simple signaling via localStorage for same-tab demo, but we'll use BroadcastChannel for multi-tab
        const signalChannel = new BroadcastChannel('gather_town_signaling');
        
        function generateId() {
            return 'player_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }
        
        function addChatMessage(sender, msg, isSystem = false) {
            const messagesDiv = document.getElementById("messages");
            const div = document.createElement("div");
            if (isSystem) {
                div.innerHTML = `<span style="color:#88ff88;">🔔 ${msg}</span>`;
            } else {
                div.innerHTML = `<span style="color:#0ff;">${escapeHtml(sender)}:</span> <span style="color:#ddd;">${escapeHtml(msg)}</span>`;
            }
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: "smooth", block: "nearest" });
            if (messagesDiv.children.length > 50) messagesDiv.removeChild(messagesDiv.children[0]);
        }
        
        function escapeHtml(str) { 
            return str.replace(/[&<>]/g, function(m){
                if(m==='&') return '&amp;';
                if(m==='<') return '&lt;';
                if(m==='>') return '&gt;';
                return m;
            });
        }
        
        // Custom sprite upload
        function uploadCustomSprite() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/png, image/jpeg";
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        if (img.width !== 96 || img.height !== 128) {
                            alert("⚠️ Sprite must be exactly 96x128 pixels!");
                            return;
                        }
                        localSpriteImg = img;
                        localSpriteDataURL = ev.target.result;
                        addChatMessage("System", "✨ Your custom sprite is equipped!", true);
                        broadcastState();
                    };
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        // Media devices
        async function initMediaDevices() {
            try {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 }, audio: true });
                mediaStream = stream;
                selfVideo.srcObject = stream;
                selfVideoBox.style.display = "block";
                isCameraEnabled = true;
                isMicEnabled = true;
                camBtn.textContent = "📹 CAM ON";
                micBtn.textContent = "🎤 MIC ON";
                camBtn.style.background = "#0a0";
                micBtn.style.background = "#0a0";
                
                const videoTrack = stream.getVideoTracks()[0];
                const audioTrack = stream.getAudioTracks()[0];
                if (videoTrack) videoTrack.enabled = true;
                if (audioTrack) audioTrack.enabled = true;
            } catch (err) {
                console.warn("Media error:", err);
                addChatMessage("System", "⚠️ Camera/Mic access denied - chat & movement only", true);
                selfVideoBox.style.display = "none";
            }
        }
        
        function toggleCamera() {
            if (!mediaStream) return;
            const videoTrack = mediaStream.getVideoTracks()[0];
            if (videoTrack) {
                isCameraEnabled = !isCameraEnabled;
                videoTrack.enabled = isCameraEnabled;
                camBtn.textContent = isCameraEnabled ? "📹 CAM ON" : "📹 CAM OFF";
                camBtn.style.background = isCameraEnabled ? "#0a0" : "#a33";
            }
        }
        
        function toggleMic() {
            if (!mediaStream) return;
            const audioTrack = mediaStream.getAudioTracks()[0];
            if (audioTrack) {
                isMicEnabled = !isMicEnabled;
                audioTrack.enabled = isMicEnabled;
                micBtn.textContent = isMicEnabled ? "🎤 MIC ON" : "🎤 MIC OFF";
                micBtn.style.background = isMicEnabled ? "#0a0" : "#a33";
            }
        }
        
        // Draw character with sprite or fallback
        function drawCharacter(img, x, y, direction, frame, nameTag, isLocal = false) {
            if (img && img.complete && img.naturalWidth === 96) {
                const sx = frame * 32;
                const sy = direction * 32;
                ctx.drawImage(img, sx, sy, 32, 32, x - 16, y - 16, 32, 32);
            } else {
                // Fallback pixel avatar
                ctx.fillStyle = isLocal ? "#44ff44" : "#44dd44";
                ctx.beginPath();
                ctx.arc(x, y, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#000";
                ctx.fillRect(x-4, y-4, 3, 3);
                ctx.fillRect(x+2, y-4, 3, 3);
                ctx.fillStyle = "#442200";
                ctx.fillRect(x-5, y+4, 10, 4);
                if (isLocal) {
                    ctx.strokeStyle = "#ffff00";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y, 16, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            if (nameTag) {
                ctx.font = "10px 'Press Start 2P'";
                ctx.fillStyle = isLocal ? "#ffff88" : "#e0ffc0";
                ctx.textAlign = "center";
                ctx.fillText(nameTag.slice(0, 14), x, y - 22);
            }
        }
        
        // Broadcast state to all peers
        function broadcastState() {
            const state = {
                type: "state",
                id: myId,
                name: myUsername,
                x: myX,
                y: myY,
                dir: myDirection,
                frame: myAnimationFrame,
                spriteURL: localSpriteDataURL
            };
            
            for (let [peerId, dc] of peerConnections) {
                if (dc && dc.readyState === "open") {
                    try {
                        dc.send(JSON.stringify(state));
                    } catch(e) { console.warn("Send error:", e); }
                }
            }
        }
        
        function broadcastChat(message) {
            const chatData = {
                type: "chat",
                sender: myUsername,
                text: message,
                timestamp: Date.now()
            };
            for (let [peerId, dc] of peerConnections) {
                if (dc && dc.readyState === "open") {
                    try {
                        dc.send(JSON.stringify(chatData));
                    } catch(e) {}
                }
            }
            addChatMessage(myUsername, message);
        }
        
        // Handle incoming messages from peer
        function handleDataChannelMessage(event, peerId) {
            try {
                const data = JSON.parse(event.data);
                if (data.type === "state") {
                    if (data.id === myId) return;
                    let player = remotePlayers.get(data.id);
                    if (!player) {
                        player = { id: data.id, name: data.name };
                        remotePlayers.set(data.id, player);
                        updatePlayerCount();
                        addChatMessage("System", `${data.name} joined the town!`, true);
                    }
                    player.x = data.x;
                    player.y = data.y;
                    player.dir = data.dir;
                    player.frame = data.frame;
                    player.name = data.name;
                    
                    if (data.spriteURL && !player.img) {
                        const img = new Image();
                        img.src = data.spriteURL;
                        img.onload = () => {
                            player.img = img;
                            remotePlayers.set(data.id, player);
                        };
                        player.img = img;
                    } else if (data.spriteURL && player.img) {
                        if (player.img.src !== data.spriteURL) {
                            const img = new Image();
                            img.src = data.spriteURL;
                            img.onload = () => { player.img = img; };
                            player.img = img;
                        }
                    }
                    remotePlayers.set(data.id, player);
                } else if (data.type === "chat") {
                    addChatMessage(data.sender, data.text);
                }
            } catch(e) { console.warn("Parse error:", e); }
        }
        
        // WebRTC peer creation
        async function createPeerConnection(peerId) {
            const pc = new RTCPeerConnection(configuration);
            
            // Add local stream if available
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => {
                    pc.addTrack(track, mediaStream);
                });
            }
            
            // Create data channel
            const dc = pc.createDataChannel("chat");
            dc.onopen = () => {
                console.log("Data channel open with", peerId);
                // Send initial state
                dc.send(JSON.stringify({
                    type: "state",
                    id: myId,
                    name: myUsername,
                    x: myX,
                    y: myY,
                    dir: myDirection,
                    frame: myAnimationFrame,
                    spriteURL: localSpriteDataURL
                }));
            };
            dc.onmessage = (event) => handleDataChannelMessage(event, peerId);
            dc.onclose = () => {
                console.log("Data channel closed", peerId);
                remotePlayers.delete(peerId);
                peerConnections.delete(peerId);
                updatePlayerCount();
                addChatMessage("System", `A player left the town`, true);
            };
            
            pc.ondatachannel = (event) => {
                const channel = event.channel;
                channel.onmessage = (e) => handleDataChannelMessage(e, peerId);
                channel.onopen = () => console.log("Incoming data channel open", peerId);
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    signalChannel.postMessage({
                        type: "candidate",
                        from: myId,
                        to: peerId,
                        candidate: event.candidate
                    });
                }
            };
            
            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === "disconnected" || pc.iceConnectionState === "failed") {
                    remotePlayers.delete(peerId);
                    peerConnections.delete(peerId);
                    updatePlayerCount();
                }
            };
            
            peerConnections.set(peerId, dc);
            return { pc, dc };
        }
        
        // Signaling handling
        async function initSignaling() {
            signalChannel.onmessage = async (event) => {
                const data = event.data;
                if (data.type === "offer" && data.to === myId) {
                    const { pc, dc } = await createPeerConnection(data.from);
                    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    signalChannel.postMessage({
                        type: "answer",
                        from: myId,
                        to: data.from,
                        answer: answer
                    });
                    peerConnections.set(data.from, dc);
                } else if (data.type === "answer" && data.to === myId) {
                    const pc = Array.from(peerConnections.entries()).find(([id]) => id === data.from)?.[0];
                    if (pc) {
                        const existingPC = [...peerConnections.keys()].find(id => id === data.from);
                        if (existingPC) {
                            const connection = [...peerConnections.entries()].find(([id]) => id === data.from)?.[1];
                            // Need to get the actual PC reference - simplified approach
                        }
                    }
                    // Simplified: just create connection proactively
                } else if (data.type === "candidate" && data.to === myId) {
                    // Add ICE candidate logic here
                } else if (data.type === "new_peer") {
                    // Initiate connection to new peer
                    if (data.id !== myId && !peerConnections.has(data.id)) {
                        const { pc, dc } = await createPeerConnection(data.id);
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        signalChannel.postMessage({
                            type: "offer",
                            from: myId,
                            to: data.id,
                            offer: offer
                        });
                        peerConnections.set(data.id, dc);
                    }
                }
            };
            
            // Announce presence
            signalChannel.postMessage({
                type: "new_peer",
                id: myId,
                name: myUsername
            });
            
            // Periodic cleanup
            setInterval(() => {
                signalChannel.postMessage({
                    type: "heartbeat",
                    id: myId
                });
            }, 5000);
        }
        
        function updatePlayerCount() {
            const count = remotePlayers.size + 1;
            playerCountSpan.textContent = count;
        }
        
        // Movement handling
        function handleMovement() {
            let moved = false;
            let speed = 4.5;
            let newX = myX, newY = myY;
            
            if (movementKeys["w"] || movementKeys["ArrowUp"]) { newY -= speed; myDirection = 3; moved = true; }
            if (movementKeys["s"] || movementKeys["ArrowDown"]) { newY += speed; myDirection = 0; moved = true; }
            if (movementKeys["a"] || movementKeys["ArrowLeft"]) { newX -= speed; myDirection = 1; moved = true; }
            if (movementKeys["d"] || movementKeys["ArrowRight"]) { newX += speed; myDirection = 2; moved = true; }
            
            if (moved) {
                newX = Math.min(canvas.width - 24, Math.max(24, newX));
                newY = Math.min(canvas.height - 32, Math.max(24, newY));
                myX = newX;
                myY = newY;
                animTimer += 0.25;
                myAnimationFrame = (Math.floor(animTimer) % 3);
            } else {
                myAnimationFrame = 0;
                animTimer = 0;
            }
        }
        
        // Drawing
        function drawWorld() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Grid pattern
            for (let i = 0; i < canvas.width; i += 40) {
                for (let j = 0; j < canvas.height; j += 40) {
                    ctx.fillStyle = ((i/40 + j/40) % 2 === 0) ? "#296229" : "#3c8c3c";
                    ctx.fillRect(i, j, 40, 40);
                }
            }
            
            // Draw decorative elements
            ctx.fillStyle = "#ffd966";
            for (let i = 0; i < 60; i++) {
                ctx.fillRect((i * 131) % canvas.width, (i * 57) % canvas.height, 4, 4);
            }
            
            // Draw remote players
            for (let [id, player] of remotePlayers.entries()) {
                if (player.x && player.y) {
                    drawCharacter(player.img, player.x, player.y, player.dir, player.frame, player.name, false);
                }
            }
            
            // Draw local player
            drawCharacter(localSpriteImg, myX, myY, myDirection, myAnimationFrame, myUsername + " (you)", true);
            
            // UI hints
            ctx.font = "8px 'Press Start 2P'";
            ctx.fillStyle = "#b3ffb3";
            ctx.fillText("⚡ WASD / ARROWS", canvas.width-180, 30);
            ctx.fillText("💬 Enter to chat", canvas.width-180, 50);
        }
        
        function gameLoop() {
            handleMovement();
            drawWorld();
            
            // Sync every 60ms
            if (Date.now() - lastSyncTime > 60) {
                broadcastState();
                lastSyncTime = Date.now();
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // Create default sprite if none uploaded
        function createDefaultSprite() {
            const canvas = document.createElement("canvas");
            canvas.width = 96;
            canvas.height = 128;
            const dctx = canvas.getContext("2d");
            dctx.fillStyle = "#44c844";
            dctx.fillRect(0, 0, 96, 128);
            dctx.fillStyle = "#2a6b2a";
            dctx.fillRect(32, 64, 32, 48);
            dctx.fillStyle = "#f5d742";
            dctx.fillRect(40, 48, 16, 16);
            dctx.fillStyle = "#000";
            dctx.fillRect(36, 38, 6, 6);
            dctx.fillRect(54, 38, 6, 6);
            const dataURL = canvas.toDataURL();
            const img = new Image();
            img.src = dataURL;
            localSpriteImg = img;
            localSpriteDataURL = dataURL;
        }
        
        // Initialize app
        async function initializeApp() {
            myUsername = document.getElementById("playerName").value.trim() || "Adventurer";
            myId = generateId();
            
            authDiv.style.display = "none";
            controlsBar.style.display = "flex";
            chatPanel.style.display = "flex";
            playerCountDiv.style.display = "block";
            
            createDefaultSprite();
            await initMediaDevices();
            await initSignaling();
            
            // Setup event listeners
            document.getElementById("spriteBtn").onclick = uploadCustomSprite;
            camBtn.onclick = toggleCamera;
            micBtn.onclick = toggleMic;
            document.getElementById("resetCamBtn").onclick = () => {
                myX = canvas.width/2;
                myY = canvas.height/2;
            };
            
            // Keyboard input
            window.addEventListener("keydown", (e) => {
                const key = e.key;
                if (key === "w" || key === "W" || key === "ArrowUp") movementKeys["ArrowUp"] = true;
                if (key === "s" || key === "S" || key === "ArrowDown") movementKeys["ArrowDown"] = true;
                if (key === "a" || key === "A" || key === "ArrowLeft") movementKeys["ArrowLeft"] = true;
                if (key === "d" || key === "D" || key === "ArrowRight") movementKeys["ArrowRight"] = true;
                if (key === "Enter" && document.activeElement !== chatInput) {
                    chatInput.focus();
                }
            });
            
            window.addEventListener("keyup", (e) => {
                const key = e.key;
                if (key === "w" || key === "W" || key === "ArrowUp") movementKeys["ArrowUp"] = false;
                if (key === "s" || key === "S" || key === "ArrowDown") movementKeys["ArrowDown"] = false;
                if (key === "a" || key === "A" || key === "ArrowLeft") movementKeys["ArrowLeft"] = false;
                if (key === "d" || key === "D" || key === "ArrowRight") movementKeys["ArrowRight"] = false;
            });
            
            const chatInput = document.getElementById("chatInput");
            chatInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    const msg = chatInput.value.trim();
                    if (msg) {
                        broadcastChat(msg);
                        chatInput.value = "";
                    }
                }
            });
            
            // Resize canvas
            function resizeCanvas() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = Math.min(1280, w - 20);
                canvas.height = Math.min(720, h - 20);
                canvas.style.width = `${canvas.width}px`;
                canvas.style.height = `${canvas.height}px`;
                if (!myX) { myX = canvas.width/2; myY = canvas.height/2; }
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();
            
            gameLoop();
            addChatMessage("System", "✨ Welcome to Gather Town! Press WASD to move, upload custom sprites!", true);
        }
        
        // Start
        document.getElementById("joinBtn").onclick = initializeApp;
        
        // Initial setup
        canvas.width = 1280;
        canvas.height = 720;
    </script>
</body>
</html>

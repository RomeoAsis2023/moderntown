<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>webConnect.js WASD Video Room</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0f172a;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

#ui{
  position:fixed;
  top:12px;
  left:12px;
  z-index:9999;
  width:340px;
  background:rgba(0,0,0,.72);
  padding:14px;
  border-radius:14px;
}

#ui h1{
  font-size:19px;
  margin-bottom:10px;
}

#ui input,
#ui button{
  width:100%;
  padding:11px;
  margin-bottom:9px;
  border:none;
  border-radius:9px;
}

#ui button{
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#ui button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

#status{
  font-size:13px;
  color:#cbd5e1;
  line-height:1.4;
}

#scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:48px 48px;
}

.videoCard{
  position:absolute;
  width:260px;
  background:#111827;
  border:1px solid rgba(255,255,255,.14);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.videoCard video{
  width:100%;
  aspect-ratio:16/10;
  object-fit:cover;
  background:#020617;
  display:block;
}

.videoName{
  position:absolute;
  top:9px;
  left:9px;
  background:rgba(0,0,0,.65);
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

.videoControls{
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  display:flex;
  gap:7px;
  background:rgba(0,0,0,.6);
  padding:7px;
  border-radius:999px;
}

.iconBtn{
  width:38px;
  height:38px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  color:white;
  font-size:17px;
  cursor:pointer;
}

.iconBtn.off{
  background:#dc2626;
}

.iconBtn.remote{
  cursor:default;
}

#help{
  position:fixed;
  bottom:12px;
  left:12px;
  z-index:9999;
  background:rgba(0,0,0,.72);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:#cbd5e1;
  line-height:1.5;
}
</style>
</head>

<body>

<div id="ui">
  <h1>webConnect.js Video World</h1>
  <input id="roomInput" value="demo-room" placeholder="Room name" />
  <button id="joinBtn">Join Room</button>
  <div id="status">Not connected</div>
</div>

<div id="help">
  W A S D = Move Video<br>
  📹 = Camera Toggle<br>
  🎙️ = Mic Toggle<br>
  🔊 = Remote Speaker Toggle
</div>

<div id="scene"></div>

<script type="module">
import webconnect from 'https://cdn.jsdelivr.net/npm/webconnect/dist/esm/webconnect.js'

const scene = document.getElementById('scene')
const statusEl = document.getElementById('status')
const joinBtn = document.getElementById('joinBtn')
const roomInput = document.getElementById('roomInput')

let connect = null
let localStream = null
let myConnectId = null
let roomName = null
let movementStarted = false

const connectedPeers = new Set()
const peerStates = {}
const peerCards = {}
const peerConnections = {}
const pendingIce = {}

let localState = {
  video: true,
  mic: true
}

let myPosition = {
  x: 360,
  y: 220
}

joinBtn.onclick = async () => {
  joinBtn.disabled = true
  roomName = roomInput.value.trim() || 'demo-room'

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    })
  } catch (error) {
    alert('Camera and microphone permission are required.')
    joinBtn.disabled = false
    return
  }

  createVideoCard('local', localStream, 'You', true)

  connect = webconnect()

  connect.getMyId(attribute => {
    myConnectId = attribute.connectId
    statusEl.textContent = 'Connected as ' + myConnectId + ' · Room: ' + roomName
  })

  connect.onConnect(attribute => {
    const peerId = attribute.connectId
    sendHello(peerId)
  })

  connect.onDisconnect(attribute => {
    const peerId = attribute.connectId
    removePeer(peerId)
    statusEl.textContent = peerId + ' disconnected'
  })

  connect.onReceive(async (data, attribute) => {
    const peerId = attribute.connectId
    if (!data || !data.type) return

    if (data.room && data.room !== roomName) return

    if (data.type === 'room-hello') {
      await acceptPeer(peerId)
      sendHello(peerId)

      if (shouldInitiate(peerId)) {
        await startCall(peerId, true)
      }

      broadcastState(peerId)
      return
    }

    if (data.type === 'state') {
      peerStates[peerId] = data.state
      updateRemoteCard(peerId)
      return
    }

    if (data.type === 'webrtc-offer') {
      await handleOffer(peerId, data.offer)
      return
    }

    if (data.type === 'webrtc-answer') {
      await handleAnswer(peerId, data.answer)
      return
    }

    if (data.type === 'webrtc-ice') {
      await handleIce(peerId, data.candidate)
      return
    }
  })

  if (!movementStarted) {
    movementStarted = true
    movementLoop()
  }
}

function sendHello(peerId) {
  if (!connect || !peerId) return

  sendToPeer(peerId, {
    type: 'room-hello',
    room: roomName
  })
}

async function acceptPeer(peerId) {
  if (connectedPeers.has(peerId)) return

  connectedPeers.add(peerId)
  statusEl.textContent = peerId + ' joined room'
}

function shouldInitiate(peerId) {
  if (!myConnectId) return false
  return String(myConnectId) < String(peerId)
}

async function startCall(peerId, shouldCreateOffer) {
  if (peerConnections[peerId]) return peerConnections[peerId]

  const pc = createPeerConnection(peerId)

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream)
  })

  if (shouldCreateOffer) {
    const offer = await pc.createOffer()
    await pc.setLocalDescription(offer)

    sendToPeer(peerId, {
      type: 'webrtc-offer',
      room: roomName,
      offer: pc.localDescription
    })
  }

  return pc
}

function createPeerConnection(peerId) {
  const pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:global.stun.twilio.com:3478' }
    ]
  })

  peerConnections[peerId] = pc
  pendingIce[peerId] = pendingIce[peerId] || []

  pc.onicecandidate = event => {
    if (event.candidate) {
      sendToPeer(peerId, {
        type: 'webrtc-ice',
        room: roomName,
        candidate: event.candidate
      })
    }
  }

  pc.ontrack = event => {
    const stream = event.streams[0]

    if (stream) {
      createVideoCard(peerId, stream, 'Peer ' + peerId, false)
      updateRemoteCard(peerId)
    }
  }

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') {
      statusEl.textContent = 'Video connected with ' + peerId
    }

    if (['closed','failed','disconnected'].includes(pc.connectionState)) {
      removePeer(peerId)
    }
  }

  return pc
}

async function handleOffer(peerId, offer) {
  await acceptPeer(peerId)

  const pc = await startCall(peerId, false)

  await pc.setRemoteDescription(new RTCSessionDescription(offer))

  await flushPendingIce(peerId)

  const answer = await pc.createAnswer()
  await pc.setLocalDescription(answer)

  sendToPeer(peerId, {
    type: 'webrtc-answer',
    room: roomName,
    answer: pc.localDescription
  })

  broadcastState(peerId)
}

async function handleAnswer(peerId, answer) {
  const pc = peerConnections[peerId]
  if (!pc) return

  await pc.setRemoteDescription(new RTCSessionDescription(answer))
  await flushPendingIce(peerId)
}

async function handleIce(peerId, candidate) {
  if (!candidate) return

  const pc = peerConnections[peerId]

  if (!pc || !pc.remoteDescription) {
    pendingIce[peerId] = pendingIce[peerId] || []
    pendingIce[peerId].push(candidate)
    return
  }

  try {
    await pc.addIceCandidate(new RTCIceCandidate(candidate))
  } catch (error) {
    console.warn('ICE error:', error)
  }
}

async function flushPendingIce(peerId) {
  const pc = peerConnections[peerId]
  const queue = pendingIce[peerId] || []

  while (queue.length) {
    const candidate = queue.shift()

    try {
      await pc.addIceCandidate(new RTCIceCandidate(candidate))
    } catch (error) {
      console.warn('Queued ICE error:', error)
    }
  }
}

function createVideoCard(id, stream, name, isLocal) {
  if (peerCards[id]) {
    peerCards[id].querySelector('video').srcObject = stream
    return
  }

  const card = document.createElement('div')
  card.className = 'videoCard'
  card.id = 'card-' + id

  card.innerHTML = `
    <video autoplay playsinline ${isLocal ? 'muted' : ''}></video>
    <div class="videoName">${escapeHTML(name)}</div>
    <div class="videoControls">
      <button class="iconBtn videoToggle" title="Video">📹</button>
      <button class="iconBtn speakerToggle" title="Speaker">🔊</button>
      <button class="iconBtn micToggle" title="Mic">🎙️</button>
    </div>
  `

  scene.appendChild(card)

  const video = card.querySelector('video')
  video.srcObject = stream
  video.play().catch(() => {})

  const videoBtn = card.querySelector('.videoToggle')
  const speakerBtn = card.querySelector('.speakerToggle')
  const micBtn = card.querySelector('.micToggle')

  if (isLocal) {
    card.style.left = myPosition.x + 'px'
    card.style.top = myPosition.y + 'px'

    speakerBtn.style.display = 'none'

    videoBtn.onclick = () => {
      localState.video = !localState.video

      localStream.getVideoTracks().forEach(track => {
        track.enabled = localState.video
      })

      videoBtn.classList.toggle('off', !localState.video)
      videoBtn.textContent = localState.video ? '📹' : '📷'

      broadcastState()
    }

    micBtn.onclick = () => {
      localState.mic = !localState.mic

      localStream.getAudioTracks().forEach(track => {
        track.enabled = localState.mic
      })

      micBtn.classList.toggle('off', !localState.mic)
      micBtn.textContent = localState.mic ? '🎙️' : '🔇'

      broadcastState()
    }
  } else {
    card.style.left = '300px'
    card.style.top = '300px'

    videoBtn.classList.add('remote')
    micBtn.classList.add('remote')

    videoBtn.disabled = true
    micBtn.disabled = true

    speakerBtn.onclick = () => {
      video.muted = !video.muted
      speakerBtn.classList.toggle('off', video.muted)
      speakerBtn.textContent = video.muted ? '🔈' : '🔊'
    }
  }

  peerCards[id] = card
}

function updateRemoteCard(peerId) {
  const card = peerCards[peerId]
  const state = peerStates[peerId]

  if (!card || !state) return

  if (typeof state.x === 'number') card.style.left = state.x + 'px'
  if (typeof state.y === 'number') card.style.top = state.y + 'px'

  const videoBtn = card.querySelector('.videoToggle')
  const micBtn = card.querySelector('.micToggle')

  videoBtn.classList.toggle('off', !state.video)
  micBtn.classList.toggle('off', !state.mic)

  videoBtn.textContent = state.video ? '📹' : '📷'
  micBtn.textContent = state.mic ? '🎙️' : '🔇'
}

const keys = {}

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase()

  if (['w','a','s','d'].includes(key)) {
    e.preventDefault()
  }

  keys[key] = true
})

window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false
})

let lastMoveSend = 0

function movementLoop(timestamp = 0) {
  const speed = 4
  let moved = false

  if (keys.w) {
    myPosition.y -= speed
    moved = true
  }

  if (keys.s) {
    myPosition.y += speed
    moved = true
  }

  if (keys.a) {
    myPosition.x -= speed
    moved = true
  }

  if (keys.d) {
    myPosition.x += speed
    moved = true
  }

  myPosition.x = Math.max(0, Math.min(window.innerWidth - 260, myPosition.x))
  myPosition.y = Math.max(0, Math.min(window.innerHeight - 180, myPosition.y))

  const myCard = peerCards.local

  if (myCard) {
    myCard.style.left = myPosition.x + 'px'
    myCard.style.top = myPosition.y + 'px'
  }

  if (moved && timestamp - lastMoveSend > 60) {
    broadcastState()
    lastMoveSend = timestamp
  }

  requestAnimationFrame(movementLoop)
}

function broadcastState(targetPeerId = null) {
  if (!connect) return

  const payload = {
    type: 'state',
    room: roomName,
    state: {
      ...localState,
      x: myPosition.x,
      y: myPosition.y
    }
  }

  if (targetPeerId) {
    sendToPeer(targetPeerId, payload)
    return
  }

  connectedPeers.forEach(peerId => {
    sendToPeer(peerId, payload)
  })
}

function sendToPeer(peerId, payload) {
  if (!connect || !peerId) return

  try {
    connect.Send(payload, {
      connectId: peerId
    })
  } catch (error) {
    console.warn('Send failed:', peerId, error)
  }
}

function removePeer(peerId) {
  connectedPeers.delete(peerId)

  if (peerConnections[peerId]) {
    peerConnections[peerId].close()
    delete peerConnections[peerId]
  }

  if (peerCards[peerId]) {
    peerCards[peerId].remove()
    delete peerCards[peerId]
  }

  delete peerStates[peerId]
  delete pendingIce[peerId]
}

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, char => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#039;',
    '"':'&quot;'
  }[char]))
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gather Town P2P Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; background:#000; font-family:'Press Start 2P',system-ui; overflow:hidden; color:#fff; }
        canvas { display:block; image-rendering:pixelated; background:#1a3a1a; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        .panel { pointer-events:auto; background:rgba(0,0,0,0.92); border:4px solid #0f0; padding:10px; font-size:12px; box-shadow:0 0 20px #0f0; }
        #auth { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:420px; text-align:center; }
        #controls { position:absolute; top:12px; left:12px; display:flex; gap:6px; flex-wrap:wrap; }
        button { background:#0f0; color:#000; border:none; padding:8px 12px; font-size:13px; cursor:pointer; font-family:inherit; min-width:44px; }
        button:hover { background:#0ff; }
        button.red { background:#f44; color:white; }
        #selfVideoContainer { position:absolute; bottom:90px; left:12px; border:4px solid #0ff; box-shadow:0 0 20px #0ff; background:#000; }
        #chat { position:absolute; bottom:12px; right:12px; width:360px; height:280px; }
        #messages { height:200px; overflow-y:auto; background:#111; padding:8px; font-size:11px; }
        video { width:180px; display:block; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1024" height="768"></canvas>

    <div id="ui">
        <div id="auth" class="panel">
            <h1 style="color:#0f0;margin:0 0 20px 0;">GATHER TOWN P2P</h1>
            <button onclick="startAuth()" style="width:100%;padding:18px;font-size:16px;">JOIN THE ROOM</button>
            <small style="display:block;margin-top:15px;color:#666;">WASD Move • ?admin for objects</small>
        </div>

        <!-- Floating Controls -->
        <div id="controls" class="panel" style="display:none;">
            <button onclick="uploadSprite()">📤 SPRITE</button>
            <button onclick="toggleCamera()" id="camBtn">📹 ON</button>
            <button onclick="toggleMic()" id="micBtn">🎤 ON</button>
            <button onclick="toggleAdmin()" id="adminBtn" style="display:none;background:#f80;">🛠 ADMIN</button>
        </div>

        <!-- Self Webcam Preview -->
        <div id="selfVideoContainer" style="display:none;">
            <video id="selfVideo" autoplay playsinline muted></video>
        </div>

        <!-- Chat -->
        <div id="chat" class="panel" style="display:none;">
            <div id="messages"></div>
            <input id="chatInput" placeholder="Type + Enter" 
                   style="width:100%;padding:8px;background:#222;border:2px solid #0f0;color:#fff;"
                   onkeypress="if(event.key==='Enter') sendChat()">
        </div>
    </div>

    <script>
        let canvas, ctx, gun, myId, myProfile = {name: "Player"};
        let players = {}, objects = {};
        let myX = 512, myY = 384, myDir = 0, myFrame = 0, animTime = 0;
        let keys = {}, lastSync = 0;
        let spriteSheetImg = null;
        let spriteSheets = {};
        let isAdmin = false;
        let myStream = null;
        let selfVideo = null;

        const ROOM = "gather-lobby-v5";

        window.onload = () => {
            canvas = document.getElementById("canvas");
            ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
            selfVideo = document.getElementById("selfVideo");

            isAdmin = location.search.includes("admin");
            if (isAdmin) document.getElementById("adminBtn").style.display = "inline-block";
        };

        async function startAuth() {
            document.getElementById("auth").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            document.getElementById("chat").style.display = "block";

            myId = "p-" + Math.random().toString(36).slice(2, 10);
            myProfile.name = "P" + myId.slice(0,4);

            initGun();
            initMedia();
            setupInput();
            gameLoop();
        }

        function initGun() {
            gun = Gun({
                peers: ["https://gun-manhattan.herokuapp.com/gun", "https://gun-eu.herokuapp.com/gun", "https://relay.peer.ooo/gun"],
                localStorage: true
            });

            const space = gun.get("gather-space").get(ROOM);
            space.get("players").map().on((data, id) => {
                if (id === myId) return;
                players[id] = data || {};
                if (data?.spriteDataURL && !spriteSheets[id]) {
                    const img = new Image();
                    img.src = data.spriteDataURL;
                    img.onload = () => spriteSheets[id] = img;
                }
            });

            space.get("objects").map().on((data, id) => objects[id] = data);
        }

        function syncMyPlayer() {
            if (!gun) return;
            gun.get("gather-space").get(ROOM).get("players").get(myId).put({
                x: Math.round(myX), y: Math.round(myY), dir: myDir,
                frame: Math.floor(myFrame), name: myProfile.name,
                spriteDataURL: myProfile.spriteDataURL || null
            });
        }

        // ====================== MEDIA + WEBCAM PREVIEW ======================
        async function initMedia() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: { width: 320, height: 240 }
                });
                selfVideo.srcObject = myStream;
                document.getElementById("selfVideoContainer").style.display = "block";
            } catch(e) {
                console.log("Camera/mic access denied");
            }
        }

        function toggleCamera() {
            if (!myStream) return;
            const videoTrack = myStream.getVideoTracks()[0];
            if (videoTrack) {
                const enabled = !videoTrack.enabled;
                videoTrack.enabled = enabled;
                document.getElementById("camBtn").textContent = enabled ? "📹 ON" : "📹 OFF";
                document.getElementById("camBtn").style.background = enabled ? "#0f0" : "#f44";
                document.getElementById("selfVideoContainer").style.opacity = enabled ? "1" : "0.3";
            }
        }

        function toggleMic() {
            if (!myStream) return;
            const audioTrack = myStream.getAudioTracks()[0];
            if (audioTrack) {
                const enabled = !audioTrack.enabled;
                audioTrack.enabled = enabled;
                document.getElementById("micBtn").textContent = enabled ? "🎤 ON" : "🎤 OFF";
                document.getElementById("micBtn").style.background = enabled ? "#0f0" : "#f44";
            }
        }

        function uploadSprite() {
            const input = document.createElement("input");
            input.type = "file"; input.accept = "image/png";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        if (img.width !== 96 || img.height !== 128) return alert("Must be 96×128!");
                        spriteSheetImg = img;
                        myProfile.spriteDataURL = ev.target.result;
                        syncMyPlayer();
                    };
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            alert(isAdmin ? "ADMIN ON - Drag objects" : "Admin OFF");
        }

        // Drag & Drop for objects
        let dragId = null, offsetX = 0, offsetY = 0;

        function setupInput() {
            window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
            window.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

            canvas.addEventListener("mousedown", e => {
                if (!isAdmin) return;
                const mx = e.offsetX, my = e.offsetY;
                for (let id in objects) {
                    const o = objects[id];
                    if (mx > (o.x||0) && mx < (o.x||0)+(o.w||64) && my > (o.y||0) && my < (o.y||0)+(o.h||64)) {
                        dragId = id;
                        offsetX = mx - (o.x||0);
                        offsetY = my - (o.y||0);
                        return;
                    }
                }
            });

            canvas.addEventListener("mousemove", e => {
                if (!dragId) return;
                const o = objects[dragId];
                o.x = e.offsetX - offsetX;
                o.y = e.offsetY - offsetY;
                gun.get("gather-space").get(ROOM).get("objects").get(dragId).put(o);
            });

            canvas.addEventListener("mouseup", () => dragId = null);
        }

        // ====================== GAME LOOP ======================
        function drawSprite(img, x, y, dir, frame) {
            if (!img) {
                ctx.fillStyle = "#0ff";
                ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI*2); ctx.fill();
                return;
            }
            ctx.drawImage(img, frame*32, dir*32, 32, 32, x-16, y-16, 32, 32);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, 1024, 768);
            ctx.fillStyle = "#1a3a1a";
            ctx.fillRect(0, 0, 1024, 768);

            // Grid
            ctx.strokeStyle = "#0a2a0a";
            for (let i = 0; i < 1024; i += 32) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,768); ctx.stroke(); }
            for (let i = 0; i < 768; i += 32) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(1024,i); ctx.stroke(); }

            // Objects
            for (let id in objects) {
                const o = objects[id];
                ctx.fillStyle = "#f80";
                ctx.fillRect(o.x||100, o.y||100, o.w||64, o.h||64);
            }

            // Other players
            for (let id in players) {
                const p = players[id];
                drawSprite(spriteSheets[id], p.x||400, p.y||300, p.dir||0, p.frame||0);
                ctx.fillStyle = "#0ff";
                ctx.font = "11px Press Start 2P";
                ctx.textAlign = "center";
                ctx.fillText(p.name||"?", p.x||400, (p.y||300)-28);
            }

            // Self
            drawSprite(spriteSheetImg, myX, myY, myDir, Math.floor(myFrame));
            ctx.fillStyle = "#0f0";
            ctx.font = "11px Press Start 2P";
            ctx.textAlign = "center";
            ctx.fillText(myProfile.name, myX, myY-28);

            // Movement
            let moved = false, speed = 4.2;
            if (keys["w"] || keys["arrowup"])    { myY -= speed; myDir = 3; moved = true; }
            if (keys["s"] || keys["arrowdown"])  { myY += speed; myDir = 0; moved = true; }
            if (keys["a"] || keys["arrowleft"])  { myX -= speed; myDir = 1; moved = true; }
            if (keys["d"] || keys["arrowright"]) { myX += speed; myDir = 2; moved = true; }

            if (moved) animTime += 0.22;
            myFrame = moved ? (animTime % 3) : 0;

            myX = Math.max(20, Math.min(1004, myX));
            myY = Math.max(20, Math.min(748, myY));

            if (Date.now() - lastSync > 80) {
                syncMyPlayer();
                lastSync = Date.now();
            }

            requestAnimationFrame(gameLoop);
        }

        function sendChat() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;
            const div = document.getElementById("messages");
            const line = document.createElement("div");
            line.textContent = `${myProfile.name}: ${input.value}`;
            div.appendChild(line);
            div.scrollTop = div.scrollHeight;
            input.value = "";
        }
    </script>
</body>
</html>

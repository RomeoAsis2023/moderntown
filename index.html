<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gather Town • Global Room</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; background:#000; font-family:'Press Start 2P',system-ui; overflow:hidden; color:#fff; }
        canvas { display:block; image-rendering:pixelated; background:#1a3a1a; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        .panel { pointer-events:auto; background:rgba(0,0,0,0.9); border:4px solid #0f0; padding:12px; font-size:12px; }
        #auth { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:440px; text-align:center; }
        #controls { position:absolute; top:12px; left:12px; display:flex; gap:6px; flex-wrap:wrap; }
        button { background:#0f0; color:#000; border:none; padding:8px 12px; font-size:13px; cursor:pointer; }
        #selfVideoContainer { position:absolute; bottom:100px; left:12px; border:4px solid #0ff; box-shadow:0 0 20px #0ff; background:#000; }
        #chat { position:absolute; bottom:12px; right:12px; width:360px; height:280px; }
        video { width:180px; display:block; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1024" height="768"></canvas>

    <div id="ui">
        <div id="auth" class="panel">
            <h1 style="color:#0f0;margin:0 0 20px;">GATHER TOWN<br><small>GLOBAL ROOM</small></h1>
            <button onclick="joinRoom()" style="width:100%;padding:18px;font-size:16px;">ENTER THE GLOBAL ROOM</button>
            <small style="color:#0ff;display:block;margin-top:15px;">Everyone joins the same room automatically</small>
        </div>

        <div id="controls" class="panel" style="display:none;">
            <button onclick="uploadSprite()">📤 SPRITE (96×128)</button>
            <button onclick="toggleCamera()" id="camBtn">📹 ON</button>
            <button onclick="toggleMic()" id="micBtn">🎤 ON</button>
            <button onclick="toggleSpeaker()" id="speakerBtn">🔊 ON</button>
        </div>

        <div id="selfVideoContainer" style="display:none;">
            <video id="selfVideo" autoplay playsinline muted></video>
        </div>

        <div id="chat" class="panel" style="display:none;">
            <div id="messages"></div>
            <input id="chatInput" placeholder="Type + Enter" 
                   style="width:100%;padding:8px;background:#222;border:2px solid #0f0;color:#fff;"
                   onkeypress="if(event.key==='Enter') sendChat()">
        </div>
    </div>

    <script>
        let peer, myPeerId, gun, canvas, ctx;
        let myX = 512, myY = 384, myDir = 0, myFrame = 0, animTime = 0;
        let keys = {}, lastSync = 0;
        let spriteSheetImg = null;
        let players = {}, spriteSheets = {};
        let myProfile = {name: "Player"};
        let myStream = null;
        let connections = new Map();

        const ROOM = "global-gather-room-v1";   // ← Fixed room

        window.onload = () => {
            canvas = document.getElementById("canvas");
            ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
        };

        async function joinRoom() {
            document.getElementById("auth").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            document.getElementById("chat").style.display = "block";

            myPeerId = "p-" + Math.random().toString(36).slice(2, 10);
            myProfile.name = "P" + myPeerId.slice(0,4);

            // Initialize Gun for signaling (share Peer IDs)
            gun = Gun({
                peers: ["https://gun-manhattan.herokuapp.com/gun", "https://relay.peer.ooo/gun"]
            });

            // Initialize PeerJS
            peer = new Peer(myPeerId);

            peer.on("open", () => {
                console.log("✅ Your ID:", myPeerId);
                // Register yourself in the room
                gun.get(ROOM).get("peers").get(myPeerId).put({ id: myPeerId, name: myProfile.name });
            });

            peer.on("connection", conn => handleNewConnection(conn));

            // Discover other peers
            gun.get(ROOM).get("peers").map().on((data, key) => {
                if (key === myPeerId || !data || connections.has(key)) return;
                connectToPeer(key);
            });

            initMedia();
            setupInput();
            gameLoop();
        }

        function handleNewConnection(conn) {
            connections.set(conn.peer, conn);
            conn.on("open", () => conn.send({ type: "profile", name: myProfile.name }));
            conn.on("data", data => handleData(data, conn.peer));
        }

        function connectToPeer(targetId) {
            const conn = peer.connect(targetId);
            conn.on("open", () => {
                connections.set(targetId, conn);
                conn.send({ type: "profile", name: myProfile.name });
            });
            conn.on("data", data => handleData(data, targetId));
        }

        function handleData(data, peerId) {
            if (data.type === "position") {
                players[peerId] = data.pos;
                if (data.sprite && !spriteSheets[peerId]) {
                    const img = new Image();
                    img.src = data.sprite;
                    img.onload = () => spriteSheets[peerId] = img;
                }
            }
        }

        function syncPosition() {
            const data = {
                type: "position",
                pos: { x: Math.round(myX), y: Math.round(myY), dir: myDir, frame: Math.floor(myFrame) },
                sprite: myProfile.spriteDataURL
            };
            connections.forEach(conn => {
                if (conn.open) conn.send(data);
            });
        }

        async function initMedia() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { width: 320, height: 240 } });
                document.getElementById("selfVideo").srcObject = myStream;
                document.getElementById("selfVideoContainer").style.display = "block";
            } catch(e) {}
        }

        function uploadSprite() {
            const input = document.createElement("input");
            input.type = "file"; input.accept = "image/png";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        if (img.width !== 96 || img.height !== 128) return alert("Must be 96×128!");
                        spriteSheetImg = img;
                        myProfile.spriteDataURL = ev.target.result;
                    };
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function toggleCamera() {
            if (!myStream) return;
            const track = myStream.getVideoTracks()[0];
            if (track) track.enabled = !track.enabled;
        }

        function toggleMic() {
            if (!myStream) return;
            const track = myStream.getAudioTracks()[0];
            if (track) track.enabled = !track.enabled;
        }

        function toggleSpeaker() {
            const btn = document.getElementById("speakerBtn");
            const isOn = btn.textContent.includes("ON");
            btn.textContent = isOn ? "🔇 OFF" : "🔊 ON";
        }

        function setupInput() {
            window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
            window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        }

        function drawSprite(img, x, y, dir, frame) {
            if (!img) {
                ctx.fillStyle = "#0ff";
                ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI*2); ctx.fill();
                return;
            }
            ctx.drawImage(img, frame*32, dir*32, 32, 32, x-16, y-16, 32, 32);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, 1024, 768);
            ctx.fillStyle = "#1a3a1a";
            ctx.fillRect(0, 0, 1024, 768);

            ctx.strokeStyle = "#0a2a0a";
            for (let i = 0; i < 1024; i += 32) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,768); ctx.stroke(); }
            for (let i = 0; i < 768; i += 32) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(1024,i); ctx.stroke(); }

            for (let id in players) {
                const p = players[id];
                drawSprite(spriteSheets[id], p.x, p.y, p.dir, p.frame);
                ctx.fillStyle = "#0ff";
                ctx.font = "11px Press Start 2P";
                ctx.textAlign = "center";
                ctx.fillText(p.name || "?", p.x, p.y - 28);
            }

            drawSprite(spriteSheetImg, myX, myY, myDir, Math.floor(myFrame));
            ctx.fillStyle = "#0f0";
            ctx.font = "11px Press Start 2P";
            ctx.textAlign = "center";
            ctx.fillText(myProfile.name, myX, myY - 28);

            let moved = false, speed = 4.2;
            if (keys["w"] || keys["arrowup"])    { myY -= speed; myDir = 3; moved = true; }
            if (keys["s"] || keys["arrowdown"])  { myY += speed; myDir = 0; moved = true; }
            if (keys["a"] || keys["arrowleft"])  { myX -= speed; myDir = 1; moved = true; }
            if (keys["d"] || keys["arrowright"]) { myX += speed; myDir = 2; moved = true; }

            if (moved) animTime += 0.22;
            myFrame = moved ? (animTime % 3) : 0;

            myX = Math.max(20, Math.min(1004, myX));
            myY = Math.max(20, Math.min(748, myY));

            if (Date.now() - lastSync > 70) {
                syncPosition();
                lastSync = Date.now();
            }

            requestAnimationFrame(gameLoop);
        }

        function sendChat() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;
            const div = document.getElementById("messages");
            const line = document.createElement("div");
            line.textContent = `${myProfile.name}: ${input.value}`;
            div.appendChild(line);
            div.scrollTop = div.scrollHeight;
            input.value = "";
        }

        // Global functions
        window.joinRoom = joinRoom;
        window.uploadSprite = uploadSprite;
        window.toggleCamera = toggleCamera;
        window.toggleMic = toggleMic;
        window.toggleSpeaker = toggleSpeaker;
        window.sendChat = sendChat;
    </script>
</body>
</html>
